, "text": "The Yogi who is satisfied with the knowledge and wisdom of the Self, who has conquered the senses, and to whom a clod of earth, a piece of stone, and gold are all the same, is said to have attained Nirvikalpa Samadhi."}], "near_dups": []}, {"id": 124, "text": "Look on friend and foe with the same eye.", "best_verse": "6:9", "rationale": "Excellence is being even-minded toward the loving, the hostile, and the indifferent.", "verses": [{"ref": "6:9", "text": "He who is of the same mind towards the good-hearted, friends, enemies, the indifferent, the neutral, the hateful, the relatives, the righteous, and the unrighteous, excels."}], "near_dups": []}, {"id": 125, "text": "Practice in solitude, free from hope and greed.", "best_verse": "6:10", "rationale": "Strive constantly to steady the mind, alone, with body and mind controlled.", "verses": [{"ref": "6:10", "text": "Let the yogi constantly strive to keep the mind steady, remaining in solitude, alone, with the body and mind controlled, and free from hope and greed."}], "near_dups": []}, {"id": 126, "text": "Set a firm, clean seat, neither high nor low.", "best_verse": "6:11", "rationale": "Practical instruction on preparing a stable place to sit.", "verses": [{"ref": "6:11", "text": "In a clean spot, having established a firm seat of his own, neither too high nor too low, made of cloth, skin, and kusha grass layered one over the other."}], "near_dups": []}, {"id": 127, "text": "Make the mind one-pointed to purify yourself.", "best_verse": "6:12", "rationale": "Seated, gather the mind and senses to a single point for inner purification.", "verses": [{"ref": "6:12", "text": "There, having made the mind one-pointed, with the actions of the mind and senses controlled, let him, seated on the seat, practice Yoga for the purification of the self."}], "near_dups": []}, {"id": 128, "text": "Hold your body, head, and neck straight and still.", "best_verse": "6:13", "rationale": "Concrete posture instruction: erect, steady, gaze unwandering.", "verses": [{"ref": "6:13", "text": "Let him firmly hold his body, head, and neck erect and still, gazing at the tip of his nose without looking around."}], "near_dups": []}, {"id": 129, "text": "Sit serene and fearless, mind fixed on the goal.", "best_verse": "6:14", "rationale": "Calm, fearless, disciplined, with the highest as the supreme aim.", "verses": [{"ref": "6:14", "text": "Serene-minded, fearless, firm in the vow of a Brahmachari, having controlled their mind, thinking of Me and balanced in mind, let them sit, having Me as their supreme goal."}], "near_dups": []}, {"id": 130, "text": "A steadied mind leads you to lasting peace.", "best_verse": "6:15", "rationale": "Keeping the mind balanced culminates in the peace of liberation.", "verses": [{"ref": "6:15", "text": "Thus, always keeping the mind balanced, the yogi, with the mind controlled, attains the peace abiding in Me, culminating in liberation."}], "near_dups": []}, {"id": 131, "text": "Eat and sleep in moderation, never in extremes.", "best_verse": "6:17", "rationale": "Yoga is impossible with too much or too little food and sleep; moderation destroys pain.", "verses": [{"ref": "6:16", "text": "Verily, Yoga is not possible for him who eats too much, nor for him who does not eat at all, nor for him who sleeps too much, nor for him who is always awake, O Arjuna."}, {"ref": "6:17", "text": "Yoga becomes the destroyer of pain for him who is moderate in eating and recreation (such as walking, etc.), who exercises moderation in action, and who is moderate in sleep and wakefulness."}], "near_dups": []}, {"id": 132, "text": "Rest the mind in the Self, free of craving.", "best_verse": "6:18", "rationale": "Union is the controlled mind resting in the Self, free from all longing.", "verses": [{"ref": "6:18", "text": "When the perfectly controlled mind rests in the Self alone, free from longing for any of the objects of desire, then it is said, 'He is united'."}], "near_dups": []}, {"id": 133, "text": "Keep your mind unflickering like a sheltered lamp.", "best_verse": "6:19", "rationale": "The steady yogi's mind is like a flame where no wind blows.", "verses": [{"ref": "6:19", "text": "As a lamp placed in a windless spot does not flicker, so is the Yogi of a controlled mind, who practices Yoga in the Self, compared."}], "near_dups": []}, {"id": 134, "text": "Grow content by seeing the Self within yourself.", "best_verse": "6:20", "rationale": "When the mind quiets, one sees the Self by the Self and is satisfied.", "verses": [{"ref": "6:20", "text": "When the mind, restrained by the practice of yoga, attains quietude, and when one sees the Self by the Self, they are satisfied in their own Self."}], "near_dups": []}, {"id": 135, "text": "Anchor yourself in bliss beyond the senses.", "best_verse": "6:21", "rationale": "Infinite bliss grasped by the intellect, transcending the senses, holds one steady.", "verses": [{"ref": "6:21", "text": "When he (the Yogi) feels that infinite bliss which can be grasped by the pure intellect and which transcends the senses, and is established therein, never moving away from the reality."}], "near_dups": []}, {"id": 136, "text": "Once you find it, no sorrow can shake you.", "best_verse": "6:22", "rationale": "Established in this gain, one is unmoved even by heavy grief.", "verses": [{"ref": "6:22", "text": "Having obtained it, he thinks there is no other gain superior to it; established in it, he is not moved even by heavy sorrow."}], "near_dups": []}, {"id": 137, "text": "Practice with resolve and an undespairing mind.", "best_verse": "6:23", "rationale": "Yoga, the severance from pain, is to be practiced with determination and without despair.", "verses": [{"ref": "6:23", "text": "Let this be known by the name of Yoga, the severance from union with pain. This Yoga should be practiced with determination and with an undespairing mind."}], "near_dups": []}, {"id": 138, "text": "Let go of every desire born of imagination.", "best_verse": "6:24", "rationale": "Abandon all desires from mental fancy and restrain the senses from every side.", "verses": [{"ref": "6:24", "text": "Abandoning unreservedly all desires born of Sankalpa (thought and imagination) and completely restraining the whole group of senses by the mind from all sides."}], "near_dups": []}, {"id": 139, "text": "Quiet the mind gradually, one step at a time.", "best_verse": "6:25", "rationale": "Little by little, steady the intellect and fix the mind on the Self alone.", "verses": [{"ref": "6:25", "text": "Little by little, let him attain steadiness of the intellect by holding it firmly; having made the mind establish itself in the Self, let him not think of anything else."}], "near_dups": []}, {"id": 140, "text": "Whenever the mind wanders, gently bring it back.", "best_verse": "6:26", "rationale": "From wherever the restless mind strays, draw it back under the Self's control.", "verses": [{"ref": "6:26", "text": "From whatever cause the restless and unsteady mind wanders away, let him restrain it from that and bring it under the control of the Self alone."}], "near_dups": []}, {"id": 141, "text": "A calmed mind opens the door to supreme bliss.", "best_verse": "6:27", "rationale": "The yogi of peaceful mind, free from passion, enjoys the infinite bliss of Brahman.", "verses": [{"ref": "6:27", "text": "Supreme Bliss indeed comes to this Yogi whose mind is made peaceful, whose passion is quelled, who has become Brahman, and who is free from sin."}, {"ref": "6:28", "text": "The yogi, always engaging the mind thus (in the practice of yoga), is freed from sins and easily enjoys the infinite bliss of contact with Brahman (the Eternal)."}], "near_dups": []}, {"id": 142, "text": "See yourself in all beings and all beings in you.", "best_verse": "6:29", "rationale": "The harmonized mind sees the Self everywhere and never feels separate.", "verses": [{"ref": "6:29", "text": "With the mind harmonized by Yoga, he sees the Self abiding in all beings and all beings in the Self; he sees the same everywhere."}, {"ref": "6:30", "text": "He who sees Me everywhere and sees everything in Me, never becomes separated from Me, nor do I from him."}], "near_dups": [{"id": 87, "score": 0.948}, {"id": 248, "score": 0.932}], "suggestion": {"action": "keep", "absorbs": [87], "why": "Equal-vision recurs 5x. Keep three real facets: seeing the Self in all (142), worshipping the one presence (143), the indestructible reality (336). 87 duplicates 142; 248 duplicates 336."}}, {"id": 143, "text": "Worship the one presence dwelling in all beings.", "best_verse": "6:31", "rationale": "Established in unity, the yogi abides in the divine present in all.", "verses": [{"ref": "6:31", "text": "He who, being established in unity, worships Me, who dwells in all beings, that yogi abides in Me, whatever their mode of living may be."}], "near_dups": [{"id": 248, "score": 0.932}]}, {"id": 144, "text": "Feel others' joy and pain as your own.", "best_verse": "6:32", "rationale": "The highest yogi sees all through the likeness of the Self, in pleasure and pain alike.", "verses": [{"ref": "6:32", "text": "He who, through the likeness of the Self, O Arjuna, sees reality everywhere, be it pleasure or pain, is regarded as the highest Yogi."}], "near_dups": []}, {"id": 145, "text": "Admit the mind is restless and hard to hold.", "best_verse": "6:34", "rationale": "Arjuna names the mind restless, turbulent, and as hard to control as the wind.", "verses": [{"ref": "6:33", "text": "Arjuna said, \"O Krishna, I do not see how this Yoga of equanimity, which you have taught me, can be maintained steadily, due to the restlessness of the mind.\""}, {"ref": "6:34", "text": "The mind is indeed restless, turbulent, strong, and unyielding, O Krishna; I consider it as difficult to control as controlling the wind."}], "near_dups": []}, {"id": 146, "text": "Tame the restless mind through practice and detachment.", "best_verse": "6:35", "rationale": "Krishna's answer: the difficult mind is restrained by practice and dispassion.", "verses": [{"ref": "6:35", "text": "The Blessed Lord said, \"Undoubtedly, O mighty-armed Arjuna, the mind is difficult to control and restless; but with practice and dispassion, it can be restrained.\""}], "near_dups": []}, {"id": 147, "text": "Self-mastery makes the seemingly impossible attainable.", "best_verse": "6:36", "rationale": "Yoga is hard for the uncontrolled but reachable by the striving, self-controlled one.", "verses": [{"ref": "6:36", "text": "I think Yoga is hard to be attained by one with an uncontrolled self, but the self-controlled and striving one can attain it by the appropriate means."}], "near_dups": []}, {"id": 148, "text": "No sincere effort toward good is ever wasted.", "best_verse": "6:40", "rationale": "The one who falls from yoga does not perish; none who does good comes to grief.", "verses": [{"ref": "6:37", "text": "Arjuna said, \"He who is unable to control himself, even though he has faith, and whose mind wanders away from Yoga, what end does he meet, having failed to attain perfection in Yoga, O Krishna?\""}, {"ref": "6:38", "text": "Fallen from both, does he not perish like a rent cloud, supportless, O mighty-armed one, deluded on the path of Brahman?"}, {"ref": "6:39", "text": "O Krishna, please completely dispel this doubt of mine, for it is not possible for anyone but You to do so."}, {"ref": "6:40", "text": "The Blessed Lord said, \"O Arjuna, neither in this world nor in the next will there be destruction for him; none, indeed, who does good, O my son, ever comes to grief.\""}], "near_dups": []}, {"id": 149, "text": "Every good beginning carries forward into your future.", "best_verse": "6:43", "rationale": "The fallen yogi is reborn favorably and reconnects with former practice, striving further.", "verses": [{"ref": "6:41", "text": "Having attained to the worlds of the righteous and having dwelt there for everlasting years, he who fell from Yoga is born in a house of the pure and wealthy."}, {"ref": "6:42", "text": "Or he is born in a family of even the wisest of yogis; verily, such a birth is very difficult to obtain in this world."}, {"ref": "6:43", "text": "Then he comes into contact with the knowledge acquired in his former body and strives even more for perfection, O Arjuna."}, {"ref": "6:44", "text": "By that same former practice, he is borne on in spite of himself. Even he who merely wishes to know Yoga goes beyond the Brahmanic word."}], "near_dups": []}, {"id": 150, "text": "Persist across setbacks; progress compounds over time.", "best_verse": "6:45", "rationale": "The yogi who strives on, perfected gradually, reaches the highest goal.", "verses": [{"ref": "6:45", "text": "But the Yogi who strives assiduously, purified of sins and perfected gradually over many births, reaches the highest goal."}], "near_dups": []}, {"id": 151, "text": "Choose disciplined practice over mere knowledge or ritual.", "best_verse": "6:46", "rationale": "The yogi surpasses ascetics, scholars, and ritualists; devoted practice with faith is highest.", "verses": [{"ref": "6:46", "text": "The yogi is thought to be superior to the ascetics, even superior to those who have knowledge obtained through the study of scriptures; he is also superior to men of action; therefore, be thou a yogi, O Arjuna."}, {"ref": "6:47", "text": "And among all the Yogis, he who, full of faith and with his inner self merged in Me, worships Me is deemed by Me to be the most devoted."}], "near_dups": []}], "skipped": []}, {"chapter": 7, "lessons": [{"id": 152, "text": "Pair knowledge with lived realization, not theory.", "best_verse": "7:2", "rationale": "Verses 1-2 promise knowledge combined with realization, after which nothing remains to be known.", "verses": [{"ref": "7:1", "text": "The Blessed Lord said, \"O Arjuna, hear how you shall, without doubt, know Me fully, with your mind intent on Me, practicing Yoga and taking refuge in Me.\""}, {"ref": "7:2", "text": "I will declare to you in full this knowledge combined with realization, after knowing which nothing else remains to be known here."}], "near_dups": [{"id": 96, "score": 0.94}], "suggestion": {"action": "distinct", "why": "96 = knowledge and action are one path (5:5); 152 = pair knowledge with lived realization, not theory (7:2). Distinct points — keep both."}}, {"id": 153, "text": "Accept that true realization is rare and hard-won.", "best_verse": "7:3", "rationale": "Among thousands who strive, only one truly knows the essence.", "verses": [{"ref": "7:3", "text": "Among thousands of men, one may perchance strive for perfection; even among those successful strivers, only one may perchance know Me in essence."}], "near_dups": []}, {"id": 154, "text": "Distinguish your body and mind from your living essence.", "best_verse": "7:5", "rationale": "The eightfold material nature is inferior; the life-element is the higher nature that upholds the world.", "verses": [{"ref": "7:4", "text": "Earth, water, fire, air, ether, mind, intellect, and egoism—thus is My Nature divided eightfold."}, {"ref": "7:5", "text": "O mighty-armed Arjuna, this is the inferior Prakriti; know it as distinct from My higher Prakriti, the very life-element, by which this world is upheld."}], "near_dups": []}, {"id": 155, "text": "Trace every beginning and ending to one source.", "best_verse": "7:7", "rationale": "All beings arise from the two natures; all things are strung on the divine like gems on a thread.", "verses": [{"ref": "7:6", "text": "Know that these two are the womb of all beings; thus, I am the source and dissolution of the whole universe."}, {"ref": "7:7", "text": "There is nothing higher than Me, O Arjuna. All this is strung on Me, like clusters of gems on a string."}], "near_dups": []}, {"id": 156, "text": "Notice the divine in taste, light, and sound.", "best_verse": "7:8", "rationale": "The divine is the flavor in water, light in sun and moon, fragrance in earth, life in all beings.", "verses": [{"ref": "7:8", "text": "I am the flavor in water, O Arjuna; I am the light in the moon and the sun; I am the syllable Om in all the Vedas, sound in the ether and virility in men."}, {"ref": "7:9", "text": "I am the sweet fragrance in the earth and the brilliance in the fire, the life in all beings, and I am the austerity of ascetics."}], "near_dups": []}, {"id": 157, "text": "See the same essence behind every excellence.", "best_verse": "7:10", "rationale": "The divine is the seed of all beings, intelligence of the intelligent, strength free of craving, desire aligned with dharma.", "verses": [{"ref": "7:10", "text": "Know Me, O Arjuna, as the eternal seed of all beings; I am the intelligence of the intelligent, and the splendour of the splendid objects."}, {"ref": "7:11", "text": "Of the strong, I am the strength devoid of desire and attachment, and in all beings, I am the desire in accordance with Dharma, O Arjuna."}], "near_dups": []}, {"id": 158, "text": "Recognize all states of being flow from one.", "best_verse": "7:12", "rationale": "Pure, active, and inert states all proceed from the divine, yet it is not bound by them.", "verses": [{"ref": "7:12", "text": "Whatever beings (and objects) that are pure, active, and inert, know that they proceed from Me. They are in Me, yet I am not in them."}], "near_dups": []}, {"id": 159, "text": "See past the three moods that veil reality.", "best_verse": "7:14", "rationale": "The world is deluded by the three gunas; this divine illusion is crossed only by taking refuge.", "verses": [{"ref": "7:13", "text": "Deluded by these Natures, composed of the three qualities of Nature, all this world does not know Me as distinct from them and immutable."}, {"ref": "7:14", "text": "Verily, this divine illusion of Mine, composed of the three qualities, is difficult to cross over; those who take refuge in Me alone, can cross over this illusion."}], "near_dups": []}, {"id": 160, "text": "Watch how delusion turns people from the good.", "best_verse": "7:15", "rationale": "Those whose knowledge is destroyed by illusion follow lower ways and do not seek the divine.", "verses": [{"ref": "7:15", "text": "The evil-doers and the deluded, who are the lowest of men, do not seek Me; those whose knowledge is destroyed by illusion follow the ways of demons."}], "near_dups": []}, {"id": 161, "text": "Let your worship rise above distress and gain.", "best_verse": "7:16", "rationale": "Four kinds seek the divine: the distressed, the curious, the wealth-seeker, and the wise.", "verses": [{"ref": "7:16", "text": "Four kinds of virtuous men worship Me, O Arjuna, and they are the distressed, the seekers of knowledge, the seekers of wealth, and the wise, O Lord of the Bharatas."}], "near_dups": []}, {"id": 162, "text": "Devote yourself with steady, single-minded love.", "best_verse": "7:17", "rationale": "The wise, ever steadfast and devoted to the One, are dearest and held as the divine's own Self.", "verses": [{"ref": "7:17", "text": "Of them, the wise who are ever steadfast and devoted to the One, excel; for I am exceedingly dear to the wise, and they are dear to Me."}, {"ref": "7:18", "text": "Indeed, all these are noble; however, I consider the wise man as My very Self; for, he is steadfast in mind and established in Me alone as the supreme goal."}], "near_dups": []}, {"id": 163, "text": "Realize the divine dwells within everything you see.", "best_verse": "7:19", "rationale": "After many births the wise one realizes all this is the innermost Self; such a soul is rare.", "verses": [{"ref": "7:19", "text": "At the end of many births, the wise man comes to Me, realizing that all this is Vaasudeva (the innermost Self); such a great soul (Mahatma) is very hard to find."}], "near_dups": [{"id": 81, "score": 0.937}], "suggestion": {"action": "keep", "absorbs": [81], "why": "Divine-in-all recurs 3x. 163 (in everything you see) and 194 (behind every form) are distinct facets; 81 (in every act) is close to 163 — merge or keep, your call."}}, {"id": 164, "text": "Watch how desire steers you toward lesser aims.", "best_verse": "7:20", "rationale": "Those whose wisdom is stolen by desire turn to lesser gods, led by their own nature.", "verses": [{"ref": "7:20", "text": "Those whose wisdom has been taken away by this or that desire, go to other gods, following this or that rite, led by their own nature."}], "near_dups": []}, {"id": 165, "text": "Whatever you worship with faith is strengthened.", "best_verse": "7:21", "rationale": "The divine makes firm whatever faith a devotee holds, and grants the outcome they seek.", "verses": [{"ref": "7:21", "text": "Whatever form any devotee desires to worship with faith, I make that same faith of his firm and unflinching."}, {"ref": "7:22", "text": "Endowed with that faith, he engages in the worship of that form and obtains his desired outcome, which is ordained by Me alone."}], "near_dups": [{"id": 308, "score": 0.933}], "suggestion": {"action": "distinct", "why": "165 = whatever you worship with faith grows (7:21); 308 = you become the faith you hold (17:3). Related but different angle — keep both."}}, {"id": 166, "text": "Choose lasting aims over quick, finite rewards.", "best_verse": "7:23", "rationale": "The reward of small minds is finite; devotees of the highest reach the highest.", "verses": [{"ref": "7:23", "text": "Verily, the reward (fruit) that accrues to those men of small intelligence is finite. The worshippers of the gods go to them, whereas My devotees come to Me."}], "near_dups": []}, {"id": 167, "text": "Do not mistake the formless for mere form.", "best_verse": "7:24", "rationale": "The foolish think the unmanifest is limited; the divine stays veiled by Yoga-Maya.", "verses": [{"ref": "7:24", "text": "The foolish think of Me, the Unmanifest, as having manifestation, not knowing My higher, immutable, and most excellent nature."}, {"ref": "7:25", "text": "I am not manifest to all, veiled as I am by the Yoga-Maya. This deluded world does not know Me, who am unborn and imperishable."}], "near_dups": []}, {"id": 168, "text": "Remember the knower is never fully known.", "best_verse": "7:26", "rationale": "The divine knows all beings past, present, and future, yet no one fully knows it.", "verses": [{"ref": "7:26", "text": "I know, O Arjuna, the beings of the past, the present, and the future; however, no one knows Me."}], "near_dups": []}, {"id": 169, "text": "Free yourself from the pull of like and dislike.", "best_verse": "7:27", "rationale": "Beings fall into delusion through the pairs of opposites; the pure-hearted, freed from them, worship steadfastly.", "verses": [{"ref": "7:27", "text": "O Bharata, all beings are subject to delusion at birth due to the delusion of the pairs of opposites arising from desire and aversion, O Parantapa."}, {"ref": "7:28", "text": "But those men of virtuous deeds, whose sins have come to an end and who are freed from the delusion of the pairs of opposites, worship Me steadfastly, with their vows."}], "near_dups": []}, {"id": 170, "text": "Seek refuge to understand self, spirit, and action.", "best_verse": "7:29", "rationale": "Those who take refuge realize Brahman, the Self, and all action, and know the divine even at death.", "verses": [{"ref": "7:29", "text": "Those who strive for liberation from old age and death, taking refuge in Me, realize in full that Brahman, the whole knowledge of the Self, and all action."}, {"ref": "7:30", "text": "Those who know Me with the Adhibhuta (pertaining to the elements), Adhidaiva (pertaining to the gods), and the Adhiyajna (pertaining to the sacrifice) know Me even at the time of death, remaining steadfast in mind."}], "near_dups": []}], "skipped": []}, {"chapter": 8, "lessons": [{"id": 171, "text": "Know the imperishable Self behind all changing forms.", "best_verse": "8:3", "rationale": "Verses 1-4 answer Arjuna's questions by defining Brahman as the imperishable Supreme; the applicable teaching is to know the eternal Self behind perishable nature.", "verses": [{"ref": "8:1", "text": "Arjuna said, \"What is Brahman? What is Adhyatma? What is action, O best among men? What is Adhibhuta declared to be? And, what is Adhidaiva said to be?\""}, {"ref": "8:2", "text": "Who and how is Adhiyajna here in this body, O destroyer of Madhu? And how, at the time of death, are You to be known by the self-controlled?"}, {"ref": "8:3", "text": "The Blessed Lord said, \"Brahman is the Imperishable, the Supreme; its essential nature is called Self-knowledge; the offering (to the gods) that causes the existence and manifestation of beings and sustains them is called action.\""}, {"ref": "8:4", "text": "Adhibhuta—knowledge of the elements—pertains to My perishable nature, and the Purusha, or the Soul, is the Adhidaiva; I alone am the Adhiyajna here in this body, O best among the embodied."}], "near_dups": []}, {"id": 172, "text": "Whatever you remember at the end, you become.", "best_verse": "8:6", "rationale": "Both verses state that the being one dwells on at death is the state one attains.", "verses": [{"ref": "8:5", "text": "And whoever, leaving their body, goes forth remembering Me alone at the time of death, they will attain My Being; there is no doubt about this."}, {"ref": "8:6", "text": "Whoever at the end leaves the body, thinking of any being, to that being only does he go, O son of Kunti (Arjuna), due to his constant thought of that being."}], "near_dups": []}, {"id": 173, "text": "Remember what matters most while you still act.", "best_verse": "8:7", "rationale": "Krishna tells Arjuna to remember Him at all times and still fight — devotion woven through daily action.", "verses": [{"ref": "8:7", "text": "Therefore, at all times, remember Me only and fight. With your mind and intellect fixed on Me, you will undoubtedly come to Me alone."}], "near_dups": []}, {"id": 174, "text": "Steady the mind through daily, unwavering practice.", "best_verse": "8:8", "rationale": "The Supreme is reached through habitual meditation and a mind that does not wander.", "verses": [{"ref": "8:8", "text": "With the mind not moving towards any other thing, made steadfast through the practice of habitual meditation, and constantly meditating, one goes to the Supreme Person, the Resplendent, O Arjuna."}], "near_dups": []}, {"id": 175, "text": "Contemplate what is vast, ancient, and beyond darkness.", "best_verse": "8:9", "rationale": "These verses describe meditating on the luminous, all-supporting Supreme beyond ignorance, with an unwavering devoted mind.", "verses": [{"ref": "8:9", "text": "Whosoever meditates on the Omniscient, the Ancient, the Ruler of the whole world, minuter than an atom, the supporter of all, of inconceivable form, effulgent like the sun and beyond the darkness of ignorance."}, {"ref": "8:10", "text": "At the time of death, with an unwavering mind, endowed with devotion, by the power of Yoga, fixing the whole life-breath in the middle of the two eyebrows, he reaches that resplendent Supreme Person."}], "near_dups": []}, {"id": 176, "text": "Close the senses and gather your mind inward.", "best_verse": "8:12", "rationale": "Withdraw from external gates and confine the mind within to practice concentration.", "verses": [{"ref": "8:11", "text": "That which is declared to be Imperishable by those who know the Vedas, that which the self-controlled (ascetics or Sannyasins) and passion-free enter, that goal, desiring which celibacy is practised, I will declare to thee in brief."}, {"ref": "8:12", "text": "Having closed all the gates, confined the mind in the heart, and fixed the life-breath in the head, engage in the practice of concentration."}], "near_dups": []}, {"id": 177, "text": "Anchor your restless mind to a single word.", "best_verse": "8:13", "rationale": "Uttering the single syllable Om steadies the departing mind toward the Supreme goal.", "verses": [{"ref": "8:13", "text": "Uttering the one-syllabled Om, the Brahman, and remembering Me, he who departs, leaving the body, attains the Supreme Goal."}], "near_dups": []}, {"id": 178, "text": "Devote yourself constantly and the way grows easy.", "best_verse": "8:14", "rationale": "The one who remembers single-mindedly and daily finds the Supreme easily attainable.", "verses": [{"ref": "8:14", "text": "I am easily attainable by that ever-steadfast yogi who constantly and daily remembers me for a long time, not thinking of anything else with a single-minded or one-pointed focus, O Partha."}], "near_dups": []}, {"id": 179, "text": "Reach the lasting, and leave suffering's cycle behind.", "best_verse": "8:16", "rationale": "Those who attain the Supreme escape rebirth into this impermanent place of pain; even Brahma's world returns.", "verses": [{"ref": "8:15", "text": "Having attained Me, these great souls do not take birth again here—a place of pain and impermanence—but have reached the highest perfection of liberation."}, {"ref": "8:16", "text": "All the worlds, including the world of Brahma, are subject to return again, O Arjuna; but he who reaches Me, O son of Kunti, has no rebirth."}], "near_dups": []}, {"id": 180, "text": "Everything built in time will dissolve in time.", "best_verse": "8:19", "rationale": "The cosmic day-and-night cycle shows all manifest worlds and beings arise and dissolve repeatedly — the applicable lesson is the impermanence of all time-bound things.", "verses": [{"ref": "8:17", "text": "Those who know the day of Brahma, which lasts a thousand Yugas, and the night, which also lasts a thousand Yugas, know day and night."}, {"ref": "8:18", "text": "From the Unmanifested, all the manifested worlds proceed upon the arrival of the 'day'; upon the arrival of the 'night', they dissolve indeed into that which is known as the Unmanifested."}, {"ref": "8:19", "text": "This same multitude of beings, being born again and again, helplessly dissolves, O Arjuna, into the Unmanifested at the coming of the night and comes forth at the coming of the day."}], "near_dups": []}, {"id": 181, "text": "Seek the eternal that survives when all else ends.", "best_verse": "8:21", "rationale": "Beyond the dissolving unmanifest is an eternal one that is never destroyed — the highest, non-returning goal.", "verses": [{"ref": "8:20", "text": "But verily, there exists higher than this Unmanifested, another Unmanifested Eternal, which is not destroyed even when all beings are destroyed."}, {"ref": "8:21", "text": "What is known as the Unmanifested and the Imperishable, That is said to be the highest goal. Those who reach It do not return (to this Samsara). That is My supreme abode (place or state)."}], "near_dups": []}, {"id": 182, "text": "Give your whole heart to one undivided aim.", "best_verse": "8:22", "rationale": "The highest is reached by unswerving, single-pointed devotion to the one who pervades all.", "verses": [{"ref": "8:22", "text": "That highest Purusha, O Arjuna, is attainable by unswerving devotion to Him alone, within Whom all beings dwell and by Whom all this is pervaded."}], "near_dups": []}, {"id": 183, "text": "Move toward the light, not toward the smoke.", "best_verse": "8:26", "rationale": "The two paths (bright leading to no return, dark leading to return) are largely cosmological; the extractable teaching is to choose the path of light. Verses 24-25's solstice/fortnight enumeration is technical.", "verses": [{"ref": "8:23", "text": "Now I will tell you, O chief of the Bharatas, the times of departure at which the Yogis will return or not return."}, {"ref": "8:24", "text": "Fire, light, daytime, the bright fortnight, the six months of the northern path of the sun (the northern solstice) departing, then men who know Brahman go to Brahman."}, {"ref": "8:25", "text": "Attaining the lunar light through smoke, night time, the dark fortnight, and the six months of the southern path of the sun (the southern solstice), the yogi returns."}, {"ref": "8:26", "text": "The bright and dark paths of the world are thought to be eternal; one leads to no return, and the other leads to return."}], "near_dups": []}, {"id": 184, "text": "Stay steadfast in practice through every season.", "best_verse": "8:27", "rationale": "Knowing the paths, the yogi is never deluded and remains steadfast in yoga at all times.", "verses": [{"ref": "8:27", "text": "Knowing these paths, O Arjuna, no yogi is deluded; therefore, at all times, be steadfast in yoga."}], "near_dups": []}, {"id": 185, "text": "Inner practice outlasts every ritual and reward.", "best_verse": "8:28", "rationale": "The yogi surpasses the merits of study, sacrifice, and austerity, reaching the Supreme Abode.", "verses": [{"ref": "8:28", "text": "Whatever fruit of merit is declared (in the scriptures) to accrue from (the study of) the Vedas, (the performance of) sacrifices, (the practice of) austerities, and gifts, beyond all this goes the Yogi, having known this; and he attains to the Supreme, Primeval (first or ancient) Abode."}], "near_dups": []}], "skipped": []}, {"chapter": 9, "lessons": [{"id": 186, "text": "Approach sacred knowledge without cynicism or cavil.", "best_verse": "9:1", "rationale": "The secret is declared to one who does not cavil; open, uncynical receptivity is the prerequisite.", "verses": [{"ref": "9:1", "text": "The Blessed Lord said, \"I shall now declare to thee, who does not cavil, the greatest secret—the knowledge combined with experience (Self-realisation). Having known this, thou shalt be free from evil.\""}], "near_dups": []}, {"id": 187, "text": "The highest path is the simplest to walk.", "best_verse": "9:2", "rationale": "The royal science is called supremely pure yet very easy to perform and imperishable.", "verses": [{"ref": "9:2", "text": "This is the royal science, the royal secret, the supreme purifier, realizable by direct intuitive knowledge, according to righteousness, very easy to perform and imperishable."}], "near_dups": []}, {"id": 188, "text": "Without faith, you circle back where you started.", "best_verse": "9:3", "rationale": "Those lacking faith return to the worldly path without attaining the divine.", "verses": [{"ref": "9:3", "text": "Those who have no faith in this Dharma, O Parantapa, return to the path of this world without attaining Me."}], "near_dups": []}, {"id": 189, "text": "The divine pervades everything yet is bound by nothing.", "best_verse": "9:4", "rationale": "All beings rest in the divine as wind rests in ether, yet it does not dwell in them; pervasion without attachment.", "verses": [{"ref": "9:4", "text": "All of this world is pervaded by Me in My unmanifest aspect; all beings exist within Me, but I do not dwell within them."}, {"ref": "9:5", "text": "Nor do beings exist in Me (in reality); behold, My divine Yoga, which supports all beings, but does not dwell in them, is My Self, the efficient cause of beings."}, {"ref": "9:6", "text": "As the mighty wind, moving everywhere, always rests in the ether, so too, know that all beings rest in Me."}], "near_dups": []}, {"id": 190, "text": "All that arises will dissolve and rise again.", "best_verse": "9:7", "rationale": "Beings return to nature at the end of a cycle and are sent forth again; the rhythm of dissolution and renewal.", "verses": [{"ref": "9:7", "text": "All beings, O Arjuna, go into My Nature at the end of a Kalpa; I send them forth again at the beginning of the next Kalpa."}, {"ref": "9:8", "text": "Animating My Nature, I again and again send forth all this multitude of beings, helpless under the force of Nature."}], "near_dups": []}, {"id": 191, "text": "Act while resting untouched, like a witness.", "best_verse": "9:9", "rationale": "The divine sits indifferent and unattached, so its acts do not bind; a model for acting without entanglement.", "verses": [{"ref": "9:9", "text": "These acts do not bind Me, O Arjuna, sitting as one indifferent, unattached to those acts."}, {"ref": "9:10", "text": "Under Me, as supervisor, Nature produces the moving and the unmoving; therefore, O Arjuna, the world revolves."}], "near_dups": []}, {"id": 192, "text": "Do not dismiss the sacred in ordinary form.", "best_verse": "9:11", "rationale": "Fools disregard the divine clad in human form, and their hopes and deeds turn vain; a warning against shallow judgment.", "verses": [{"ref": "9:11", "text": "Fools disregard Me, clad in human form, not knowing My higher Being as the great Lord of all beings."}, {"ref": "9:12", "text": "They are possessed of the deceitful nature of demons and undivine beings, filled with vain hopes, vain actions, and vain knowledge that is senseless."}], "near_dups": []}, {"id": 193, "text": "Worship with a single, undivided mind.", "best_verse": "9:13", "rationale": "Great souls worship with single-minded devotion, firm in their vows and constant in striving.", "verses": [{"ref": "9:13", "text": "But the great souls, O Arjuna, partaking of My divine nature, worship Me with a single-minded devotion, knowing Me as the imperishable source of all beings."}, {"ref": "9:14", "text": "Always glorifying Me, striving, firm in their vows, prostrating themselves before Me, they worship Me with steadfast devotion."}], "near_dups": []}, {"id": 194, "text": "See the one divine behind every form.", "best_verse": "9:18", "rationale": "The divine is named as goal, shelter, mother, father, and seed of all; worship it as one yet manifold everywhere.", "verses": [{"ref": "9:15", "text": "Others also, sacrificing with the wisdom-sacrifice, worship Me, the All-Faced, as one, distinct, and manifold."}, {"ref": "9:16", "text": "I am Kratu; I am Yajna; I am the offering to the manes; I am the medicinal herbs and all plants; I am the Mantra; I am also the ghee or melted butter; I am the fire; I am the oblation."}, {"ref": "9:17", "text": "I am the father of this world, the mother, the dispenser of the fruits of actions, and the grandfather; the one thing to be known, the purifier, the sacred monosyllable (Om), and also the Rik, Sama, and Yajur Vedas."}, {"ref": "9:18", "text": "I am the goal, the supporter, the Lord, the witness, the abode, the shelter, the friend, the origin, the dissolution, the foundation, the treasure-house, and the imperishable seed."}], "near_dups": [{"id": 81, "score": 0.946}], "suggestion": {"action": "review", "why": "Divine-in-all recurs 3x. 163 (in everything you see) and 194 (behind every form) are distinct facets; 81 (in every act) is close to 163 — merge or keep, your call."}}, {"id": 195, "text": "Ritual rewards run out; the divine does not.", "best_verse": "9:21", "rationale": "Vedic ritualists win heaven but return when their merit is exhausted, caught in coming and going.", "verses": [{"ref": "9:19", "text": "As the sun, I give heat; I withhold and send forth the rain; I am immortality and also death, existence and non-existence, O Arjuna."}, {"ref": "9:20", "text": "The knowers of the three Vedas, the drinkers of Soma, purified of all sins, worshipping Me through sacrifices, pray for the way to heaven; they reach the holy world of the Lord of the gods and enjoy the divine pleasures of the gods in heaven."}, {"ref": "9:21", "text": "They, having enjoyed the vast heaven, enter the world of mortals when their merit is exhausted; thus abiding by the injunctions of the three (Vedas) and desiring objects of desires, they attain to the state of coming and going."}], "near_dups": []}, {"id": 196, "text": "Devote yourself fully, and your needs are carried.", "best_verse": "9:22", "rationale": "For those who worship with undivided minds, the divine secures what they lack and preserves what they have.", "verses": [{"ref": "9:22", "text": "For those men who worship Me alone, thinking of no one else, for those ever-united, I secure what they have not already possessed and preserve what they already possess."}], "near_dups": []}, {"id": 197, "text": "Every sincere prayer reaches the same source.", "best_verse": "9:23", "rationale": "Even worship offered to other gods reaches the one divine; worshippers go to whatever they truly seek.", "verses": [{"ref": "9:23", "text": "Even those devotees who, endowed with faith, worship other gods, worship Me alone, O Arjuna, but by the wrong method."}, {"ref": "9:24", "text": "For I alone am the enjoyer and Lord of all sacrifices; but they do not know Me in reality, and thus they return to this mortal world."}, {"ref": "9:25", "text": "The worshippers of the gods go to them; the ancestor-worshippers go to the manes; the worshippers of the deities who preside over the elements go to them; but My devotees come to Me."}], "near_dups": []}, {"id": 198, "text": "Even a leaf, given with love, is enough.", "best_verse": "9:26", "rationale": "A leaf, flower, fruit, or water offered with devotion by a pure heart is accepted; the sincerity matters, not the size.", "verses": [{"ref": "9:26", "text": "Whoever offers Me with devotion a leaf, a flower, a fruit, or a little water, that, so offered devotedly by the pure-minded, I accept."}], "near_dups": []}, {"id": 199, "text": "Offer whatever you do as devotion.", "best_verse": "9:27", "rationale": "Whatever you do, eat, give, or practice, do it as an offering to the divine.", "verses": [{"ref": "9:27", "text": "Whatever you do, whatever you eat, whatever you offer in sacrifice, whatever you give, whatever austerity you practice, O Arjuna, do it as an offering to Me."}], "near_dups": []}, {"id": 200, "text": "Offer your actions and their fruits lose their grip.", "best_verse": "9:28", "rationale": "Offering all deeds frees you from the bonds of good and evil fruits through the yoga of renunciation.", "verses": [{"ref": "9:28", "text": "Thus, you shall be freed from the bonds of actions yielding good and evil fruits; with the mind steadfast in the Yoga of renunciation, and liberated, you shall come to Me."}], "near_dups": []}, {"id": 201, "text": "The divine is equal to all, yet near to the devoted.", "best_verse": "9:29", "rationale": "None is hateful or dear, yet those who worship with devotion dwell in the divine and it in them.", "verses": [{"ref": "9:29", "text": "I am the same to all beings; there is none hateful or dear to Me; but those who worship Me with devotion are in Me, and I am also in them."}], "near_dups": []}, {"id": 202, "text": "No one who truly turns back is beyond redemption.", "best_verse": "9:31", "rationale": "Even the most sinful, once rightly resolved in devotion, soon becomes righteous; the devotee never perishes.", "verses": [{"ref": "9:30", "text": "Even if the most sinful worships Me, with devotion to no one else, he should indeed be regarded as righteous, for he has rightly resolved."}, {"ref": "9:31", "text": "Soon he becomes righteous and attains eternal peace; O Arjuna, proclaim thou for certain that My devotee never perishes."}], "near_dups": []}, {"id": 203, "text": "The highest goal is open to everyone.", "best_verse": "9:32", "rationale": "All who take refuge, regardless of birth or station, attain the supreme goal.", "verses": [{"ref": "9:32", "text": "For, taking refuge in Me, they who, O Arjuna, may be of a sinful birth—women, Vaisyas, and Sudras—attain the Supreme Goal."}, {"ref": "9:33", "text": "How much more easily, then, do Brahmins and devoted royal saints attain the goal? Having come to this impermanent and unhappy world, do thou worship Me."}], "near_dups": []}, {"id": 204, "text": "Fix your mind, bow, and give yourself wholly.", "best_verse": "9:34", "rationale": "The chapter closes with total self-offering: mind, devotion, sacrifice, and reverence united toward the supreme.", "verses": [{"ref": "9:34", "text": "Fix your mind on Me; be devoted to Me; sacrifice to Me; bow down to Me; having thus united your whole self to Me, taking Me as the supreme goal, you will come to Me."}], "near_dups": []}], "skipped": []}, {"chapter": 10, "lessons": [{"id": 205, "text": "Know the divine as unborn and beginningless, and be freed from delusion.", "best_verse": "10:3", "rationale": "Verses 1-3 frame the chapter: knowing the source as unborn Lord liberates mortals from delusion and sin.", "verses": [{"ref": "10:1", "text": "The Blessed Lord said, Again, O mighty-armed Arjuna, listen to my supreme word which I will declare to you, who are beloved, for your welfare."}, {"ref": "10:2", "text": "Neither the hosts of the gods nor the great sages know My origin; for I am the source of all the gods and the great sages in every way."}, {"ref": "10:3", "text": "He who knows Me as unborn and beginningless, as the great Lord of the worlds, he among mortals is undeluded and is liberated from all sins."}], "near_dups": []}, {"id": 206, "text": "Absorb your mind in the divine and awaken others by sharing it.", "best_verse": "10:9", "rationale": "The wise, rooted in the source of all, worship with delight and enlighten one another — the devotional response to divine origin.", "verses": [{"ref": "10:8", "text": "I am the source of all; from me everything evolves; Understanding this, the wise, endowed with meditation, worship me."}, {"ref": "10:9", "text": "With their minds and lives wholly absorbed in Me, they enlighten each other and ever speak of Me, being satisfied and delighted."}], "near_dups": []}, {"id": 207, "text": "Worship steadfastly with love, and clear discernment will be given.", "best_verse": "10:10", "rationale": "Loving, steadfast devotion earns the yoga of discrimination that leads to the divine.", "verses": [{"ref": "10:10", "text": "To those who are ever steadfast, worshipping me with love, I give the yoga of discrimination, by which they come to me."}], "near_dups": []}, {"id": 208, "text": "Let the lamp of knowledge burn away the darkness of ignorance.", "best_verse": "10:11", "rationale": "The divine dwelling within destroys ignorance with the luminous lamp of knowledge.", "verses": [{"ref": "10:11", "text": "Out of mere compassion for them, I, dwelling within their selves, destroy the darkness born of ignorance with the luminous lamp of knowledge."}], "near_dups": [{"id": 105, "score": 0.94}], "suggestion": {"action": "keep", "absorbs": [105], "why": "'Knowledge burns away ignorance' (sun 5:16 / lamp 10:11) — same metaphor. Merge into the lamp phrasing (208), add 5:16."}}, {"id": 209, "text": "See every glory and power as a spark of the divine splendor.", "best_verse": "10:41", "rationale": "Whatever is glorious, prosperous, or powerful is a fragment of divine splendor.", "verses": [{"ref": "10:41", "text": "Whatever being there is glorious, prosperous, or powerful, know that to be a manifestation of a part of My splendor."}], "near_dups": []}, {"id": 210, "text": "Trust that a single fragment of the divine upholds the whole world.", "best_verse": "10:42", "rationale": "The closing teaching: the divine supports this entire universe with just one part of itself.", "verses": [{"ref": "10:42", "text": "But, of what avail is the knowledge of all these details to you, O Arjuna? I exist, supporting this whole world with one part of Myself."}], "near_dups": []}], "skipped": [{"chapter": 10, "v": 4, "reason": "descriptive list — qualities of beings arising from the divine"}, {"chapter": 10, "v": 5, "reason": "descriptive list — qualities of beings arising from the divine"}, {"chapter": 10, "v": 6, "reason": "narrative — origin of the great sages and Manus"}, {"chapter": 10, "v": 7, "reason": "descriptive — restates knowing manifestations, overlaps origin teaching"}, {"chapter": 10, "v": 12, "reason": "narrative — Arjuna's praise of Krishna"}, {"chapter": 10, "v": 13, "reason": "narrative — Arjuna citing the sages"}, {"chapter": 10, "v": 14, "reason": "narrative — Arjuna affirming belief"}, {"chapter": 10, "v": 15, "reason": "narrative — Arjuna's continued praise"}, {"chapter": 10, "v": 16, "reason": "narrative — Arjuna's request to hear the glories"}, {"chapter": 10, "v": 17, "reason": "narrative — Arjuna asking how to meditate"}, {"chapter": 10, "v": 18, "reason": "narrative — Arjuna's request for more detail"}, {"chapter": 10, "v": 19, "reason": "narrative — Krishna's preface to the enumeration"}, {"chapter": 10, "v": 20, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 21, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 22, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 23, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 24, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 25, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 26, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 27, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 28, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 29, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 30, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 31, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 32, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 33, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 34, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 35, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 36, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 37, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 38, "reason": "vibhuti enumeration — descriptive list"}, {"chapter": 10, "v": 39, "reason": "descriptive — the divine as seed of all beings, restates pervasiveness"}, {"chapter": 10, "v": 40, "reason": "narrative — no end to the divine glories, closing the list"}]}, {"chapter": 11, "lessons": [{"id": 211, "text": "Bow your head before what dwarfs you.", "best_verse": "11:14", "rationale": "Arjuna, awestruck and trembling, joins his palms and bows — the human response of humility before the vast.", "verses": [{"ref": "11:14", "text": "Then, Arjuna, filled with wonder and his hair standing on end, bowed his head to the God and spoke with palms joined."}], "near_dups": []}, {"id": 212, "text": "Do your part; the outcome is already set.", "best_verse": "11:33", "rationale": "'I am Time, the destroyer; they are already slain — be a mere instrument.' Act your role; the result is not yours to author.", "verses": [{"ref": "11:32", "text": "The Blessed Lord said, \"I am the full-grown, world-destroying Time, now engaged in destroying the worlds. Even without you, none of the warriors arrayed in the hostile armies will live.\""}, {"ref": "11:33", "text": "Therefore, stand up and obtain fame. Conquer the enemies and enjoy the unparalleled kingdom. Verily, by Me they have already been slain; be thou a mere instrument, O Arjuna."}], "near_dups": []}, {"id": 213, "text": "Fight your battle without fear of losing.", "best_verse": "11:34", "rationale": "Told the outcome is decided, Arjuna is urged to act with courage, not distress: fight and you shall prevail.", "verses": [{"ref": "11:34", "text": "Drona, Bhishma, Jayadratha, Karna, and other brave warriors have already been slain by Me; do not be distressed with fear; fight and you shall conquer your enemies in battle."}], "near_dups": []}, {"id": 214, "text": "Apologize for the times you took greatness lightly.", "best_verse": "11:42", "rationale": "Arjuna repents for his casual, familiar treatment of Krishna at play and meals, and humbly begs forgiveness.", "verses": [{"ref": "11:41", "text": "Whatever I have presumptuously said from carelessness or love, addressing You as O Krishna! O Yadava! O Friend! regarding You merely as a friend, unknowing of Your greatness."}, {"ref": "11:42", "text": "In whatever way I may have insulted You for the sake of fun, while at play, reposing, sitting, or at meals, when alone (with You), O Krishna, or in company, that I implore You, immeasurable one, to forgive."}, {"ref": "11:43", "text": "Thou art the Father of this world, both moving and unmoving. Thou art to be adored by this world; Thou, the greatest Guru; for none exists who is equal to Thee; how then could there be another superior to Thee in the three worlds, O Being of unrivaled power?"}, {"ref": "11:44", "text": "Therefore, bowing down and prostrating my body, I crave Thy forgiveness, O adorable Lord. As a father forgives his son, a friend his dear friend, a lover his beloved, even so may Thou forgive me, O God."}], "near_dups": []}, {"id": 215, "text": "Only devotion, not ritual, reveals the deepest truth.", "best_verse": "11:54", "rationale": "Not by Vedas, austerity, or sacrifice — but by single-minded devotion alone can the divine be truly known and seen.", "verses": [{"ref": "11:53", "text": "Neither by the Vedas, nor by austerity, nor by gift, nor by sacrifice can I be seen in this form as thou hast seen Me so easily."}, {"ref": "11:54", "text": "But by single-minded devotion, I can be known, seen, and entered into in reality, O Arjuna."}], "near_dups": []}, {"id": 216, "text": "Work for the sacred, unattached and free of enmity.", "best_verse": "11:55", "rationale": "The one who acts for the Supreme, free from attachment and bearing no hatred toward any being, reaches the divine.", "verses": [{"ref": "11:55", "text": "He who does all actions for Me, who regards Me as the Supreme, who is devoted to Me, who is free from attachment, who bears no enmity towards any creature, he comes to Me, O Arjuna."}], "near_dups": []}], "skipped": [{"chapter": 11, "v": 1, "reason": "narrative — Arjuna's delusion dispelled, asks to see the form"}, {"chapter": 11, "v": 2, "reason": "narrative — Arjuna's request preamble"}, {"chapter": 11, "v": 3, "reason": "narrative — Arjuna requests to behold the divine form"}, {"chapter": 11, "v": 4, "reason": "narrative — Arjuna's request to see the imperishable Self"}, {"chapter": 11, "v": 5, "reason": "cosmic-form description"}, {"chapter": 11, "v": 6, "reason": "cosmic-form description"}, {"chapter": 11, "v": 7, "reason": "cosmic-form description"}, {"chapter": 11, "v": 8, "reason": "narrative — granting of the divine eye"}, {"chapter": 11, "v": 9, "reason": "narrative — Sanjaya narrates the revealing of the form"}, {"chapter": 11, "v": 10, "reason": "cosmic-form description"}, {"chapter": 11, "v": 11, "reason": "cosmic-form description"}, {"chapter": 11, "v": 12, "reason": "cosmic-form description"}, {"chapter": 11, "v": 13, "reason": "cosmic-form description"}, {"chapter": 11, "v": 15, "reason": "cosmic-form description"}, {"chapter": 11, "v": 16, "reason": "cosmic-form description"}, {"chapter": 11, "v": 17, "reason": "cosmic-form description"}, {"chapter": 11, "v": 18, "reason": "cosmic-form description — praise of the Supreme"}, {"chapter": 11, "v": 19, "reason": "cosmic-form description"}, {"chapter": 11, "v": 20, "reason": "cosmic-form description"}, {"chapter": 11, "v": 21, "reason": "cosmic-form description"}, {"chapter": 11, "v": 22, "reason": "cosmic-form description"}, {"chapter": 11, "v": 23, "reason": "cosmic-form description"}, {"chapter": 11, "v": 24, "reason": "cosmic-form description"}, {"chapter": 11, "v": 25, "reason": "cosmic-form description"}, {"chapter": 11, "v": 26, "reason": "cosmic-form description — warriors entering the mouths"}, {"chapter": 11, "v": 27, "reason": "cosmic-form description"}, {"chapter": 11, "v": 28, "reason": "cosmic-form description"}, {"chapter": 11, "v": 29, "reason": "cosmic-form description"}, {"chapter": 11, "v": 30, "reason": "cosmic-form description"}, {"chapter": 11, "v": 31, "reason": "narrative — Arjuna asks who this fierce form is"}, {"chapter": 11, "v": 35, "reason": "narrative — Arjuna trembling, prostrates himself"}, {"chapter": 11, "v": 36, "reason": "cosmic-form description — praise"}, {"chapter": 11, "v": 37, "reason": "cosmic-form description — praise"}, {"chapter": 11, "v": 38, "reason": "cosmic-form description — praise"}, {"chapter": 11, "v": 39, "reason": "cosmic-form description — salutations"}, {"chapter": 11, "v": 40, "reason": "cosmic-form description — salutations"}, {"chapter": 11, "v": 45, "reason": "narrative — plea to restore the familiar form"}, {"chapter": 11, "v": 46, "reason": "narrative — plea to see the former four-armed form"}, {"chapter": 11, "v": 47, "reason": "narrative — grace of showing the form (redundant with devotion lesson)"}, {"chapter": 11, "v": 48, "reason": "cosmic-form description — form unseen by others (redundant with 53-54)"}, {"chapter": 11, "v": 49, "reason": "narrative — reassurance to not fear"}, {"chapter": 11, "v": 50, "reason": "narrative — Krishna resumes his gentle form"}, {"chapter": 11, "v": 51, "reason": "narrative — Arjuna composed on seeing the human form"}, {"chapter": 11, "v": 52, "reason": "cosmic-form description — rarity of the vision"}]}, {"chapter": 12, "lessons": [{"id": 217, "text": "Loving the personal divine beats worshipping the abstract.", "best_verse": "12:2", "rationale": "Arjuna's question and Krishna's verdict: those who fix their minds on a personal, knowable divine with faith are the best in yoga.", "verses": [{"ref": "12:1", "text": "Arjuna said, \"Which of them are better versed in Yoga—those who steadfastly worship You, or those who worship the imperishable and the unmanifested?\""}, {"ref": "12:2", "text": "The Blessed Lord said, \"In My opinion, those who fix their minds on Me, worship Me ever steadfastly, and are endowed with supreme faith, are the best in Yoga.\""}], "near_dups": []}, {"id": 218, "text": "The formless path is valid but harder to walk.", "best_verse": "12:5", "rationale": "Worshippers of the unmanifest also reach the goal by restraining senses and serving all, but their road is steeper for embodied beings.", "verses": [{"ref": "12:3", "text": "Those who worship the imperishable, the indefinable, the unmanifest, the omnipresent, the unthinkable, the immovable, and the eternal."}, {"ref": "12:4", "text": "Having restrained all the senses, being even-minded everywhere, and intent on the welfare of all beings, they verily come unto Me."}, {"ref": "12:5", "text": "Greater is their trouble whose minds are set on the unmanifested, for the goal of the unmanifested is very hard for the embodied to reach."}], "near_dups": []}, {"id": 219, "text": "Surrender your whole self and be carried across.", "best_verse": "12:7", "rationale": "Those who offer all actions and rest their minds on the divine are swiftly rescued from the ocean of samsara.", "verses": [{"ref": "12:6", "text": "But to those who worship Me, renouncing all actions in Me, regarding Me as the supreme goal, meditating on Me with single-minded yoga."}, {"ref": "12:7", "text": "To those whose minds are set on Me, O Arjuna, verily I soon become the savior out of the ocean of Samsara."}], "near_dups": [{"id": 364, "score": 0.946}], "suggestion": {"action": "cut", "into": 364, "why": "'Surrender your whole being' — 12:7 and 18:62 restate one idea. Merge; keep 364, add 12:7."}}, {"id": 220, "text": "First, simply fix your mind on the divine.", "best_verse": "12:8", "rationale": "Top rung of the graded ladder: absorb mind and intellect fully in the divine and dwell there.", "verses": [{"ref": "12:8", "text": "Fix your mind on Me, and your intellect in Me. Then you will certainly live in Me alone hereafter."}], "near_dups": [{"id": 366, "score": 0.95}], "suggestion": {"action": "cut", "into": 366, "why": "'Fix your mind on the divine' — 12:8 and 18:65 are the same instruction. Merge; keep 366, add 12:8."}}, {"id": 221, "text": "If you cannot hold focus, practice reaching for it.", "best_verse": "12:9", "rationale": "Second rung: when steady focus fails, use repeated disciplined practice (abhyasa yoga) to draw near.", "verses": [{"ref": "12:9", "text": "If you are unable to fix your mind steadily on Me, then seek to reach Me through the yoga of constant practice, O Arjuna."}], "near_dups": []}, {"id": 222, "text": "If practice is too hard, just work for the divine.", "best_verse": "12:10", "rationale": "Third rung: even without practice, dedicate your actions to the divine and you still attain perfection.", "verses": [{"ref": "12:10", "text": "If you are unable to practice even this Abhyasa Yoga, be intent on doing actions for My sake; even by doing actions for My sake, you will attain perfection."}], "near_dups": []}, {"id": 223, "text": "If all else fails, at least surrender the results.", "best_verse": "12:11", "rationale": "Lowest rung of the fallback ladder: renounce the fruits of every action with self-control.", "verses": [{"ref": "12:11", "text": "If you are unable to do even this, then, resort to union with Me and renounce the fruits of all actions with self-control."}], "near_dups": []}, {"id": 224, "text": "Let go of outcomes and peace arrives at once.", "best_verse": "12:12", "rationale": "Renouncing the fruits of action is ranked above knowledge and meditation because peace immediately follows it.", "verses": [{"ref": "12:12", "text": "Better indeed is knowledge than practice; better than knowledge is meditation; better than meditation is the renunciation of the fruits of actions: peace immediately follows renunciation."}], "near_dups": []}, {"id": 225, "text": "Hate no creature; be a friend to all.", "best_verse": "12:13", "rationale": "Opens the devotee-qualities list: freedom from hatred, friendliness, and compassion toward every being.", "verses": [{"ref": "12:13", "text": "He who hates no creature, is friendly and compassionate to all, is free from attachment and egoism, is balanced in pleasure and pain, and is forgiving."}], "near_dups": []}, {"id": 226, "text": "Stay balanced in pleasure and pain, quick to forgive.", "best_verse": "12:13", "rationale": "Same verse names a distinct virtue: evenness across pleasure and pain, free of ego, and forgiving.", "verses": [{"ref": "12:13", "text": "He who hates no creature, is friendly and compassionate to all, is free from attachment and egoism, is balanced in pleasure and pain, and is forgiving."}], "near_dups": []}, {"id": 227, "text": "Be content and steady, your resolve unshaken.", "best_verse": "12:14", "rationale": "The devotee dear to the divine is ever content, steady in meditation, self-controlled, and firm in conviction.", "verses": [{"ref": "12:14", "text": "Ever content, steady in meditation, self-controlled, possessing firm conviction, with the mind and intellect dedicated to Me, he, My devotee, is dear to Me."}], "near_dups": []}, {"id": 228, "text": "Neither disturb the world nor let it disturb you.", "best_verse": "12:15", "rationale": "Distinct quality: causing no agitation to others and remaining free from joy, anger, fear, and anxiety.", "verses": [{"ref": "12:15", "text": "He whom the world does not agitate, and who cannot be agitated by the world, and who is freed from joy, anger, fear, and anxiety—he is dear to Me."}], "near_dups": []}, {"id": 229, "text": "Want nothing, stay pure, and drop every anxious scheme.", "best_verse": "12:16", "rationale": "The devotee is free from wants, pure, capable, unconcerned, and has renounced all anxious undertakings.", "verses": [{"ref": "12:16", "text": "He who is free from wants, pure, expert, unconcerned, and free from pain, renouncing all undertakings and commencements, he who is devoted to Me is dear to Me."}], "near_dups": []}, {"id": 230, "text": "Stop chasing and recoiling; rise above good and bad.", "best_verse": "12:17", "rationale": "Neither rejoicing nor hating, grieving nor craving, the devotee renounces both good and evil in devotion.", "verses": [{"ref": "12:17", "text": "He who neither rejoices nor hates, nor grieves nor desires, renouncing both good and evil, and who is full of devotion, is dear to Me."}], "near_dups": []}, {"id": 231, "text": "Treat friend and foe, honor and insult, the same.", "best_verse": "12:18", "rationale": "Equanimity toward friend and enemy, honor and dishonor, heat and cold, pleasure and pain, free of attachment.", "verses": [{"ref": "12:18", "text": "He who is the same to foe and friend, and also in honor and dishonor, who is the same in cold and heat, in pleasure and pain, and who is free from attachment."}], "near_dups": []}, {"id": 232, "text": "Take praise and blame alike; be content with anything.", "best_verse": "12:19", "rationale": "Closing devotee virtue: equal to censure and praise, silent, satisfied with whatever comes, steady-minded.", "verses": [{"ref": "12:19", "text": "He to whom censure and praise are equal, who is silent, content with anything, homeless, of a steady mind, and full of devotion; that man is dear to me."}], "near_dups": []}, {"id": 233, "text": "Walk this path with faith and become truly beloved.", "best_verse": "12:20", "rationale": "Summary verse: those who follow this immortal dharma with faith, making the divine their goal, are exceedingly dear.", "verses": [{"ref": "12:20", "text": "They who follow this immortal Dharma, endowed with faith and regarding Me as their supreme goal, are exceedingly dear to Me."}], "near_dups": []}], "skipped": []}, {"chapter": 13, "lessons": [{"id": 234, "text": "Know your body as a field you observe.", "best_verse": "13:2", "rationale": "Defines the body as the 'field' and the self as its knower.", "verses": [{"ref": "13:2", "text": "The Blessed Lord said, \"O Arjuna, this body is called the field; he who knows it is called the knower of the field by those who know them.\""}], "near_dups": []}, {"id": 235, "text": "See the same knower present in every field.", "best_verse": "13:3", "rationale": "The one knower dwells in all fields alike.", "verses": [{"ref": "13:3", "text": "Do thou also know Me as the knower of the field in all fields, O Arjuna. Knowledge of both the field and the knower of the field is considered by Me to be the knowledge."}], "near_dups": []}, {"id": 236, "text": "Count desire, hatred, and pain as passing field, not self.", "best_verse": "13:7", "rationale": "Lists the field's constituents and modifications, distinct from the knower.", "verses": [{"ref": "13:6", "text": "The great elements, egoism, intellect, and also the Unmanifested Nature, the ten senses, and one mind, and the five objects of the senses."}, {"ref": "13:7", "text": "Desire, hatred, pleasure, pain, the aggregate (body), intelligence, and fortitude—the field has thus been briefly described with its modifications."}], "near_dups": []}, {"id": 237, "text": "Stay humble, upright, and free of pretense.", "best_verse": "13:8", "rationale": "Mines humility, unpretentiousness, and uprightness from the knowledge list.", "verses": [{"ref": "13:8", "text": "Humility, unpretentiousness, non-injury, forgiveness, uprightness, service to the teacher, purity, steadfastness, and self-control."}], "near_dups": []}, {"id": 238, "text": "Injure no one; forgive, and hold yourself in check.", "best_verse": "13:8", "rationale": "Mines non-injury, forgiveness, and self-control as a distinct virtue-cluster.", "verses": [{"ref": "13:8", "text": "Humility, unpretentiousness, non-injury, forgiveness, uprightness, service to the teacher, purity, steadfastness, and self-control."}], "near_dups": []}, {"id": 239, "text": "Serve your teacher; stay pure and steadfast.", "best_verse": "13:8", "rationale": "Mines service to the teacher, purity, and steadfastness.", "verses": [{"ref": "13:8", "text": "Humility, unpretentiousness, non-injury, forgiveness, uprightness, service to the teacher, purity, steadfastness, and self-control."}], "near_dups": [{"id": 315, "score": 0.939}], "suggestion": {"action": "distinct", "why": "239 = serve your teacher as a mark of knowledge (13:8); 315 = honor teachers / bodily austerity (17:14). Different contexts — keep both."}}, {"id": 240, "text": "Loosen the ego's grip on sense pleasures.", "best_verse": "13:9", "rationale": "Indifference to sense objects and absence of egoism.", "verses": [{"ref": "13:9", "text": "Indifference to the objects of the senses and also absence of egoism; perceiving the evil in birth, death, old age, sickness, and pain."}], "near_dups": []}, {"id": 241, "text": "Face clearly the pain in birth, sickness, and death.", "best_verse": "13:9", "rationale": "Perceiving the evil in birth, death, old age, sickness, and pain.", "verses": [{"ref": "13:9", "text": "Indifference to the objects of the senses and also absence of egoism; perceiving the evil in birth, death, old age, sickness, and pain."}], "near_dups": []}, {"id": 242, "text": "Don't bind your identity to family or home.", "best_verse": "13:10", "rationale": "Non-identification of the Self with son, wife, home, and the rest.", "verses": [{"ref": "13:10", "text": "Non-attachment, non-identification of the Self with son, wife, home, and the rest, and constant even-mindedness in the face of the attainment of both desirable and undesirable."}], "near_dups": []}, {"id": 243, "text": "Stay even whether outcomes please or disappoint.", "best_verse": "13:10", "rationale": "Constant even-mindedness toward the desirable and undesirable.", "verses": [{"ref": "13:10", "text": "Non-attachment, non-identification of the Self with son, wife, home, and the rest, and constant even-mindedness in the face of the attainment of both desirable and undesirable."}], "near_dups": []}, {"id": 244, "text": "Withdraw into solitude to deepen your devotion.", "best_verse": "13:11", "rationale": "Unswerving devotion, resorting to solitude, distaste for crowds.", "verses": [{"ref": "13:11", "text": "Unswerving devotion to Me through the Yoga of non-separation, resorting to solitary places, and a distaste for the company of people."}], "near_dups": []}, {"id": 245, "text": "Keep returning your attention to the Self.", "best_verse": "13:12", "rationale": "Constancy in Self-knowledge is declared to be true knowledge.", "verses": [{"ref": "13:12", "text": "Constancy in Self-knowledge, the perception of the end of true knowledge—this is declared to be knowledge, and what is opposed to it is ignorance."}], "near_dups": []}, {"id": 246, "text": "Know the eternal that has no beginning or end.", "best_verse": "13:13", "rationale": "The beginningless Supreme Brahman, beyond being and non-being, pervading all.", "verses": [{"ref": "13:13", "text": "I will declare that which is to be known, knowing which one attains immortality; the beginningless Supreme Brahman, which is neither being nor non-being."}, {"ref": "13:14", "text": "With hands and feet everywhere, with eyes, heads, and mouths everywhere, with ears everywhere, He exists in the worlds, enveloping all."}], "near_dups": []}, {"id": 247, "text": "Support everything while clinging to nothing.", "best_verse": "13:15", "rationale": "Unattached yet supporting all; the experiencer without attachment.", "verses": [{"ref": "13:15", "text": "Shining by the functions of all the senses, yet without being attached to them; unattached, yet supporting all; devoid of qualities, yet the experiencer of them."}], "near_dups": []}, {"id": 248, "text": "Find the one presence within and beyond all beings.", "best_verse": "13:16", "rationale": "Subtle, near and far, undivided yet appearing divided in beings.", "verses": [{"ref": "13:16", "text": "It is within and without all beings, both the unmoving and the moving; It is subtle and unknowable, and It is near and far away."}, {"ref": "13:17", "text": "Undivided yet, It exists as if divided in beings; It is to be known as the supporter of beings; It devours and It generates."}], "near_dups": [{"id": 142, "score": 0.932}, {"id": 143, "score": 0.932}, {"id": 336, "score": 0.93}], "suggestion": {"action": "cut", "into": 336, "why": "Equal-vision recurs 5x. Keep three real facets: seeing the Self in all (142), worshipping the one presence (143), the indestructible reality (336). 87 duplicates 142; 248 duplicates 336."}}, {"id": 249, "text": "See the light of awareness seated in every heart.", "best_verse": "13:18", "rationale": "The Light of all lights, beyond darkness, seated in the hearts of all.", "verses": [{"ref": "13:18", "text": "That Light of all lights is said to be beyond darkness: knowledge, the knowable, and the goal of knowledge, seated in the hearts of all."}], "near_dups": []}, {"id": 250, "text": "Let nature own its actions and their effects.", "best_verse": "13:21", "rationale": "Nature is the cause of action; modifications and qualities are born from it.", "verses": [{"ref": "13:20", "text": "Know that Nature (matter) and the Spirit are both beginningless, and know also that all modifications and qualities are born from Nature."}, {"ref": "13:21", "text": "In the production of the effect and the cause, Nature (matter) is said to be the cause; in the experience of pleasure and pain, the soul is said to be the one responsible."}], "near_dups": []}, {"id": 251, "text": "Notice how clinging to moods shapes your rebirth.", "best_verse": "13:22", "rationale": "Attachment to nature's qualities causes birth in good and evil wombs.", "verses": [{"ref": "13:22", "text": "The soul seated in Nature experiences the qualities born of Nature; attachment to the qualities is the cause of its birth in good and evil wombs."}], "near_dups": []}, {"id": 252, "text": "Let the inner witness watch and permit, not meddle.", "best_verse": "13:23", "rationale": "The Supreme Soul as observer, permitter, and sustainer within the body.", "verses": [{"ref": "13:23", "text": "The Supreme Soul in this body is also called the observer, the permitter, the sustainer, the enjoyer, the great Lord, and the Supreme Self."}], "near_dups": []}, {"id": 253, "text": "Grasp spirit and matter, and end your rebirth.", "best_verse": "13:24", "rationale": "Knowing Spirit and Matter with their qualities, one is not reborn.", "verses": [{"ref": "13:24", "text": "He who thus knows the Spirit and Matter together with their qualities, in whatever condition he may be, he is not reborn."}], "near_dups": []}, {"id": 254, "text": "Reach the Self by meditation, knowledge, or action.", "best_verse": "13:25", "rationale": "The three paths by which people behold the Self.", "verses": [{"ref": "13:25", "text": "Some behold the Self within themselves through meditation, others through the Yoga of knowledge, and still others through the Yoga of action."}], "near_dups": []}, {"id": 255, "text": "Even faithful hearing can carry you past death.", "best_verse": "13:26", "rationale": "Those who worship on what they have heard also cross beyond death.", "verses": [{"ref": "13:26", "text": "Others, too, who do not know thus, worship, having heard of It from others; they, too, cross beyond death, regarding what they have heard as the supreme refuge."}], "near_dups": []}, {"id": 256, "text": "See every birth as field and knower joined.", "best_verse": "13:27", "rationale": "All beings arise from the union of the field and its knower.", "verses": [{"ref": "13:27", "text": "Wherever a being is born, whether unmoving or moving, know thou, O best of the Bharatas (Arjuna), that it is from the union of the field and its knower."}], "near_dups": []}, {"id": 257, "text": "See the imperishable Lord within all that perishes.", "best_verse": "13:28", "rationale": "He who sees the imperishable within the perishable sees truly.", "verses": [{"ref": "13:28", "text": "He who sees the Supreme Lord existing truly in all beings, the imperishable within the perishable, sees indeed."}], "near_dups": []}, {"id": 258, "text": "Seeing one Self everywhere, you stop harming yourself.", "best_verse": "13:29", "rationale": "Seeing the same Lord everywhere, one does not destroy the Self by the self.", "verses": [{"ref": "13:29", "text": "For he who truly sees the same Lord dwelling everywhere does not destroy the Self by the self; rather, he attains the highest goal."}], "near_dups": []}, {"id": 259, "text": "See that nature acts while the Self stays still.", "best_verse": "13:30", "rationale": "All actions are performed by Nature; the Self is without action.", "verses": [{"ref": "13:30", "text": "He sees, who sees that all actions are performed solely by Nature and that the Self is without action."}], "near_dups": []}, {"id": 260, "text": "See all beings resting in and rising from the One.", "best_verse": "13:31", "rationale": "Seeing all beings resting in and emanating from the One, one becomes Brahman.", "verses": [{"ref": "13:31", "text": "When a person sees all beings as resting in the One and emanating from the One alone, they then become Brahman."}], "near_dups": []}, {"id": 261, "text": "Rest as the Self that neither acts nor stains.", "best_verse": "13:32", "rationale": "The Supreme Self, dwelling in the body, neither acts nor is tainted.", "verses": [{"ref": "13:32", "text": "Being without beginning, devoid of any qualities, the Supreme Self, imperishable, though dwelling in the body, O Arjuna, neither acts nor is tainted."}], "near_dups": []}, {"id": 262, "text": "Stay unstained like space that touches everything.", "best_verse": "13:33", "rationale": "Like all-pervading ether, the Self seated in the body is not tainted.", "verses": [{"ref": "13:33", "text": "As the all-pervading ether is not tainted, due to its subtlety, so the Self seated everywhere in the body is not tainted either."}], "near_dups": []}, {"id": 263, "text": "Let one awareness light up your whole field.", "best_verse": "13:34", "rationale": "As one sun lights the world, the Self illumines the entire field.", "verses": [{"ref": "13:34", "text": "Just as the one sun illuminates the entire world, so too does the Lord of the field (Supreme Self) illuminate the entire field, O Arjuna."}], "near_dups": []}, {"id": 264, "text": "Use knowledge's eye to part the field from its knower.", "best_verse": "13:35", "rationale": "Perceiving the distinction between field and knower leads to the Supreme.", "verses": [{"ref": "13:35", "text": "They who, by the eye of knowledge, perceive the distinction between the field and its knower, as well as the liberation from the Nature of being, go to the Supreme."}], "near_dups": []}], "skipped": [{"chapter": 13, "v": 1, "reason": "Arjuna's framing question, no teaching."}, {"chapter": 13, "v": 4, "reason": "Transitional setup ('hear from Me what the field is')."}, {"chapter": 13, "v": 5, "reason": "Narrative note that sages have sung of it in many ways."}, {"chapter": 13, "v": 19, "reason": "Recap/promise summarizing the field and knowable already taught."}]}, {"chapter": 14, "lessons": [{"id": 265, "text": "Take refuge in the highest knowledge for freedom.", "best_verse": "14:2", "rationale": "Opening promise: those who take refuge in this supreme knowledge attain unity and are undisturbed by creation or dissolution.", "verses": [{"ref": "14:1", "text": "The Blessed Lord said, \"I will again declare to thee that supreme knowledge, the best of all knowledge, having known which all the sages have gone to supreme perfection after this life.\""}, {"ref": "14:2", "text": "Those who, having taken refuge in this knowledge, have attained unity with Me, are neither born at the time of creation nor disturbed at the time of dissolution."}], "near_dups": []}, {"id": 266, "text": "Remember every being springs from one divine source.", "best_verse": "14:4", "rationale": "Krishna as seed-giving father and Brahma as womb of all forms; grounds the whole chapter's teaching on where beings come from.", "verses": [{"ref": "14:3", "text": "My womb is the great Brahma; in it I place the germ; thence, O Arjuna, is the birth of all beings."}, {"ref": "14:4", "text": "Whatever forms are produced, O Arjuna, in any womb whatsoever, the great Brahma is their womb, and I am the seed-giving father."}], "near_dups": []}, {"id": 267, "text": "Recognize the three inborn forces that bind you.", "best_verse": "14:5", "rationale": "Introduces sattva, rajas, tamas as qualities born of nature that bind the embodied self; the chapter's thesis.", "verses": [{"ref": "14:5", "text": "These qualities, O Arj

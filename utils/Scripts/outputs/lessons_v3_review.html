una, born of Nature, bind fast in the body of the embodied, the indestructible: purity, passion, and inertia."}], "near_dups": []}, {"id": 268, "text": "Watch how even clarity and joy quietly bind.", "best_verse": "14:6", "rationale": "Sattva-specific: luminous and pure, yet it binds through attachment to happiness and knowledge.", "verses": [{"ref": "14:6", "text": "Of these, sattva, which is luminous and healthy due to its stainlessness, binds one by attachment to happiness and knowledge, O sinless one."}], "near_dups": []}, {"id": 269, "text": "See how craving chains you to restless action.", "best_verse": "14:7", "rationale": "Rajas-specific: passion, thirst, and attachment that bind through ceaseless action.", "verses": [{"ref": "14:7", "text": "Know, O Arjuna, that Rajas is of the nature of passion, the source of thirst and attachment; it binds fast the embodied one by attachment to action."}], "near_dups": []}, {"id": 270, "text": "Catch the dullness luring you toward sleep and neglect.", "best_verse": "14:8", "rationale": "Tamas-specific: born of ignorance, it binds through heedlessness, indolence, and sleep.", "verses": [{"ref": "14:8", "text": "But know thou Tamas to be born of ignorance, deluding all embodied beings; it binds fast, O Arjuna, through heedlessness, indolence, and sleep."}], "near_dups": []}, {"id": 271, "text": "Notice one force overpower the others, then shift.", "best_verse": "14:10", "rationale": "Each guna attaches differently and takes turns dominating; the forces are always in flux within you.", "verses": [{"ref": "14:9", "text": "Sattva attaches to happiness, Rajas to action, O Arjuna, while Tamas, verily shrouding knowledge, attaches to heedlessness."}, {"ref": "14:10", "text": "Now, O Arjuna, Sattva prevails, having overpowered Rajas and Tamas; then Rajas, having overpowered Sattva and Tamas; and then Tamas, having overpowered Sattva and Rajas."}], "near_dups": []}, {"id": 272, "text": "When insight lights every sense, harmony is guiding you.", "best_verse": "14:11", "rationale": "Diagnostic sign of sattva predominant: wisdom-light shining through every gate of the body.", "verses": [{"ref": "14:11", "text": "When the wisdom-light shines through every gate of this body, then it may be known that Sattva is predominant."}], "near_dups": []}, {"id": 273, "text": "When greed and restlessness surge, passion is driving you.", "best_verse": "14:12", "rationale": "Diagnostic sign of rajas predominant: greed, activity, restlessness, and longing.", "verses": [{"ref": "14:12", "text": "Greed, activity, the undertaking of actions, restlessness, and longing—these arise when Rajas is predominant, O Arjuna."}], "near_dups": []}, {"id": 274, "text": "When fog and laziness settle, inertia has taken hold.", "best_verse": "14:13", "rationale": "Diagnostic sign of tamas predominant: darkness, inertia, carelessness, and delusion.", "verses": [{"ref": "14:13", "text": "Darkness, inertia, carelessness, and delusion—these arise when Tamas is predominant, O Arjuna."}], "near_dups": []}, {"id": 275, "text": "Know the force ruling at death shapes your rebirth.", "best_verse": "14:15", "rationale": "Each guna dominant at death leads to a different destiny: pure worlds, rebirth among the active, or the womb of the deluded.", "verses": [{"ref": "14:14", "text": "If the embodied one meets death when Sattva is predominant, then they attain the spotless worlds of the knowers of the Highest."}, {"ref": "14:15", "text": "Meeting death in Rajas, he is born among those who are attached to action; and dying in Tamas, he is born in the womb of the thoughtless."}], "near_dups": []}, {"id": 276, "text": "Weigh each act's fruit: clarity, pain, or dullness.", "best_verse": "14:16", "rationale": "The fruits of the gunas differ: sattva yields knowledge, rajas yields pain and greed, tamas yields ignorance.", "verses": [{"ref": "14:16", "text": "They say that the fruit of good action is Sattvic and pure; indeed, the fruit of Rajas is pain, and the fruit of Tamas is ignorance."}, {"ref": "14:17", "text": "From Sattva arises knowledge, and greed from Rajas; heedlessness and delusion arise from Tamas, and also ignorance."}], "near_dups": []}, {"id": 277, "text": "Your ruling force lifts, holds, or sinks you.", "best_verse": "14:18", "rationale": "Sattvic natures ascend, rajasic dwell in the middle, tamasic descend.", "verses": [{"ref": "14:18", "text": "Those seated in Sattva ascend; those of Rajasic nature dwell in the middle; and those of Tamasic nature, abiding in the function of the lowest Guna, descend."}], "near_dups": []}, {"id": 278, "text": "See only the gunas acting, then rise beyond them.", "best_verse": "14:19", "rationale": "The seer who beholds no agent but the gunas, and knows what is higher, transcends them to immortality.", "verses": [{"ref": "14:19", "text": "When the seer beholds no agent other than the Gunas and knows that which is higher than them, he attains to My Being."}, {"ref": "14:20", "text": "The embodied one, having crossed beyond these three Gunas from which the body is evolved, is freed from birth, death, decay, and pain, and attains immortality."}], "near_dups": []}, {"id": 279, "text": "Stay unmoved whether the forces arise or fade.", "best_verse": "14:24", "rationale": "The marks of one who has transcended the gunas: neither hating nor longing, equal in pleasure and pain, praise and blame, friend and foe.", "verses": [{"ref": "14:22", "text": "The Blessed Lord said, \"When light, activity, and delusion are present, he does not hate them, nor does he long for them when they are absent."}, {"ref": "14:23", "text": "He who, seated like one unconcerned, is not moved by the dualities, and who, knowing that the dualities are active, is self-centered and does not move."}, {"ref": "14:24", "text": "Who is the same in pleasure and pain, who dwells in the Self, to whom a clod of earth, a stone, and gold are all alike, who is the same to the dear and the unfriendly, who is firm, and to whom censure and praise are one and the same."}, {"ref": "14:25", "text": "Who is the same in honor and dishonor, the same to friend and foe, abandoning all undertakings, he is said to have transcended the dualities."}], "near_dups": []}, {"id": 280, "text": "Serve with steady devotion to cross beyond them.", "best_verse": "14:26", "rationale": "Unwavering devotion is the means to cross beyond the gunas and become fit for Brahman.", "verses": [{"ref": "14:26", "text": "And he who serves Me with unwavering devotion, he, crossing beyond the dualities, is fit for becoming Brahman."}], "near_dups": []}, {"id": 281, "text": "Rest in the deathless ground behind all change.", "best_verse": "14:27", "rationale": "Krishna is the abode of Brahman, the immortal and everlasting; the unchanging support beneath the gunas' play.", "verses": [{"ref": "14:27", "text": "For I am the abode of Brahman, the immortal, immutable, and everlasting Dharma, and absolute bliss."}], "near_dups": []}], "skipped": [{"chapter": 14, "v": 21, "reason": "Arjuna's framing question asking for the marks of the transcender; the answer that follows (22-25) carries the teaching."}]}, {"chapter": 15, "lessons": [{"id": 282, "text": "Cut the tangled tree of attachment at its root.", "best_verse": "15:3", "rationale": "The upside-down cosmic tree of worldly existence, felled with the strong axe of non-attachment.", "verses": [{"ref": "15:1", "text": "The Blessed Lord said: They (the wise) speak of the indestructible peepul tree, with its roots above and branches below, whose leaves are the meters or hymns; he who knows it is a knower of the Vedas."}, {"ref": "15:2", "text": "Its branches spread below and above, nourished by the Gunas; its buds are sense-objects, and its roots stretch forth below in the world of men, originating action."}, {"ref": "15:3", "text": "Its form is not perceived here as such, nor its end, origin, foundation, or resting place; having cut asunder this firmly rooted peepul tree with the strong axe of non-attachment."}], "near_dups": []}, {"id": 283, "text": "Take refuge in the source from which none return.", "best_verse": "15:4", "rationale": "Seek the primeval Purusha, the eternal goal beyond rebirth.", "verses": [{"ref": "15:4", "text": "Then, that goal should be sought for, to which, having gone, none returns again. I seek refuge in that Primeval Purusha, from whence streamed forth the ancient activity or energy."}], "near_dups": []}, {"id": 284, "text": "Rise above pride, delusion, and the pull of opposites.", "best_verse": "15:5", "rationale": "The undeluded conquer attachment and the pairs of pleasure and pain to reach the eternal.", "verses": [{"ref": "15:5", "text": "Free from pride and delusion, victorious over the evil of attachment, dwelling constantly in the Self, their desires having completely turned away, freed from the pairs of opposites known as pleasure and pain, they, the undeluded, reach the eternal goal."}], "near_dups": [{"id": 26, "score": 0.937}], "suggestion": {"action": "distinct", "why": "26 = rise above opposites AND possessiveness (2:45); 284 = rise above pride and delusion (15:5). Different vices — keep both."}}, {"id": 285, "text": "Know yourself as an eternal fragment of the divine.", "best_verse": "15:7", "rationale": "A portion of the Lord becomes the living soul that draws the senses to itself.", "verses": [{"ref": "15:7", "text": "An eternal portion of Myself having become a living soul in the world of life, draws to itself the five senses, with the mind as the sixth, abiding in Nature."}, {"ref": "15:8", "text": "When the Lord, as the individual soul, obtains a body and when He leaves it, He takes these with Him, just as the wind takes the scents from their seats (flowers, etc.)."}, {"ref": "15:9", "text": "Presiding over the ears, eyes, touch, taste, smell, and mind, it enjoys the objects of the senses."}], "near_dups": []}, {"id": 286, "text": "Open the eye of knowledge to see the Self.", "best_verse": "15:11", "rationale": "The deluded miss the indwelling Self; those with the eye of knowledge behold Him.", "verses": [{"ref": "15:10", "text": "The deluded do not see Him who departs, stays, and enjoys; but those who possess the eye of knowledge behold Him."}, {"ref": "15:11", "text": "The yogis striving for perfection behold Him dwelling in the Self; but, the unrefined and unintelligent, even though striving, do not see Him."}], "near_dups": []}, {"id": 287, "text": "Recognize one divine light in sun, moon, and fire.", "best_verse": "15:12", "rationale": "The one energy illumines, nourishes, and digests through all of nature.", "verses": [{"ref": "15:12", "text": "That light which resides in the sun, illuminating the whole world; that which is in the moon and in the fire—know that light to be Mine."}, {"ref": "15:13", "text": "Permeating the earth, I support all beings with My energy; and having become the watery moon, I nourish all herbs."}, {"ref": "15:14", "text": "Having become the fire Vaisvanara, I abide in the bodies of living beings and, associated with the Prana and the Apana, digest the fourfold food."}], "near_dups": []}, {"id": 288, "text": "Trace your memory and knowledge to their source within.", "best_verse": "15:15", "rationale": "The divine seated in the heart is the origin of memory and knowledge.", "verses": [{"ref": "15:15", "text": "And I am seated in the hearts of all; from Me come memory and knowledge, as well as their absence. I am verily That which has to be known by all the Vedas; I am indeed the author of the Vedanta and the knower of the Vedas."}], "near_dups": []}, {"id": 289, "text": "Look beyond the changing and unchanging to the supreme.", "best_verse": "15:18", "rationale": "The Supreme Purusha transcends both the perishable and the imperishable.", "verses": [{"ref": "15:16", "text": "Two Purushas there are in this world: the perishable and the imperishable. All beings are perishable, and the Kutastha—the unchanging—is called the imperishable."}, {"ref": "15:17", "text": "But distinct is the Supreme Purusha, called the highest Self, indestructible and Lord, who pervades the three worlds and sustains them."}, {"ref": "15:18", "text": "As I transcend the perishable and am even higher than the imperishable, I am declared to be the highest Purusha in the world and in the Vedas."}], "near_dups": []}, {"id": 290, "text": "Know the supreme Self and your duty fulfills itself.", "best_verse": "15:20", "rationale": "Knowing the highest Purusha makes one wise and accomplishes all duties.", "verses": [{"ref": "15:19", "text": "He who, undeluded, knows Me as the highest Purusha, he, knowing all, worships Me with his whole being (heart), O Arjuna."}, {"ref": "15:20", "text": "Thus, I have imparted to you this most secret science, O sinless one; by knowing this, one becomes wise, and all their duties are accomplished, O Arjuna."}], "near_dups": []}], "skipped": [{"chapter": 15, "v": 6, "reason": "Purely metaphysical description of the supreme abode beyond sun, moon, and fire; no distinct practical takeaway."}]}, {"chapter": 16, "lessons": [{"id": 291, "text": "Meet danger fearlessly and keep your heart pure.", "best_verse": "16:1", "rationale": "Opens the divine list with fearlessness and purity of heart (16:1).", "verses": [{"ref": "16:1", "text": "The Blessed Lord said: Fearlessness, purity of heart, steadfastness in knowledge and yoga, almsgiving, control of the senses, sacrifice, study of scriptures, austerity, and straightforwardness."}], "near_dups": []}, {"id": 292, "text": "Master your senses and give without holding back.", "best_verse": "16:1", "rationale": "Sense-control and almsgiving named among divine endowments in 16:1.", "verses": [{"ref": "16:1", "text": "The Blessed Lord said: Fearlessness, purity of heart, steadfastness in knowledge and yoga, almsgiving, control of the senses, sacrifice, study of scriptures, austerity, and straightforwardness."}], "near_dups": []}, {"id": 293, "text": "Speak the truth and harm no living thing.", "best_verse": "16:2", "rationale": "Harmlessness and truth head the second stanza of virtues (16:2).", "verses": [{"ref": "16:2", "text": "Harmlessness, truth, absence of anger, renunciation, peacefulness, absence of crookedness, compassion for beings, non-covetousness, gentleness, modesty, and absence of fickleness."}], "near_dups": []}, {"id": 294, "text": "Let anger go; stay gentle and free of greed.", "best_verse": "16:2", "rationale": "Absence of anger, non-covetousness, and gentleness from 16:2, distinct from truth/non-violence.", "verses": [{"ref": "16:2", "text": "Harmlessness, truth, absence of anger, renunciation, peacefulness, absence of crookedness, compassion for beings, non-covetousness, gentleness, modesty, and absence of fickleness."}], "near_dups": []}, {"id": 295, "text": "Forgive readily and carry no hatred or pride.", "best_verse": "16:3", "rationale": "Forgiveness, absence of hatred and pride mark the divine-born nature (16:3).", "verses": [{"ref": "16:3", "text": "Vigor, forgiveness, fortitude, purity, absence of hatred, absence of pride—these belong to one born for a divine state, O Arjuna."}], "near_dups": []}, {"id": 296, "text": "Choose the divine path; it frees, the demonic binds.", "best_verse": "16:5", "rationale": "16:4-6 contrast the two natures: divine leads to liberation, demonic to bondage; framing verses grouped.", "verses": [{"ref": "16:4", "text": "Hypocrisy, arrogance, and self-conceit, anger, harshness, and ignorance—these belong to one who is born for a demoniacal state, O Partha."}, {"ref": "16:5", "text": "The divine nature is deemed conducive to liberation, and the demonic to bondage. Grieve not, O Arjuna, for you are born with divine endowments."}, {"ref": "16:6", "text": "There are two types of beings in this world: the divine and the demoniacal. The divine has been described at length; hear from Me, O Arjuna, about the demoniacal."}], "near_dups": []}, {"id": 297, "text": "Know what to do and what to shun.", "best_verse": "16:7", "rationale": "The demonic fail to discern right action and refrain (16:7).", "verses": [{"ref": "16:7", "text": "The demoniacal do not know what to do and what to refrain from; they have neither purity, nor right conduct, nor truth."}], "near_dups": []}, {"id": 298, "text": "Don't dismiss the world as meaningless and godless.", "best_verse": "16:8", "rationale": "The demonic worldview denies truth, morality, and God, breeding destruction (16:8-9).", "verses": [{"ref": "16:8", "text": "They say, \"This universe is without truth, without a moral basis, without a God, brought about by mutual union, with lust as its cause; what else?\""}, {"ref": "16:9", "text": "Holding this view, these ruined souls of small intellect and fierce deeds come forth as enemies of the world, intent on its destruction."}], "near_dups": []}, {"id": 299, "text": "Drop hypocrisy and the endless chase after craving.", "best_verse": "16:10", "rationale": "Insatiable desire, hypocrisy, and anxious hoarding for lust described across 16:10-12.", "verses": [{"ref": "16:10", "text": "Filled with insatiable desires, full of hypocrisy, pride, and arrogance, holding evil ideas due to delusion, they work with impure intentions."}, {"ref": "16:11", "text": "Giving themselves over to immeasurable cares that end only with death, regarding the gratification of lust as their highest aim, and feeling sure that that is all."}, {"ref": "16:12", "text": "Bound by a hundred ties of hope, given over to lust and anger, they strive to obtain hoards of wealth by unlawful means for sensual enjoyment."}], "near_dups": []}, {"id": 300, "text": "Stop counting gains as proof of your greatness.", "best_verse": "16:13", "rationale": "The demonic boast of acquisitions, conquests, and status (16:13-15).", "verses": [{"ref": "16:13", "text": "\"I have gained this today; I will fulfill this desire of mine; this is mine, and this wealth will be mine in the future.\""}, {"ref": "16:14", "text": "\"I have slain that enemy, and I shall slay others too. I am the Lord; I enjoy, I am perfect, powerful, and happy.\""}, {"ref": "16:15", "text": "\"I am wealthy and born into a noble family. Who is my equal? I shall perform sacrifices, give charity, and rejoice,\" thus deluded by ignorance."}], "near_dups": []}, {"id": 301, "text": "Untangle from fancies before delusion drags you down.", "best_verse": "16:16", "rationale": "Bewildered by fancies and snared by delusion, they fall into hell (16:16).", "verses": [{"ref": "16:16", "text": "Bewildered by many fancies, entangled in the snare of delusion, addicted to the gratification of lust, they fall into a foul hell."}], "near_dups": []}, {"id": 302, "text": "Never worship for show or to be seen.", "best_verse": "16:17", "rationale": "Ostentatious, name-only sacrifices contrary to scripture (16:17).", "verses": [{"ref": "16:17", "text": "Self-conceited, stubborn, filled with pride and intoxication of wealth, they perform sacrifices in name only for ostentation, contrary to scriptural ordinances."}], "near_dups": [{"id": 314, "score": 0.931}], "suggestion": {"action": "cut", "into": 314, "why": "'Never do good merely for show' — 16:17 and 17:12 coincide. Merge; keep 314, add 16:17."}}, {"id": 303, "text": "Let go of arrogance that turns you hateful.", "best_verse": "16:18", "rationale": "Egoism and malice breed hatred and a downward spiral of rebirth (16:18-20).", "verses": [{"ref": "16:18", "text": "Given over to egoism, power, haughtiness, lust, and anger, these malicious people hate Me in their own bodies and in the bodies of others."}, {"ref": "16:19", "text": "Those cruel haters, the worst among men in the world, I hurl those evil-doers into the wombs of demons only."}, {"ref": "16:20", "text": "Entering into demoniacal wombs and deluded, birth after birth, they do not attain Me, thus falling, O Arjuna, into a condition still lower than that."}], "near_dups": []}, {"id": 304, "text": "Shut the three gates of ruin: lust, anger, greed.", "best_verse": "16:21", "rationale": "The signature teaching of the chapter: three gates to hell (16:21).", "verses": [{"ref": "16:21", "text": "There are three gates to this hell, destructive of the self: lust, anger, and greed; therefore, one should abandon these three."}], "near_dups": []}, {"id": 305, "text": "Freed from those gates, do what truly benefits you.", "best_verse": "16:22", "rationale": "Liberation from the three gates lets you pursue the beneficial and reach the goal (16:22).", "verses": [{"ref": "16:22", "text": "A person who is liberated from these three gates of darkness, O Arjuna, practices what is beneficial for them and thus goes to the Supreme Goal."}], "near_dups": []}, {"id": 306, "text": "Don't let raw impulse override tested wisdom.", "best_verse": "16:23", "rationale": "Acting on desire while casting aside scripture yields no perfection (16:23).", "verses": [{"ref": "16:23", "text": "He who, having cast aside the ordinances of the scriptures, acts under the impulse of desire, does not attain perfection, nor happiness, nor the Supreme Goal."}], "near_dups": []}, {"id": 307, "text": "Let sound principles decide what you should do.", "best_verse": "16:24", "rationale": "Make scripture your authority for right and wrong action (16:24).", "verses": [{"ref": "16:24", "text": "Therefore, let the scripture be thy authority in determining what ought to be done and what ought not to be done. Having known what is said in the ordinance of the scriptures, thou shouldst act in this world."}], "near_dups": []}], "skipped": []}, {"chapter": 17, "lessons": [{"id": 308, "text": "You become the faith you hold.", "best_verse": "17:3", "rationale": "17:3 states the chapter's thesis directly: a person is made of their faith; as their faith is, so are they.", "verses": [{"ref": "17:1", "text": "Arjuna said, \"What is the condition of those who, disregarding the injunctions of the scriptures, perform sacrifice with faith—is it Sattva, Rajas, or Tamas, O Krishna?\""}, {"ref": "17:2", "text": "The Blessed Lord said, \"There are threefold faiths inherent in the nature of the embodied: the sattvic (pure), the rajasic (passionate), and the tamasic (dark). Hear of them.\""}, {"ref": "17:3", "text": "The faith of each is in accordance with their nature, O Arjuna. People consist of their faith; as a person's faith is, so are they."}, {"ref": "17:4", "text": "The sattvic, or pure, men worship the gods; the rajasic, or passionate, worship the yakshas and rakshasas; the others, the tamasic or deluded people, worship ghosts and hosts of nature-spirits."}], "near_dups": [{"id": 165, "score": 0.933}], "suggestion": {"action": "distinct", "why": "165 = whatever you worship with faith grows (7:21); 308 = you become the faith you hold (17:3). Related but different angle — keep both."}}, {"id": 309, "text": "Don't torture yourself with ego-driven, harsh discipline.", "best_verse": "17:6", "rationale": "17:5-6 condemn austerities born of hypocrisy and lust that senselessly torment body and spirit.", "verses": [{"ref": "17:5", "text": "Those men who practice terrific austerities not prescribed by the scriptures, given to hypocrisy and egoism, driven by the force of lust and attachment."}, {"ref": "17:6", "text": "Know thou these to be of demonical resolves, senselessly torturing all the elements in the body and Me who dwell in the body."}], "near_dups": []}, {"id": 310, "text": "Eat wholesome food that brings health, strength, and cheer.", "best_verse": "17:8", "rationale": "17:8 describes sattvic food that increases life, purity, health, and joy.", "verses": [{"ref": "17:8", "text": "The foods that increase life, purity, strength, health, joy, and cheerfulness (good appetite), which are savory, oily, substantial, and agreeable, are dear to the Sattvic (pure) people."}], "near_dups": []}, {"id": 311, "text": "Avoid harsh, overstimulating food that breeds pain and disease.", "best_verse": "17:9", "rationale": "17:9 names rajasic foods (bitter, sour, burning) that produce pain, grief, and disease.", "verses": [{"ref": "17:9", "text": "The foods that are bitter, sour, salty, overly hot, pungent, dry, and burning are liked by the Rajasic and are productive of pain, grief, and disease."}], "near_dups": []}, {"id": 312, "text": "Refuse stale, spoiled, and lifeless food.", "best_verse": "17:10", "rationale": "17:10 describes tamasic food that is stale, putrid, and impure.", "verses": [{"ref": "17:10", "text": "That which is stale, tasteless, putrid, rotten, rejected, and impure is the food liked by the Tamasic."}], "near_dups": []}, {"id": 313, "text": "Do your work as sacred duty, not for reward.", "best_verse": "17:11", "rationale": "17:11 defines sattvic sacrifice: offered as duty, without desire for reward.", "verses": [{"ref": "17:11", "text": "That sacrifice which is offered by men without desire for reward, as enjoined by the ordinance (scripture), with a firm faith that doing so is their duty, is Sattvic or pure."}], "near_dups": []}, {"id": 314, "text": "Never perform good deeds merely for show.", "best_verse": "17:12", "rationale": "17:12 marks sacrifice done for reward and display as rajasic.", "verses": [{"ref": "17:12", "text": "The sacrifice that is offered, O Arjuna, seeking a reward and for show, know that to be a Rajasic Yajna."}], "near_dups": [{"id": 302, "score": 0.931}], "suggestion": {"action": "keep", "absorbs": [302], "why": "'Never do good merely for show' — 16:17 and 17:12 coincide. Merge; keep 314, add 16:17."}}, {"id": 315, "text": "Honor your teachers and keep your body pure and gentle.", "best_verse": "17:14", "rationale": "17:14 lists austerity of the body: reverence for the wise, purity, straightforwardness, non-injury.", "verses": [{"ref": "17:14", "text": "Worship of the gods, the twice-born, the teachers, and the wise; purity, straightforwardness, celibacy, and non-injury are all called the austerities of the body."}], "near_dups": [{"id": 239, "score": 0.939}], "suggestion": {"action": "distinct", "why": "239 = serve your teacher as a mark of knowledge (13:8); 315 = honor teachers / bodily austerity (17:14). Different contexts — keep both."}}, {"id": 316, "text": "Speak words that are true, kind, and calming.", "best_verse": "17:15", "rationale": "17:15 defines austerity of speech: truthful, pleasant, beneficial, causing no agitation.", "verses": [{"ref": "17:15", "text": "Speech that causes no excitement, is truthful, pleasant, and beneficial; the practice of studying the Vedas is called austerity of speech."}], "near_dups": []}, {"id": 317, "text": "Steady your mind with serenity and self-control.", "best_verse": "17:16", "rationale": "17:16 defines mental austerity: serenity, good-heartedness, self-control, purity of nature.", "verses": [{"ref": "17:16", "text": "Serenity of mind, good-heartedness, self-control, and purity of nature—this is called mental austerity."}], "near_dups": []}, {"id": 318, "text": "Don't practice discipline just to win praise.", "best_verse": "17:18", "rationale": "17:18 marks austerity done for honor and reception, with hypocrisy, as rajasic and unstable.", "verses": [{"ref": "17:18", "text": "The austerity that is practiced with the aim of gaining good reception, honor, and worship, and with hypocrisy, is said to be Rajasic, unstable, and transient."}], "near_dups": []}, {"id": 319, "text": "Never turn discipline into self-torture or harm to others.", "best_verse": "17:19", "rationale": "17:19 condemns tamasic austerity practiced through self-torture or to destroy another.", "verses": [{"ref": "17:19", "text": "That austerity which is practised out of a foolish notion, with self-torture, or for the purpose of destroying another, is declared to be of the Tamasic nature."}], "near_dups": []}, {"id": 320, "text": "Give as a duty to those who truly deserve it.", "best_verse": "17:20", "rationale": "17:20 defines sattvic giving: to a worthy person, at a fitting place and time, expecting nothing back.", "verses": [{"ref": "17:20", "text": "That gift which is given to one who does nothing in return, knowing it to be a duty to give in a suitable place and time to a worthy person, is held to be Sattvic."}], "near_dups": []}, {"id": 321, "text": "Give generously, never grudgingly or for return.", "best_verse": "17:21", "rationale": "17:21 marks giving that expects a reward or is done reluctantly as rajasic.", "verses": [{"ref": "17:21", "text": "And, that gift which is given with the intention of receiving something in return, or expecting a reward, or begrudgingly, is considered to be Rajasic."}], "near_dups": []}, {"id": 322, "text": "Give with respect, at the right place and time.", "best_verse": "17:22", "rationale": "17:22 condemns gifts given at the wrong time and place, to the unworthy, with insult.", "verses": [{"ref": "17:22", "text": "The gift that is given in the wrong place and at the wrong time, to unworthy persons, without respect or with insult, is declared to be of a Tamasic nature."}], "near_dups": []}, {"id": 323, "text": "Act with faith, or your effort comes to nothing.", "best_verse": "17:28", "rationale": "17:28 closes the chapter: whatever is done without faith is 'Asat', of no value here or hereafter.", "verses": [{"ref": "17:28", "text": "Whatever is sacrificed, given, or performed, and whatever austerity is practiced without faith, it is called 'Asat', O Arjuna; it is of no value here or hereafter (after death)."}], "near_dups": []}], "skipped": [{"chapter": 17, "v": 7, "reason": "Announces the threefold division of food, sacrifice, austerity, and gift — a framing statement developed in the following verses."}, {"chapter": 17, "v": 13, "reason": "Restates faithless (tamasic) sacrifice; its practical teaching is captured by the 'act with faith' lesson from 17:28."}, {"chapter": 17, "v": 17, "reason": "Summarizes the threefold austerity done with faith and no reward — already covered by the body, speech, and mind lessons plus the duty lesson."}, {"chapter": 17, "v": 23, "reason": "Om Tat Sat etymology / ritual origin, not a practical directive."}, {"chapter": 17, "v": 24, "reason": "Ritual instruction to begin acts with 'Om' — etymological, skipped per guidance."}, {"chapter": 17, "v": 25, "reason": "Ritual use of 'Tat'; its 'without aiming for fruits' sense is already covered by the duty lesson from 17:11."}, {"chapter": 17, "v": 26, "reason": "Etymology of the word 'Sat' — definitional, not a practical lesson."}, {"chapter": 17, "v": 27, "reason": "Etymological explanation of 'Sat' applied to steadfast action — ritual framing, skipped per guidance."}]}, {"chapter": 18, "lessons": [{"id": 324, "text": "Renounce selfish desire, not the action itself.", "best_verse": "18:2", "rationale": "Krishna's core distinction: sannyasa renounces desire-driven action, tyaga abandons the fruits.", "verses": [{"ref": "18:1", "text": "Arjuna said, \"O mighty-armed Hrishikesa, I desire to know the essence or truth of renunciation and abandonment severally, O slayer of Kesi.\""}, {"ref": "18:2", "text": "The Blessed Lord said, \"The sages understand sannyasa to be the renunciation of action with desire; the wise declare the abandonment of the fruits of all actions to be tyaga.\""}], "near_dups": [{"id": 119, "score": 0.982}], "suggestion": {"action": "keep", "absorbs": [119], "why": "'Renounce selfish desire, not the action' — 6:2 and 18:2 are the same. Merge; keep 324 (18:2, the canonical statement), add 6:2."}}, {"id": 325, "text": "Keep performing charity, sacrifice, and austerity.", "best_verse": "18:5", "rationale": "These purifying acts should never be abandoned but continued.", "verses": [{"ref": "18:5", "text": "Acts of sacrifice, gift, and austerity should not be abandoned, but should be performed; for sacrifice, gift, and austerity are the purifiers of the wise."}], "near_dups": []}, {"id": 326, "text": "Do even worthy deeds without craving reward.", "best_verse": "18:6", "rationale": "Perform good acts while dropping attachment and desire for results.", "verses": [{"ref": "18:6", "text": "But even these actions should be performed, leaving aside attachment and the desire for rewards, O Arjuna; this is my certain and most assured conviction."}], "near_dups": []}, {"id": 327, "text": "Never abandon your duty out of delusion.", "best_verse": "18:7", "rationale": "Renouncing obligatory action from confusion is tamasic, not true renunciation.", "verses": [{"ref": "18:7", "text": "Verily, the renunciation of obligatory action is not proper; the abandonment of the same out of delusion is declared to be Tamasic."}], "near_dups": []}, {"id": 328, "text": "Don't quit hard work to avoid discomfort.", "best_verse": "18:8", "rationale": "Dropping action from fear of bodily trouble is mere rajasic renunciation, earning no merit.", "verses": [{"ref": "18:8", "text": "He who abandons action out of fear of bodily trouble (because it is painful), does not obtain the merit of renunciation by performing such Rajasic renunciation."}], "near_dups": []}, {"id": 329, "text": "Do required work simply because it's right.", "best_verse": "18:9", "rationale": "Sattvic renunciation: act because it ought to be done, without attachment or reward.", "verses": [{"ref": "18:9", "text": "Whatever obligatory action is done, O Arjuna, merely because it ought to be done, abandoning attachment and also the desire for reward, that renunciation is regarded as sattvic (pure)."}], "near_dups": []}, {"id": 330, "text": "Neither dread hard tasks nor crave easy ones.", "best_verse": "18:10", "rationale": "The true renouncer hates no unpleasant task and clings to no pleasant one.", "verses": [{"ref": "18:10", "text": "The man of renunciation, pervaded by purity, intelligent, and with his doubts cut asunder, does not hate an unpleasant task nor is he attached to a pleasant one."}], "near_dups": []}, {"id": 331, "text": "You cannot stop acting; release the fruits.", "best_verse": "18:11", "rationale": "No embodied being can abandon all action; relinquishing rewards is real renunciation.", "verses": [{"ref": "18:11", "text": "Indeed, it is not possible for an embodied being to completely abandon actions; however, he who relinquishes the rewards of actions is truly called a man of renunciation."}], "near_dups": []}, {"id": 332, "text": "Only the unattached escape action's binding fruits.", "best_verse": "18:12", "rationale": "The threefold fruit accrues after death to those who cling, never to renouncers.", "verses": [{"ref": "18:12", "text": "The threefold fruit of action (evil, good, and mixed) accrues after death to those who do not abandon it, but never to those who do."}], "near_dups": []}, {"id": 333, "text": "Know that many factors, not you alone, drive action.", "best_verse": "18:15", "rationale": "Body, doer, senses, functions, and the presiding deity are the five causes of every deed.", "verses": [{"ref": "18:13", "text": "Learn from Me, O mighty-armed Arjuna, these five causes, as declared in the Sankhya system, for the accomplishment of all actions."}, {"ref": "18:14", "text": "The body, the doer, the various senses, the different functions of various kinds, and the presiding deity—the fifth."}, {"ref": "18:15", "text": "Whatever action a person performs with their body, speech, and mind, whether right or wrong, these five are its causes."}], "near_dups": []}, {"id": 334, "text": "Stop seeing yourself as the sole doer.", "best_verse": "18:16", "rationale": "The untrained mind wrongly views the isolated Self as the agent.", "verses": [{"ref": "18:16", "text": "Now, such being the case, verily he who, owing to an untrained understanding, looks upon his Self, which is isolated, as the agent, he of perverted intelligence does not see."}], "near_dups": []}, {"id": 335, "text": "Act free of ego and remain unbound.", "best_verse": "18:17", "rationale": "Free of the egoistic notion, one is not bound even by great action.", "verses": [{"ref": "18:17", "text": "He who is free from the egoistic notion, whose intelligence is not tainted by good or evil, though he slays these people, he does not slay, nor is he bound by the action."}], "near_dups": []}, {"id": 336, "text": "See one indestructible reality within all beings.", "best_verse": "18:20", "rationale": "Sattvic knowledge perceives the undivided Reality present in every being.", "verses": [{"ref": "18:20", "text": "That by which one sees the indestructible Reality in all beings, not separate in any of them—know that knowledge to be Sattvic."}], "near_dups": [{"id": 248, "score": 0.93}], "suggestion": {"action": "keep", "absorbs": [248], "why": "Equal-vision recurs 5x. Keep three real facets: seeing the Self in all (142), worshipping the one presence (143), the indestructible reality (336). 87 duplicates 142; 248 duplicates 336."}}, {"id": 337, "text": "Don't mistake one fragment for the whole.", "best_verse": "18:22", "rationale": "Tamasic knowledge clings to a single trivial effect as if it were everything.", "verses": [{"ref": "18:22", "text": "But that which clings to one single effect as if it were the whole, without reason, without any foundation in Truth, and is trivial—that is declared to be Tamasic."}], "near_dups": []}, {"id": 338, "text": "Do prescribed work without love, hate, or gain.", "best_verse": "18:23", "rationale": "Sattvic action is ordained, unattached, and free of desire for reward.", "verses": [{"ref": "18:23", "text": "An action that is ordained, free from attachment, done without love or hatred, and without desire for reward is declared to be Sattvic."}], "near_dups": []}, {"id": 339, "text": "Weigh consequences and your ability before acting.", "best_verse": "18:25", "rationale": "Tamasic action ignores loss, injury, and one's own capacity.", "verses": [{"ref": "18:25", "text": "That action which is undertaken from delusion, without regard for the consequences, loss, injury, and one's own ability, is declared to be Tamasic (dark)."}], "near_dups": []}, {"id": 340, "text": "Work with resolve, unmoved by success or failure.", "best_verse": "18:26", "rationale": "The sattvic doer is firm and enthusiastic, unaffected by outcome.", "verses": [{"ref": "18:26", "text": "An agent who is free from attachment, non-egoistic, endowed with firmness and enthusiasm, and unaffected by success or failure, is considered to be of a Sattvic (pure) nature."}], "near_dups": []}, {"id": 341, "text": "Root out laziness, deceit, and procrastination.", "best_verse": "18:28", "rationale": "These mark the tamasic doer; naming them helps you shed them.", "verses": [{"ref": "18:28", "text": "Unsteady, vulgar, inflexible, deceitful, malicious, lazy, despondent, and procrastinating—such an agent is called Tamasic."}], "near_dups": []}, {"id": 342, "text": "Discern clearly what to do and avoid.", "best_verse": "18:30", "rationale": "Sattvic intellect knows action from inaction, bondage from liberation.", "verses": [{"ref": "18:30", "text": "The intellect which knows the path of work and renunciation, what should be done and what should not be done, fear and fearlessness, bondage and liberation—that intellect is Sattvic (pure), O Arjuna."}], "near_dups": []}, {"id": 343, "text": "Never let darkness call wrong things right.", "best_verse": "18:32", "rationale": "Tamasic intellect, wrapped in darkness, mistakes adharma for dharma.", "verses": [{"ref": "18:32", "text": "That intellect, O Arjuna, which is enveloped in darkness and sees Adharma as Dharma and all things perverted, is Tamasic (dark)."}], "near_dups": []}, {"id": 344, "text": "Steady your mind, breath, and senses through discipline.", "best_verse": "18:33", "rationale": "Sattvic firmness restrains mind, life-force, and senses by unwavering yoga.", "verses": [{"ref": "18:33", "text": "The unwavering firmness, through which Yoga restrains the functions of the mind, life-force, and senses—that firmness, O Arjuna, is Sattvic (pure)."}], "near_dups": []}, {"id": 345, "text": "Stop clinging to sleep, fear, grief, and despair.", "best_verse": "18:35", "rationale": "Tamasic firmness refuses to let go of these; releasing them frees you.", "verses": [{"ref": "18:35", "text": "That firmness, O Arjuna, by which a stupid man does not abandon sleep, fear, grief, despair, and conceit, is Tamasic."}], "near_dups": []}, {"id": 346, "text": "Choose joy that starts bitter but ends sweet.", "best_verse": "18:37", "rationale": "Sattvic happiness is poison at first, nectar in the end, born of self-realization.", "verses": [{"ref": "18:37", "text": "That which is like poison at first but in the end like nectar—that happiness is declared to be sattvic, born of the purity of one's own mind due to self-realization."}], "near_dups": []}, {"id": 347, "text": "Beware pleasures sweet now but poisonous later.", "best_verse": "18:38", "rationale": "Rajasic happiness from sense contact begins as nectar and ends as poison.", "verses": [{"ref": "18:38", "text": "That happiness which arises from the contact of the senses with the objects, which is initially like nectar but eventually like poison, is said to be Rajasic."}], "near_dups": []}, {"id": 348, "text": "Let your natural qualities shape your work.", "best_verse": "18:41", "rationale": "Duties are apportioned according to the qualities born of one's own nature.", "verses": [{"ref": "18:41", "text": "Of Brahmanas, Kshatriyas, Vaisyas, and Sudras, O Arjuna, the duties are distributed according to the qualities born of their own nature."}, {"ref": "18:42", "text": "Serenity, self-restraint, austerity, purity, forgiveness, and uprightness, as well as knowledge, realization, and belief in God, are the duties of Brahmanas, born of their own nature."}, {"ref": "18:43", "text": "Prowess, splendor, firmness, dexterity, and not fleeing from battle, generosity, and lordliness are the duties of the Kshatriyas, born of their own nature."}, {"ref": "18:44", "text": "Agriculture, cattle-rearing, and trade are the duties of the Vaisya (merchant), born of their own nature; and service is the duty of the Sudra (servant-class), born of their own nature."}], "near_dups": []}, {"id": 349, "text": "Reach perfection through devotion to your own work.", "best_verse": "18:45", "rationale": "Each person attains perfection by being devoted to their own duty.", "verses": [{"ref": "18:45", "text": "Each person devoted to their own duty attains perfection. How they attain perfection while being engaged in their own duty, hear now."}], "near_dups": []}, {"id": 350, "text": "Turn your everyday work into worship.", "best_verse": "18:46", "rationale": "Worshipping the source of all through one's own duty leads to perfection.", "verses": [{"ref": "18:46", "text": "He from whom all the beings have evolved and by whom all this is pervaded, worshipping Him with his own duty, one attains perfection."}], "near_dups": []}, {"id": 351, "text": "Do your own duty poorly over another's well.", "best_verse": "18:47", "rationale": "One's own dharma, though flawed, is better than another's performed well.", "verses": [{"ref": "18:47", "text": "Better is one's own duty, even if it is destitute of merits, than the duty of another well performed. He who does the duty ordained by his own nature incurs no sin."}], "near_dups": [{"id": 64, "score": 0.977}], "suggestion": {"action": "cut", "into": 64, "why": "'Do your own duty poorly over another's well' — verbatim Gita repetition (3:35 & 18:47). Merge; keep 64, add 18:47."}}, {"id": 352, "text": "Don't abandon your calling for its flaws.", "best_verse": "18:48", "rationale": "Every undertaking has some fault, as fire has smoke; keep to your inborn duty.", "verses": [{"ref": "18:48", "text": "One should not, O Arjuna, abandon the duty to which one is born, though it may be faulty; for, all undertakings are enveloped by evil, just as fire is by smoke."}], "near_dups": []}, {"id": 353, "text": "Subdue desire to find freedom in action.", "best_verse": "18:49", "rationale": "Unattached intellect and self-mastery yield the supreme state of actionlessness.", "verses": [{"ref": "18:49", "text": "He whose intellect is unattached everywhere, who has subdued his self, from whom desire has fled, he attains the supreme state of freedom from action through renunciation."}], "near_dups": []}, {"id": 354, "text": "Purify your intellect and drop attraction and hatred.", "best_verse": "18:51", "rationale": "A pure intellect controls the self and relinquishes attraction and aversion.", "verses": [{"ref": "18:51", "text": "Endowed with a pure intellect, controlling the self through firmness, relinquishing sound and other objects and abandoning attraction and hatred."}], "near_dups": []}, {"id": 355, "text": "Live simply, speak little, and meditate steadily.", "best_verse": "18:52", "rationale": "Solitude, sparing food, subdued speech, and constant meditation prepare one for Brahman.", "verses": [{"ref": "18:52", "text": "Dwelling in solitude, eating sparingly, with speech, body, and mind subdued, always engaged in meditation and concentration, and resorting to dispassion."}], "near_dups": []}, {"id": 356, "text": "Release ego, arrogance, and the sense of 'mine'.", "best_verse": "18:53", "rationale": "Abandoning egoism, arrogance, and possessiveness makes one fit for Brahman.", "verses": [{"ref": "18:53", "text": "Having abandoned egoism, strength, arrogance, desire, anger, and covetousness, and being free from the notion of 'mine' and peaceful, he is fit for becoming Brahman."}], "near_dups": []}, {"id": 357, "text": "Grow serene and regard all beings alike.", "best_verse": "18:54", "rationale": "Serene in the Self, one neither grieves nor desires and treats all equally.", "verses": [{"ref": "18:54", "text": "Becoming Brahman, serene in the Self, he neither grieves nor desires; he is the same to all beings, and obtains supreme devotion to Me."}], "near_dups": []}, {"id": 358, "text": "Know the divine through wholehearted devotion.", "best_verse": "18:55", "rationale": "By devotion one truly knows the Lord and enters the Supreme.", "verses": [{"ref": "18:55", "text": "By devotion, he knows Me in truth, who and what I am; then, having known Me in truth, he immediately enters into the Supreme."}], "near_dups": []}, {"id": 359, "text": "Take refuge while still doing all your work.", "best_verse": "18:56", "rationale": "Performing all actions while sheltered in the divine grants the eternal state.", "verses": [{"ref": "18:56", "text": "Having taken refuge in Me and doing all actions, by My grace he obtains the eternal, indestructible state of being."}], "near_dups": []}, {"id": 360, "text": "Offer every action mentally to the divine.", "best_verse": "18:57", "rationale": "Mentally renounce all deeds in the Lord and fix the mind on Him.", "verses": [{"ref": "18:57", "text": "Mentally renouncing all actions in Me, having Me as the highest goal, and resorting to the yoga of discrimination, do thou ever fix thy mind on Me."}], "near_dups": [{"id": 61, "score": 0.941}], "suggestion": {"action": "cut", "into": 61, "why": "'Offer all actions to the divine' — 3:30 and 18:57 are the same teaching restated. Merge; keep 61, add 18:57."}}, {"id": 361, "text": "Surrender your ego to overcome every obstacle.", "best_verse": "18:58", "rationale": "Fixing the mind on the divine overcomes obstacles; egoism leads to ruin.", "verses": [{"ref": "18:58", "text": "Fixing your mind on Me, you shall, by My grace, overcome all obstacles; but if you will not hear Me due to egoism, you shall perish."}], "near_dups": []}, {"id": 362, "text": "Your nature compels what your ego refuses.", "best_verse": "18:60", "rationale": "Refusing to act from egoism is vain; one's own nature will drive the deed anyway.", "verses": [{"ref": "18:59", "text": "If, filled with egoism, thou thinkest, \"I will not fight,\" then thy resolve is vain; nature will compel thee."}, {"ref": "18:60", "text": "O Arjuna, bound by your own Karma (action) born of your own nature, that which from delusion you wish not to do, even that you shall do helplessly."}], "near_dups": []}, {"id": 363, "text": "Remember a higher power moves within all.", "best_verse": "18:61", "rationale": "The Lord dwells in every heart, turning all beings by His power.", "verses": [{"ref": "18:61", "text": "The Lord dwells in the hearts of all beings, O Arjuna, causing all beings, by His illusory power, to revolve as if mounted on a machine."}], "near_dups": []}, {"id": 364, "text": "Surrender with your whole being to find peace.", "best_verse": "18:62", "rationale": "Taking full refuge in the Lord yields supreme peace and the eternal abode.", "verses": [{"ref": "18:62", "text": "Fly to Him for refuge with all your being, O Arjuna; by His grace you will obtain supreme peace and the eternal abode."}], "near_dups": [{"id": 219, "score": 0.946}], "suggestion": {"action": "keep", "absorbs": [219], "why": "'Surrender your whole being' — 12:7 and 18:62 restate one idea. Merge; keep 364, add 12:7."}}, {"id": 365, "text": "Reflect deeply, then choose your own path.", "best_verse": "18:63", "rationale": "Krishna gives the secret wisdom, then leaves Arjuna free to reflect and act.", "verses": [{"ref": "18:63", "text": "Thus, wisdom more secret than secrecy itself has been declared to you by me. Reflect on it fully, then act as you wish."}], "near_dups": []}, {"id": 366, "text": "Fix your mind on the divine and arrive.", "best_verse": "18:65", "rationale": "Devote your mind, worship, and bow, and you will reach the Lord.", "verses": [{"ref": "18:65", "text": "Fix your mind on Me, be devoted to Me, sacrifice to Me, bow down to Me. You will come to Me; I truly promise you this, for you are dear to Me."}], "near_dups": [{"id": 220, "score": 0.95}], "suggestion": {"action": "keep", "absorbs": [220], "why": "'Fix your mind on the divine' — 12:8 and 18:65 are the same instruction. Merge; keep 366, add 12:8."}}, {"id": 367, "text": "Let go of everything, take refuge, stop grieving.", "best_verse": "18:66", "rationale": "The surrender climax: abandon all duties, take sole refuge, and be freed from sin.", "verses": [{"ref": "18:66", "text": "Abandon all duties and take refuge in Me alone; I will liberate you from all sins; do not grieve."}], "near_dups": []}, {"id": 368, "text": "Share sacred wisdom only with the receptive.", "best_verse": "18:67", "rationale": "Never teach this to the unwilling; teaching devotees with love is dearest of all.", "verses": [{"ref": "18:67", "text": "Never speak this to one who is devoid of austerities or devotion, who does not render service, who does not desire to listen, or who cavils at Me."}, {"ref": "18:68", "text": "He who, with supreme devotion to Me, teaches this supreme secret to My devotees, shall undoubtedly come to Me."}, {"ref": "18:69", "text": "There is no one among men who does service dearer to Me, nor shall there be anyone on earth dearer to Me than him."}], "near_dups": []}, {"id": 369, "text": "Study sacred teaching as an act of worship.", "best_verse": "18:70", "rationale": "Studying this dialogue is worship through the sacrifice of wisdom.", "verses": [{"ref": "18:70", "text": "And he who studies this sacred dialogue of ours, by him I shall have been worshipped through the sacrifice of wisdom; such is my conviction."}], "near_dups": []}, {"id": 370, "text": "Listen with faith and free from malice.", "best_verse": "18:71", "rationale": "Hearing it faithfully and without malice leads to liberation and happy worlds.", "verses": [{"ref": "18:71", "text": "Also, the man who hears this, full of faith and free from malice, shall attain to the happy worlds of those of righteous deeds, and be liberated."}], "near_dups": []}, {"id": 371, "text": "Listen with full focus to dispel ignorance.", "best_verse": "18:72", "rationale": "Krishna asks whether one-pointed attention has destroyed delusion.", "verses": [{"ref": "18:72", "text": "Has this been heard, O Arjuna, with one-pointed focus? Has the delusion of your ignorance been destroyed, O Dhananjaya?"}], "near_dups": []}, {"id": 372, "text": "Let clarity return and act without doubt.", "best_verse": "18:73", "rationale": "Arjuna's delusion is gone, his doubts dissolved, and he resolves to act.", "verses": [{"ref": "18:73", "text": "Arjuna said, \"My delusion has been destroyed, for I have gained my knowledge (memory) through Your grace, O Krishna. I am now free from doubts. I will act according to Your word.\""}], "near_dups": []}], "skipped": [{"chapter": 18, "v": 3, "reason": "States conflicting philosophical positions; framing for the coming teaching."}, {"chapter": 18, "v": 4, "reason": "Announces the threefold classification of abandonment; framing only."}, {"chapter": 18, "v": 18, "reason": "Analytical enumeration of action's components; structural framing."}, {"chapter": 18, "v": 19, "reason": "Announces the threefold guna analysis to come; framing only."}, {"chapter": 18, "v": 21, "reason": "Rajasic knowledge (seeing all as separate); captured via the sattvic form in 18:20."}, {"chapter": 18, "v": 24, "reason": "Rajasic action; its counsel is covered by sattvic 18:23 and cautionary 18:25."}, {"chapter": 18, "v": 27, "reason": "Rajasic doer; the sattvic doer (18:26) and tamasic warning (18:28) carry the teaching."}, {"chapter": 18, "v": 29, "reason": "Announces the threefold division of intellect and firmness; framing only."}, {"chapter": 18, "v": 31, "reason": "Rajasic intellect; covered by sattvic 18:30 and tamasic warning 18:32."}, {"chapter": 18, "v": 34, "reason": "Rajasic firmness; covered by sattvic 18:33 and tamasic warning 18:35."}, {"chapter": 18, "v": 36, "reason": "Announces the threefold division of happiness; framing only."}, {"chapter": 18, "v": 39, "reason": "Tamasic happiness from sloth; the sattvic (18:37) and rajasic (18:38) forms carry the lesson."}, {"chapter": 18, "v": 40, "reason": "Doctrinal statement that no being escapes the three gunas; not actionable."}, {"chapter": 18, "v": 50, g your duty brings dishonor worse than death.", "22": "Meet victory and defeat, gain and loss, alike.", "23": "On this path no effort is ever wasted.", "24": "Hold one clear resolve; scattered aims lead nowhere.", "25": "Chasing pleasure and reward leaves the mind unsettled.", "26": "Rise above the pairs of opposites and possessiveness.", "27": "To the awakened, scripture is a well amid a flood.", "28": "You have a right to your work, never its results.", "29": "Even-mindedness in success and failure is true yoga.", "30": "Ground action in wisdom; that is skill in action.", "31": "Release the fruits of action and be freed from bondage.", "32": "Cross beyond delusion and lose your taste for empty words.", "33": "When your mind rests unmoved in the self, you awaken.", "34": "True contentment is found within, not in fulfilled desires.", "35": "Stay unshaken by sorrow and free of craving and fear.", "36": "Neither celebrate the good nor recoil from the bad.", "37": "Withdraw your senses as a tortoise draws in its limbs.", "38": "Abstaining curbs the act; only insight ends the craving.", "39": "Even the wise can be swept away by restless senses.", "40": "Master your senses and fix your mind on the highest.", "41": "Dwelling on objects breeds desire, then anger, then ruin.", "42": "Move among temptations without craving or aversion to find peace.", "43": "Without a steady mind there is no peace or joy.", "44": "Rein in the wandering senses that pull the mind off course.", "45": "What the world chases, the wise quietly turn from.", "46": "Let desires enter and pass like rivers into the sea.", "47": "Drop craving, ownership, and ego to arrive at peace.", "48": "Reach this state and even death cannot delude you.", "49": "You cannot escape action, even for a moment.", "50": "Don't fake restraint while your mind chases pleasures.", "51": "Do your appointed work; action beats inaction.", "52": "Perform every action as an offering, not for gain.", "53": "Repay what sustains you; wledge reduce your karma to ash.", "90": "Nothing purifies you like true knowledge.", "91": "Pair faith with restraint to gain lasting peace.", "92": "Release doubt, which destroys your happiness.", "93": "Cut doubt with the sword of knowledge and rise.", "94": "Choose engaged action over withdrawal; both reach the goal.", "95": "Neither crave nor hate, and bondage falls away.", "96": "See knowledge and action as one path, not two.", "97": "Ground yourself in action first; renunciation ripens from it.", "98": "Purify your mind and subdue the senses; then act untainted.", "99": "Know the senses move among objects; you do nothing.", "100": "Offer your work to the divine and stay unstained like a lotus leaf.", "101": "Work with body and mind to purify yourself, not to gain.", "102": "Release the fruits and rest in lasting peace.", "103": "Renounce action in the mind and dwell content within.", "104": "Attribute doing to nature; the Self is no agent.", "105": "Let self-knowledge burn away ignorance like the sun.", "106": "Absorb your whole being in the Supreme and never return.", "107": "Look with an equal eye on every being.", "108": "Rest your mind in the flawless real and transcend rebirth.", "109": "Stay steady, unmoved by the pleasant or the unpleasant.", "110": "Find your joy in the Self, not in outer contact.", "111": "Shun fleeting pleasures; they begin and end in pain.", "112": "Conquer the surge of desire and anger to find joy within.", "113": "Devote yourself to the welfare of all beings.", "114": "Still your thoughts, and freedom opens on every side.", "115": "Steady your gaze and breath to turn attention inward.", "116": "Control senses, mind, and intellect, and be forever free.", "117": "Know the divine as friend of all, and find peace.", "118": "Do your duty without clinging to results.", "119": "Renounce selfish intentions, not action itself.", "120": "Lift yourself by your own effort.", "121": "Be your own friend, not your own enemy.", "122": "Stay balanced through cold and heat, praise and blame.", "123": "Value wisdom over gold and stone alike.", "124": "Look on friend and foe with the same eye.", "125": "Practice in solitude, free from hope and greed.", "126": "Set a firm, clean seat, neither high nor low.", "127": "Make the mind one-pointed to purify yourself.", "128": "Hold your body, head, and neck straight and still.", "129": "Sit serene and fearless, mind fixed on the goal.", "130": "A steadied mind leads you to lasting peace.", "131": "Eat and sleep in moderation, never in extremes.", "132": "Rest the mind in the Self, free of craving.", "133": "Keep your mind unflickering like a sheltered lamp.", "134": "Grow content by seeing the Self within yourself.", "135": "Anchor yourself in bliss beyond the senses.", "136": "Once you find it, no sorrow can shake you.", "137": "Practice with resolve and an undespairing mind.", "138": "Let go of every desire born of imagination.", "139": "Quiet the mind gradually, one step at a time.", "140": "Whenever the mind wanders, gently bring it back.", "141": "A calmed mind opens the door to supreme bliss.", "142": "See yourself in all beings and all beings in you.", "143": "Worship the one presence dwelling in all beings.", "144": "Feel others' joy and pain as your own.", "145": "Admit the mind is restless and hard to hold.", "146": "Tame the restless mind through practice and detachment.", "147": "Self-mastery makes the seemingly impossible attainable.", "148": "No sincere effort toward good is ever wasted.", "149": "Every good beginning carries forward into your future.", "150": "Persist across setbacks; progress compounds over time.", "151": "Choose disciplined practice over mere knowledge or ritual.", "152": "Pair knowledge with lived realization, not theory.", "153": "Accept that true realization is rare and hard-won.", "154": "Distinguish your body and mind from your living essence.", "155": "Trace every beginning and ending to one source.", "156": "Notice the divine nd rise again.", "191": "Act while resting untouched, like a witness.", "192": "Do not dismiss the sacred in ordinary form.", "193": "Worship with a single, undivided mind.", "194": "See the one divine behind every form.", "195": "Ritual rewards run out; the divine does not.", "196": "Devote yourself fully, and your needs are carried.", "197": "Every sincere prayer reaches the same source.", "198": "Even a leaf, given with love, is enough.", "199": "Offer whatever you do as devotion.", "200": "Offer your actions and their fruits lose their grip.", "201": "The divine is equal to all, yet near to the devoted.", "202": "No one who truly turns back is beyond redemption.", "203": "The highest goal is open to everyone.", "204": "Fix your mind, bow, and give yourself wholly.", "205": "Know the divine as unborn and beginningless, and be freed from delusion.", "206": "Absorb your mind in the divine and awaken others by sharing it.", "207": "Worship steadfastly with love, and clear discernment will be given.", "208": "Let the lamp of knowledge burn away the darkness of ignorance.", "209": "See every glory and power as a spark of the divine splendor.", "210": "Trust that a single fragment of the divine upholds the whole world.", "211": "Bow your head before what dwarfs you.", "212": "Do your part; the outcome is already set.", "213": "Fight your battle without fear of losing.", "214": "Apologize for the times you took greatness lightly.", "215": "Only devotion, not ritual, reveals the deepest truth.", "216": "Work for the sacred, unattached and free of enmity.", "217": "Loving the personal divine beats worshipping the abstract.", "218": "The formless path is valid but harder to walk.", "219": "Surrender your whole self and be carried across.", "220": "First, simply fix your mind on the divine.", "221": "If you cannot hold focus, practice reaching for it.", "222": "If practice is too hard, just work for the divine.", "223": "If all else fails, at least surrender the results.", ng one Self everywhere, you stop harming yourself.", "259": "See that nature acts while the Self stays still.", "260": "See all beings resting in and rising from the One.", "261": "Rest as the Self that neither acts nor stains.", "262": "Stay unstained like space that touches everything.", "263": "Let one awareness light up your whole field.", "264": "Use knowledge's eye to part the field from its knower.", "265": "Take refuge in the highest knowledge for freedom.", "266": "Remember every being springs from one divine source.", "267": "Recognize the three inborn forces that bind you.", "268": "Watch how even clarity and joy quietly bind.", "269": "See how craving chains you to restless action.", "270": "Catch the dullness luring you toward sleep and neglect.", "271": "Notice one force overpower the others, then shift.", "272": "When insight lights every sense, harmony is guiding you.", "273": "When greed and restlessness surge, passion is driving you.", "274": "When fog and laziness settle, inertia has taken hold.", "275": "Know the force ruling at death shapes your rebirth.", "276": "Weigh each act's fruit: clarity, pain, or dullness.", "277": "Your ruling force lifts, holds, or sinks you.", "278": "See only the gunas acting, then rise beyond them.", "279": "Stay unmoved whether the forces arise or fade.", "280": "Serve with steady devotion to cross beyond them.", "281": "Rest in the deathless ground behind all change.", "282": "Cut the tangled tree of attachment at its root.", "283": "Take refuge in the source from which none return.", "284": "Rise above pride, delusion, and the pull of opposites.", "285": "Know yourself as an eternal fragment of the divine.", "286": "Open the eye of knowledge to see the Self.", "287": "Recognize one divine light in sun, moon, and fire.", "288": "Trace your memory and knowledge to their source within.", "289": "Look beyond the changing and unchanging to the supreme.", "290": "Know the supreme Self and your duty fulfills itself.", ming charity, sacrifice, and austerity.", "326": "Do even worthy deeds without craving reward.", "327": "Never abandon your duty out of delusion.", "328": "Don't quit hard work to avoid discomfort.", "329": "Do required work simply because it's right.", "330": "Neither dread hard tasks nor crave easy ones.", "331": "You cannot stop acting; release the fruits.", "332": "Only the unattached escape action's binding fruits.", "333": "Know that many factors, not you alone, drive action.", "334": "Stop seeing yourself as the sole doer.", "335": "Act free of ego and remain unbound.", "336": "See one indestructible reality within all beings.", "337": "Don't mistake one fragment for the whole.", "338": "Do prescribed work without love, hate, or gain.", "339": "Weigh consequences and your ability before acting.", "340": "Work with resolve, unmoved by success or failure.", "341": "Root out laziness, deceit, and procrastination.", "342": "Discern clearly what to do and avoid.", "343": "Never let darkness call wrong things right.", "344": "Steady your mind, breath, and senses through discipline.", "345": "Stop clinging to sleep, fear, grief, and despair.", "346": "Choose joy that starts bitter but ends sweet.", "347": "Beware pleasures sweet now but poisonous later.", "348": "Let your natural qualities shape your work.", "349": "Reach perfection through devotion to your own work.", "350": "Turn your everyday work into worship.", "351": "Do your own duty poorly over another's well.", "352": "Don't abandon your calling for its flaws.", "353": "Subdue desire to find freedom in action.", "354": "Purify your intellect and drop attraction and hatred.", "355": "Live simply, speak little, and meditate steadily.", "356": "Release ego, arrogance, and the sense of 'mine'.", "357": "Grow serene and regard all beings alike.", "358": "Know the divine through wholehearted devotion.", "359": "Take refuge while still doing all your work.", "360": "Offer every action mentally to the divine.", "36 function renderStats(){
  const a=DATA.audit, c=counts();
  $("#subline").textContent = `${a.total_lessons} drafted lessons · ${a.lesson_coverage_pct}% verse coverage`;
  $("#method").textContent = `Near-duplicate flags: ${a.similarity_method}. ${a.lessons_flagged_near_dup} lessons flagged. Decisions autosave to this browser; Export downloads JSON.`;
  $("#stats").innerHTML = [
    ['n', a.total_lessons, 'Lessons'],
    ['keep', c.keep, 'Kept'],
    ['cut', c.cut, 'Cut'],
    ['flag', a.lessons_flagged_near_dup, 'Near-dup flags'],
    ['n', c.undec, 'Undecided'],
    ['n', a.total_skipped, 'Verses skipped'],
  ].map(([cls,n,l])=>`<div class="stat ${cls==='keep'?'keep':cls==='cut'?'cut':cls==='flag'?'flag':''}">
     <div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
}

function cardMatches(L){
  if(query){
    const hay=(L.text+" "+L.rationale+" "+L.verses.map(v=>v.ref+" "+v.text).join(" ")).toLowerCase();
    if(!hay.includes(query)) return false;
  }
  const d=decisions[L.id];
  if(filter==="flagged") return L.near_dups && L.near_dups.length;
  if(filter==="cut") return d&&d.d==='cut';
  if(filter==="undecided") return !(d&&d.d);
  return true;
}

function render(){
  const root=$("#root"); root.innerHTML="";
  for(const ch of DATA.chapters){
    const visible=ch.lessons.filter(cardMatches);
    if(!visible.length && filter!=="all") continue;
    const sec=document.createElement("section"); sec.className="chapter";
    sec.innerHTML=`<div class="chead" data-ch="${ch.chapter}">
        <span class="num">CH ${ch.chapter}</span>
        <h2>${esc(NAMES[ch.chapter]||"")}</h2>
        <span class="cnt">${visible.length}/${ch.lessons.length}</span>
      </div><div class="cards"></div>`;
    const cards=$(".cards",sec);
    for(const L of visible) cards.appendChild(cardEl(L));
    if(ch.skipped && ch.skipped.length){
      const sk=document.createElement("details"); sk.className="skipped";
      sk.innerHTML=`<summary>${ch.skipped.length} verses intentionally given no lesson</summary>`+
        ch.skipped.map(s=>`<div class="sv"><b>${ch.chapter}:${s.v}</b> — ${esc(s.reason)}</div>`).join("");
      cards.appendChild(sk);
    }
    root.appendChild(sec);
  }
  if(!root.children.length) root.innerHTML=`<p class="note">No lessons match.</p>`;
}

function cardEl(L){
  const d=decisions[L.id]||{};
  const el=document.createElement("div"); el.className="card"; el.id="lesson-"+L.id;
  if(L.near_dups && L.near_dups.length) el.classList.add("dupflag");
  el.dataset.decision=d.d||"";
  const dupChips=(L.near_dups||[]).slice(0,4).map(nd=>
    `<span class="chip dup" data-goto="${nd.id}" title="${esc(DATA.id_text[nd.id]||'')}">≈ #${nd.id} · ${nd.score}</span>`).join("");
  el.innerHTML=`
    <div class="cardhead">
      <span class="chip id">#${L.id}</span>
      <span class="chip best">best ${esc(L.best_verse||"")}</span>
      ${dupChips}
      <span class="spacer"></span>
      ${sugChip(L)}
    </div>
    <div class="lesson" contenteditable="true" spellcheck="false">${esc(d.text||L.text)}</div>
    <div class="rationale">${esc(L.rationale)}</div>
    ${L.suggestion?`<div class="suggestion s-${L.suggestion.action}">${esc(sugText(L))}</div>`:""}
    <div class="verses">${L.verses.map(v=>`<div class="verse ${v.ref===L.best_verse?'isbest':''}"><span class="ref">${v.ref}</span><span>${esc(v.text)}</span></div>`).join("")}</div>
    <div class="cardfoot">
      <span class="toggle">
        <button class="keep" aria-pressed="${d.d==='keep'}">Keep</button>
        <button class="cut" aria-pressed="${d.d==='cut'}">Cut</button>
      </span>
      <button class="linkish vtoggle">${L.verses.length} source verse${L.verses.length>1?'s':''}</button>
      <span class="spacer"></span>
      <button class="linkish ntoggle">Note${d.note?" •":""}</button>
    </div>
    <textarea class="cardnote ${d.note?'open':''}" placeholder="Reviewer note (optional)…">${esc(d.note||"")}</textarea>`;

  const lessonEl=$(".lesson",el);
  if(d.text&&d.text!==L.text) lessonEl.classList.add("edited");
  lessonEl.addEventListener("input",()=>{
    const t=lessonEl.textContent.trim();
    setDec(L.id,{text:t}); lessonEl.classList.toggle("edited",t!==L.text);
  });
  $(".keep",el).addEventListener("click",()=>{setDec(L.id,{d:decisions[L.id]?.d==='keep'?'':'keep'});sync(el,L);});
  $(".cut",el).addEventListener("click",()=>{setDec(L.id,{d:decisions[L.id]?.d==='cut'?'':'cut'});sync(el,L);});
  $(".vtoggle",el).addEventListener("click",()=>$(".verses",el).classList.toggle("open"));
  $(".ntoggle",el).addEventListener("click",()=>$(".cardnote",el).classList.toggle("open"));
  $(".cardnote",el).addEventListener("input",e=>setDec(L.id,{note:e.target.value}));
  el.querySelectorAll(".chip.dup").forEach(c=>c.addEventListener("click",()=>{
    const t=document.getElementById("lesson-"+c.dataset.goto);
    if(t){t.scrollIntoView({behavior:"smooth",block:"center"});t.style.outline="2px solid var(--lav)";setTimeout(()=>t.style.outline="",1200);}
  }));
  return el;
}

function sync(el,L){
  const d=decisions[L.id]||{};
  el.dataset.decision=d.d||"";
  $(".keep",el).setAttribute("aria-pressed",d.d==='keep');
  $(".cut",el).setAttribute("aria-pressed",d.d==='cut');
  renderStats();
}
function setDec(id,patch){
  decisions[id]=Object.assign({},decisions[id],patch);
  if(!decisions[id].d) delete decisions[id].d;
  localStorage.setItem(LS_KEY,JSON.stringify(decisions));
  renderStats();
}
function flash(msg){const f=$("#flash");f.textContent=msg;f.classList.add("show");setTimeout(()=>f.classList.remove("show"),1600);}

$("#export").addEventListener("click",()=>{
  const out={generated:new Date().toISOString(),summary:counts(),decisions};
  const blob=new Blob([JSON.stringify(out,null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="lesson_review_decisions.json";a.click();
  flash("Exported "+Object.keys(decisions).length+" decisions");
});
$("#applysug").addEventListener("click",()=>{
  let n=0;
  for(const ch of DATA.chapters) for(const L of ch.lessons){
    if(L.suggestion && L.suggestion.action==="cut"){ setDec(L.id,{d:"cut"}); n++; }
    else if(L.suggestion && (L.suggestion.action==="keep"||L.suggestion.action==="distinct")){ if(!decisions[L.id]?.d) setDec(L.id,{d:"keep"}); }
  }
  render(); flash("Applied "+n+" suggested merges (cut). Review 'review' flags manually.");
});
$("#search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",()=>{
  filter=b.dataset.filter;
  document.querySelectorAll(".seg button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  render();
}));
document.addEventListener("click",e=>{const h=e.target.closest(".chead");if(h){const cs=h.nextElementSibling;cs.classList.toggle("hidden");}});
$("#themebtn").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const next=cur==="dark"?"light":cur==="light"?"dark":(matchMedia("(prefers-color-scheme:dark)").matches?"light":"dark");
  document.documentElement.setAttribute("data-theme",next);
});

renderStats(); render();
</script>

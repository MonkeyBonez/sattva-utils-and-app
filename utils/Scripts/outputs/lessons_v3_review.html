<title>Sattvic — Lesson Corpus Review</title>
<style>
  :root{
    --bg:#efe9da; --panel:#f7f3e8; --panel-2:#efe8d6; --ink:#233028; --ink-soft:#5c6b5f;
    --line:#d9cfb8; --peacock:#1f4735; --peacock-soft:#2f6a4f; --lav:#7b5cc4; --lav-soft:#efe9fb;
    --gold:#b08a3e; --cut:#b0483e; --keep:#2f6a4f;
    --shadow:0 1px 2px rgba(35,48,40,.06),0 6px 20px rgba(35,48,40,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --ui:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#141a16; --panel:#1c241e; --panel-2:#222b24; --ink:#e7e3d4; --ink-soft:#a3ab9f;
    --line:#2f3a31; --peacock:#7fcfa6; --peacock-soft:#9bdcbb; --lav:#b9a3ee; --lav-soft:#2a2340;
    --gold:#d8b56a; --cut:#e58a80; --keep:#7fcfa6;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"]{
    --bg:#efe9da; --panel:#f7f3e8; --panel-2:#efe8d6; --ink:#233028; --ink-soft:#5c6b5f;
    --line:#d9cfb8; --peacock:#1f4735; --peacock-soft:#2f6a4f; --lav:#7b5cc4; --lav-soft:#efe9fb;
    --gold:#b08a3e; --cut:#b0483e; --keep:#2f6a4f; --shadow:0 1px 2px rgba(35,48,40,.06),0 6px 20px rgba(35,48,40,.06);
  }
  :root[data-theme="dark"]{
    --bg:#141a16; --panel:#1c241e; --panel-2:#222b24; --ink:#e7e3d4; --ink-soft:#a3ab9f;
    --line:#2f3a31; --peacock:#7fcfa6; --peacock-soft:#9bdcbb; --lav:#b9a3ee; --lav-soft:#2a2340;
    --gold:#d8b56a; --cut:#e58a80; --keep:#7fcfa6; --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.5;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px 120px}
  header.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 90%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 0;margin-bottom:26px}
  .top .wrap{padding-top:0;padding-bottom:0}
  .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:22px;margin:0;letter-spacing:.2px}
  .brand .sub{color:var(--ink-soft);font-size:13px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow)}
  .stat .n{font-family:var(--serif);font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-top:3px}
  .stat.keep .n{color:var(--keep)} .stat.cut .n{color:var(--cut)} .stat.flag .n{color:var(--gold)}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
  .controls input[type=search]{flex:1;min-width:180px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:14px;font-family:var(--ui)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .seg button{border:0;background:transparent;color:var(--ink-soft);padding:8px 12px;font-size:13px;cursor:pointer;font-family:var(--ui)}
  .seg button[aria-pressed=true]{background:var(--peacock);color:var(--bg)}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:10px;padding:8px 14px;
    font-size:13px;cursor:pointer;font-family:var(--ui)}
  .btn.primary{background:var(--lav);color:#fff;border-color:transparent;font-weight:600}
  :root[data-theme="dark"] .btn.primary,@media (prefers-color-scheme:dark){.btn.primary{color:#191426}}
  .note{color:var(--ink-soft);font-size:12.5px;margin-top:10px}
  section.chapter{margin:30px 0}
  .chead{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none;padding:6px 0;border-bottom:1px solid var(--line)}
  .chead .num{font-family:var(--serif);font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.06em}
  .chead h2{font-family:var(--serif);font-size:19px;font-weight:600;margin:0;flex:1}
  .chead .cnt{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .cards{display:flex;flex-direction:column;gap:12px;margin-top:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--shadow);
    transition:opacity .15s,border-color .15s}
  .card[data-decision=cut]{opacity:.5;border-color:var(--cut)}
  .card[data-decision=cut] .lesson{text-decoration:line-through;text-decoration-color:var(--cut)}
  .card.dupflag{border-left:3px solid var(--gold)}
  .cardhead{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .chip{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink-soft);
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .chip.best{color:var(--peacock);border-color:color-mix(in srgb,var(--peacock) 40%,var(--line))}
  .chip.id{color:var(--ink-soft);background:var(--panel-2)}
  .chip.dup{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 45%,var(--line));cursor:pointer}
  .spacer{flex:1}
  .lesson{font-family:var(--serif);font-size:18px;line-height:1.35;color:var(--ink);border:1px solid transparent;
    border-radius:8px;padding:3px 6px;margin:-3px -6px;outline:none}
  .lesson:focus{border-color:var(--lav);background:var(--panel-2)}
  .lesson.edited{border-color:color-mix(in srgb,var(--lav) 50%,transparent)}
  .rationale{color:var(--ink-soft);font-size:13px;margin-top:7px;font-style:italic}
  .chip.sug{font-weight:600}
  .chip.sug.s-cut{color:var(--cut);border-color:color-mix(in srgb,var(--cut) 45%,var(--line))}
  .chip.sug.s-keep{color:var(--keep);border-color:color-mix(in srgb,var(--keep) 45%,var(--line))}
  .chip.sug.s-distinct{color:var(--peacock-soft)} .chip.sug.s-review{color:var(--gold)}
  .suggestion{margin-top:8px;font-size:12.5px;line-height:1.45;padding:7px 10px;border-radius:9px;background:var(--panel-2);border-left:2px solid var(--line)}
  .suggestion.s-cut{border-left-color:var(--cut)} .suggestion.s-keep{border-left-color:var(--keep)}
  .suggestion.s-review{border-left-color:var(--gold)} .suggestion.s-distinct{border-left-color:var(--peacock-soft)}
  .verses{margin-top:9px;border-top:1px dashed var(--line);padding-top:9px;display:none}
  .verses.open{display:block}
  .verse{display:flex;gap:9px;font-size:13.5px;margin:5px 0;color:var(--ink-soft)}
  .verse .ref{color:var(--peacock);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600;min-width:44px}
  .verse.isbest .ref{color:var(--gold)}
  .cardfoot{display:flex;align-items:center;gap:8px;margin-top:11px}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .toggle button{border:0;background:transparent;color:var(--ink-soft);padding:5px 12px;font-size:12.5px;cursor:pointer;font-family:var(--ui)}
  .toggle button.keep[aria-pressed=true]{background:var(--keep);color:var(--bg)}
  .toggle button.cut[aria-pressed=true]{background:var(--cut);color:#fff}
  .linkish{background:none;border:0;color:var(--lav);font-size:12.5px;cursor:pointer;font-family:var(--ui);padding:0}
  .cardnote{width:100%;margin-top:9px;padding:7px 10px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--ink);font-size:13px;font-family:var(--ui);resize:vertical;display:none}
  .cardnote.open{display:block}
  .skipped{background:var(--panel-2);border:1px dashed var(--line);border-radius:12px;padding:10px 13px;margin-top:12px;font-size:12.5px;color:var(--ink-soft)}
  .skipped summary{cursor:pointer;color:var(--ink-soft)}
  .skipped .sv{margin:4px 0}
  .flash{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--peacock);color:var(--bg);
    padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .flash.show{opacity:1}
  .hidden{display:none!important}
  a.themebtn{margin-left:auto}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<header class="top"><div class="wrap">
  <div class="brand">
    <h1>Sattvic · Lesson Corpus Review</h1>
    <span class="sub" id="subline"></span>
    <button class="btn themebtn" id="themebtn" title="Toggle theme">◐ Theme</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search lessons, verse text, rationale…" autocomplete="off">
    <div class="seg" role="group" aria-label="Filter">
      <button data-filter="all" aria-pressed="true">All</button>
      <button data-filter="flagged">Near-dups</button>
      <button data-filter="cut">Cut</button>
      <button data-filter="undecided">Undecided</button>
    </div>
    <button class="btn" id="applysug" title="Set every suggested-cut lesson to Cut">Apply dedup suggestions</button>
    <button class="btn primary" id="export">Export decisions</button>
  </div>
  <div class="note" id="method"></div>
</div></header>

<div class="wrap" id="root"></div>
<div class="flash" id="flash"></div>

<script>
const DATA = {"audit": {"total_lessons": 373, "total_skipped": 154, "app_verse_count": 701, "verses_in_a_lesson": 547, "lesson_coverage_pct": 78.0, "near_dup_threshold": 0.93, "similarity_method": "E5 semantic (passage:), threshold 0.93", "lessons_flagged_near_dup": 30, "problems": [], "shared_verse_count": 6, "shared_verses": ["12:13", "13:10", "13:8", "13:9", "16:1", "16:2"], "per_chapter_counts": {"1": 6, "2": 43, "3": 19, "4": 26, "5": 24, "6": 34, "7": 19, "8": 15, "9": 19, "10": 6, "11": 6, "12": 17, "13": 31, "14": 17, "15": 9, "16": 17, "17": 16, "18": 49}}, "chapters": [{"chapter": 1, "lessons": [{"id": 0, "text": "Notice when dread seizes your body before a hard duty.", "best_verse": "1:29", "rationale": "Captures Arjuna's visceral panic—failing limbs, parched mouth, trembling, the bow slipping—as the felt onset of fear before an overwhelming task, not an abstract mood.", "verses": [{"ref": "1:28", "text": "Arjuna said, \"O Krishna, seeing my kinsmen arrayed here, eager to fight,"}, {"ref": "1:29", "text": "My limbs fail, my mouth is parched, my body quivers, and my hair stands on end."}, {"ref": "1:30", "text": "The Gandiva slips from my hand, and my skin burns all over; I am unable to stand, and my mind is reeling, as it were."}], "near_dups": []}, {"id": 1, "text": "Some victories bring only guilt, never happiness.", "best_verse": "1:36", "rationale": "Anchors to Arjuna's insight that slaying his kin yields no good and only sin—distinct from the fear lesson because it judges the outcome of the act, not the emotion before it.", "verses": [{"ref": "1:31", "text": "And I see ill omens, O Kesava. I do not see any good in slaying my kinsmen in battle."}, {"ref": "1:36", "text": "By killing these sons of Dhritarashtra, what pleasure could be ours, O Janardana? Only sin would accrue to us from killing these felons."}, {"ref": "1:37", "text": "Therefore, we should not kill the sons of Dhritarashtra, our relatives; for how can we be happy by killing our own kin, O Madhava (Krishna)?"}], "near_dups": []}, {"id": 2, "text": "Refuse a prize bought with the ruin of those you love.", "best_verse": "1:35", "rationale": "Specific to Arjuna's rejection of kingdom and pleasures once he sees that the very people he'd win them for stand before him as the cost—about the worthlessness of the reward itself.", "verses": [{"ref": "1:32", "text": "I desire not victory, O Krishna, nor kingdom, nor pleasures.\nWhat use is dominion to us, O Krishna, or pleasures or even life?"}, {"ref": "1:33", "text": "Those for whose sake we desire kingdom, enjoyments, and pleasures stand here in battle, having renounced life and wealth."}, {"ref": "1:34", "text": "Teachers, fathers, sons, and grandfathers, maternal uncles, fathers-in-law, grandsons, brothers-in-law, and other relatives—"}, {"ref": "1:35", "text": "These I do not wish to kill, O Krishna, even though they kill me, for the sake of dominion over the three worlds; leave alone killing them for the sake of the earth.\""}], "near_dups": []}, {"id": 3, "text": "When greed blinds others to wrong, still choose to turn away.", "best_verse": "1:39", "rationale": "Draws on Arjuna contrasting the enemy's greed-blinded conscience with his own clear sight, and his admission of being swept toward sin by greed—about moral responsibility despite what others excuse.", "verses": [{"ref": "1:38", "text": "Though they, with intelligence overpowered by greed, see no evil in the destruction of families and no sin in hostility to friends,"}, {"ref": "1:39", "text": "Why should we not, who clearly see the evil in the destruction of families, learn to turn away from this sin, O Janardana (Krishna)?"}, {"ref": "1:45", "text": "Alas! We are involved in a great sin, for we are prepared to kill our kinsmen, out of greed for the pleasures of a kingdom."}], "near_dups": []}, {"id": 4, "text": "Weigh how one destructive act can unravel generations.", "best_verse": "1:40", "rationale": "Captures Arjuna's argument that destroying a family collapses its traditions, order, and lineage far beyond the battlefield—distinct as consequence spreading outward through time and society.", "verses": [{"ref": "1:40", "text": "In the destruction of a family, the immemorial religious rites of that family perish; on the destruction of spirituality, impiety indeed, overwhelms the whole family."}, {"ref": "1:41", "text": "O Krishna, by the prevalence of impiety, the women of the family become corrupt; and, when women are corrupted, O Varshenya (descendant of Vrishni), intermingling of castes arises."}, {"ref": "1:42", "text": "Confusion of castes leads to hell for the slayers of the family, for their forebears fall, deprived of the offerings of rice-balls and libations of water."}, {"ref": "1:43", "text": "By these evil deeds of the destroyers of the family, which cause confusion of castes, the eternal religious rites of the caste and the family are destroyed."}, {"ref": "1:44", "text": "We have heard, O Janardana, that those men in whose families the religious practices have been destroyed are inevitably destined to dwell in hell for an unknown period."}], "near_dups": []}, {"id": 5, "text": "Beware letting despair make surrender feel preferable to acting.", "best_verse": "1:46", "rationale": "Isolates the moment Arjuna would rather be killed unresisting than fight—the paralysis where grief distorts judgment into passive collapse, distinct from his earlier reasoned objections.", "verses": [{"ref": "1:46", "text": "If the sons of Dhritarashtra, with weapons in hand, should slay me in battle, unresisting and unarmed, that would be better for me."}], "near_dups": []}], "skipped": [{"chapter": 1, "v": 1, "reason": "narrative framing — Dhritarashtra's question to Sanjaya"}, {"chapter": 1, "v": 2, "reason": "narrative — Duryodhana approaches Drona"}, {"chapter": 1, "v": 3, "reason": "narrative — Duryodhana points out the Pandava army"}, {"chapter": 1, "v": 4, "reason": "narrative — roster of enemy warriors"}, {"chapter": 1, "v": 5, "reason": "narrative — roster of enemy warriors"}, {"chapter": 1, "v": 6, "reason": "narrative — roster of enemy warriors"}, {"chapter": 1, "v": 7, "reason": "narrative — Duryodhana names his own leaders"}, {"chapter": 1, "v": 8, "reason": "narrative — roster of Kaurava warriors"}, {"chapter": 1, "v": 9, "reason": "narrative — roster of Kaurava warriors"}, {"chapter": 1, "v": 10, "reason": "narrative — comparison of the two armies' strength"}, {"chapter": 1, "v": 11, "reason": "narrative — Duryodhana's order to protect Bhishma"}, {"chapter": 1, "v": 12, "reason": "narrative — Bhishma roars and blows his conch"}, {"chapter": 1, "v": 13, "reason": "narrative — Kaurava instruments sound"}, {"chapter": 1, "v": 14, "reason": "narrative — Krishna and Arjuna blow their conches"}, {"chapter": 1, "v": 15, "reason": "narrative — names of the conches blown"}, {"chapter": 1, "v": 16, "reason": "narrative — Pandava brothers blow their conches"}, {"chapter": 1, "v": 17, "reason": "narrative — roster of Pandava allies"}, {"chapter": 1, "v": 18, "reason": "narrative — more Pandava conches blown"}, {"chapter": 1, "v": 19, "reason": "narrative — the sound shakes the Kaurava hearts"}, {"chapter": 1, "v": 20, "reason": "narrative — Arjuna takes up his bow to speak"}, {"chapter": 1, "v": 21, "reason": "narrative — Arjuna asks Krishna to place the chariot"}, {"chapter": 1, "v": 22, "reason": "narrative — repeats Arjuna's request for chariot placement"}, {"chapter": 1, "v": 23, "reason": "narrative — Arjuna states his wish to survey the fighters"}, {"chapter": 1, "v": 24, "reason": "narrative — Krishna stations the chariot between armies"}, {"chapter": 1, "v": 25, "reason": "narrative — Krishna tells Arjuna to behold the Kurus"}, {"chapter": 1, "v": 26, "reason": "narrative — Arjuna sees his kinsmen in the ranks"}, {"chapter": 1, "v": 27, "reason": "narrative — Arjuna, filled with pity, begins to speak (transition into the lessons)"}, {"chapter": 1, "v": 47, "reason": "narrative — Arjuna casts down his bow and sinks in sorrow (closing frame)"}]}, {"chapter": 2, "lessons": [{"id": 6, "text": "Cast off weakness of heart and rise to act.", "best_verse": "2:3", "rationale": "Krishna's opening rebuke to shake off paralyzing despondency and stand up.", "verses": [{"ref": "2:2", "text": "The Blessed Lord said, \"From whence has this perilous strait come upon you, this dejection which is unworthy of you, disgraceful, and which will close the gates of heaven upon you, O Arjuna?\""}, {"ref": "2:3", "text": "Do not yield to impotence, O Arjuna, son of Pritha. It does not befit you. Cast off this mean weakness of the heart! Stand up, O conqueror of foes!"}], "near_dups": []}, {"id": 7, "text": "When your duty confuses you, seek a wise teacher.", "best_verse": "2:7", "rationale": "Captures Arjuna surrendering as a disciple asking for instruction, distinct from the despair verses around it.", "verses": [{"ref": "2:7", "text": "My heart is overpowered by the taint of pity; my mind is confused as to my duty. I ask Thee: Tell me decisively what is good for me. I am Thy disciple; instruct me, who has taken refuge in Thee."}], "near_dups": []}, {"id": 8, "text": "The wise grieve for neither the living nor the dead.", "best_verse": "2:11", "rationale": "The opening thesis of the whole discourse: grief itself is the error.", "verses": [{"ref": "2:11", "text": "The Blessed Lord said, \"You have grieved for those who should not be grieved for; yet, you speak words of wisdom. The wise grieve neither for the living nor for the dead.\""}], "near_dups": []}, {"id": 9, "text": "The self endures unchanged through youth, age, and death.", "best_verse": "2:13", "rationale": "Anchors to the specific image of passing through life's stages into another body.", "verses": [{"ref": "2:12", "text": "Nor, at any time, was I not, nor thou, nor these rulers of men; nor, verily, shall we ever cease to be hereafter."}, {"ref": "2:13", "text": "Just as the embodied soul passes through childhood, youth, and old age in this body, so too does it pass into another body; the steadfast one does not grieve over this."}], "near_dups": []}, {"id": 10, "text": "Bear pleasure and pain evenly; both come and go.", "best_verse": "2:14", "rationale": "Sense-contact brings impermanent heat and cold; the one who endures them is fit for immortality.", "verses": [{"ref": "2:14", "text": "The contact of the senses with the objects, O son of Kunti, which causes heat and cold, pleasure and pain, has a beginning and an end; they are impermanent; endure them bravely, O Arjuna."}, {"ref": "2:15", "text": "That firm man, whom surely these afflictions do not, O chief among men, to whom pleasure and pain are the same, is fit for attaining immortality."}], "near_dups": []}, {"id": 11, "text": "The unreal never is; the real never ceases to be.", "best_verse": "2:16", "rationale": "A pure metaphysical distinction between the transient and the permanent, unlike the endurance lessons.", "verses": [{"ref": "2:16", "text": "The unreal has no being; there is no non-being of the real; the truth about both has been seen by the knowers of the truth (or the seers of the essence)."}], "near_dups": []}, {"id": 12, "text": "Bodies perish, but what pervades them cannot be destroyed.", "best_verse": "2:17", "rationale": "The indestructible pervader versus the finite body; concludes 'therefore fight.'", "verses": [{"ref": "2:17", "text": "Know that to be indestructible, by which all this is pervaded. No one can cause the destruction of that, the Imperishable."}, {"ref": "2:18", "text": "These bodies of the embodied Self, which are eternal, indestructible, and immeasurable, are said to have an end. Therefore, fight, O Arjuna."}], "near_dups": []}, {"id": 13, "text": "The self is never the slayer nor the slain.", "best_verse": "2:19", "rationale": "The unborn, unkillable self neither acts as killer nor is killed.", "verses": [{"ref": "2:19", "text": "He who takes the Self to be the slayer and he who thinks it is slain, neither of them knows. It does not slay, nor is it slain."}, {"ref": "2:20", "text": "It is not born, nor does it ever die; after having been, it again does not cease to be; unborn, eternal, changeless, and ancient, it is not killed when the body is killed."}, {"ref": "2:21", "text": "Whoever knows it to be indestructible, eternal, unborn, and inexhaustible, how can that person slay, O Arjuna, or cause to be slain?"}], "near_dups": []}, {"id": 14, "text": "Death exchanges bodies like worn-out clothes for new.", "best_verse": "2:22", "rationale": "The distinctive changing-garments image for reincarnation.", "verses": [{"ref": "2:22", "text": "Just as a man casts off worn-out clothes and puts on new ones, so too the embodied Self casts off worn-out bodies and enters others that are new."}], "near_dups": []}, {"id": 15, "text": "No weapon, fire, water, or wind can harm the soul.", "best_verse": "2:23", "rationale": "The concrete four-elements image asserting the self's invulnerability.", "verses": [{"ref": "2:23", "text": "Weapons cannot cut it, fire cannot burn it, water cannot wet it, wind cannot dry it."}, {"ref": "2:24", "text": "This Self cannot be cut, burned, wetted, nor dried up; it is eternal, all-pervasive, stable, immovable, and ancient."}], "near_dups": []}, {"id": 16, "text": "The self is unmanifest and beyond the mind's reach.", "best_verse": "2:25", "rationale": "The self as unthinkable and unchangeable, a reason not to grieve.", "verses": [{"ref": "2:25", "text": "This Self is said to be unmanifested, unthinkable, and unchangeable. Therefore, knowing this to be so, you should not grieve."}], "near_dups": []}, {"id": 17, "text": "Even were death final, grief cannot undo the inevitable.", "best_verse": "2:27", "rationale": "The alternative argument: even granting mortality, death is certain, so grief is pointless.", "verses": [{"ref": "2:26", "text": "But even if thou thinkest of It as constantly being born and constantly dying, even then, O mighty-armed one, thou shouldst not grieve."}, {"ref": "2:27", "text": "For the born, death is certain, and for the dead, birth is certain; therefore, you should not grieve over the inevitable."}, {"ref": "2:28", "text": "Beings are unmanifest in their beginning, manifest in their middle state, O Arjuna, and unmanifest again in their end. What is there to grieve about?"}], "near_dups": []}, {"id": 18, "text": "The self is a marvel that few ever truly grasp.", "best_verse": "2:29", "rationale": "The wonder-and-mystery verse: seen, spoken of, heard, yet unknown.", "verses": [{"ref": "2:29", "text": "One sees this (the Self) as a wonder; another speaks of it as a wonder; another hears of it as a wonder; yet, having heard, none understands it at all."}], "near_dups": []}, {"id": 19, "text": "The same deathless self dwells within every being.", "best_verse": "2:30", "rationale": "The universality angle: the indestructible indweller in all, so grieve for none.", "verses": [{"ref": "2:30", "text": "This indweller in the body of everyone is ever indestructible, O Arjuna; therefore, you should not grieve for any creature."}], "near_dups": []}, {"id": 20, "text": "Do your rightful duty rather than shrink from it.", "best_verse": "2:31", "rationale": "Duty framed as obligation and opportunity, with abandonment counted as sin.", "verses": [{"ref": "2:31", "text": "Further, having regard to your duty, you should not waver, for there is nothing higher for a Kshatriya than a righteous war."}, {"ref": "2:32", "text": "Happy are the Kshatriyas, O Arjuna! who are called to fight in such a battle that comes of its own accord as an open door to heaven."}, {"ref": "2:33", "text": "But if you will not fight this righteous war, then having abandoned your own duty and reputation, you will incur sin."}], "near_dups": []}, {"id": 21, "text": "Fleeing your duty brings dishonor worse than death.", "best_verse": "2:34", "rationale": "The worldly reputation argument, distinct from the duty-as-sin appeal before it.", "verses": [{"ref": "2:34", "text": "People will also recount your everlasting dishonor; and for one who has been honored, dishonor is worse than death."}, {"ref": "2:35", "text": "The great chariot-warriors will think that you have withdrawn from the battle out of fear, and you will be held in low esteem by those who have held you in high regard."}, {"ref": "2:36", "text": "Your enemies, scoffing at your power, will speak many abusive words—what could be more painful than this?"}, {"ref": "2:37", "text": "Slain, you will obtain heaven; victorious, you will enjoy the earth; therefore, stand up, O son of Kunti, resolved to fight."}], "near_dups": []}, {"id": 22, "text": "Meet victory and defeat, gain and loss, alike.", "best_verse": "2:38", "rationale": "The pivot verse equalizing all outcomes before acting.", "verses": [{"ref": "2:38", "text": "Having made pleasure and pain, gain and loss, victory and defeat equal, engage in battle for the sake of battle; thus, you shall not incur sin."}], "near_dups": []}, {"id": 23, "text": "On this path no effort is ever wasted.", "best_verse": "2:40", "rationale": "Introduces Yoga of action: no loss, and a little of it guards from great fear.", "verses": [{"ref": "2:39", "text": "This, which has been taught to you, is wisdom concerning Sankhya. Now listen to wisdom concerning Yoga, endowed with which, O Arjuna, you shall cast off the bonds of action."}, {"ref": "2:40", "text": "In this, there is no loss of effort, nor is there any harm produced, nor any transgression. Even a little of this knowledge protects one from great fear."}], "near_dups": []}, {"id": 24, "text": "Hold one clear resolve; scattered aims lead nowhere.", "best_verse": "2:41", "rationale": "Single-pointed determination against the many-branched thoughts of the irresolute.", "verses": [{"ref": "2:41", "text": "Here, O joy of the Kurus, there is only one single-pointed determination; many-branched and endless are the thoughts of the indecisive."}], "near_dups": []}, {"id": 25, "text": "Chasing pleasure and reward leaves the mind unsettled.", "best_verse": "2:44", "rationale": "Those enchanted by flowery promises of enjoyment never reach steady concentration.", "verses": [{"ref": "2:42", "text": "The unwise, taking pleasure in the eulogizing words of the Vedas, utter flowery speech, saying, \"There is nothing else,\" O Arjuna."}, {"ref": "2:43", "text": "Full of desires, with heaven as their goal, (they speak words that are directed to ends) leading to new births as the result of their works, and prescribe various methods abounding in specific actions, for the attainment of pleasure and power."}, {"ref": "2:44", "text": "For those who are attached to pleasure and power, whose minds are drawn away by such teachings, their determinate reason is not formed which is steadily bent on meditation and Samadhi (superconscious state)."}], "near_dups": []}, {"id": 26, "text": "Rise above the pairs of opposites and possessiveness.", "best_verse": "2:45", "rationale": "Transcend the three gunas, opposites, and the urge to acquire and hoard.", "verses": [{"ref": "2:45", "text": "The Vedas deal with the three attributes; be thou above these three attributes. O Arjuna, free yourself from the pairs of opposites and ever remain in the quality of Sattva, freed from acquisition and preservation, and be established in the Self."}], "near_dups": [{"id": 284, "score": 0.937}], "suggestion": {"action": "distinct", "why": "26 = rise above opposites AND possessiveness (2:45); 284 = rise above pride and delusion (15:5). Different vices — keep both."}}, {"id": 27, "text": "To the awakened, scripture is a well amid a flood.", "best_verse": "2:46", "rationale": "The reservoir-in-a-flood image: direct knowing makes borrowed texts superfluous.", "verses": [{"ref": "2:46", "text": "To the Brahmana who has known the Self, all the Vedas are of as much use as a reservoir of water would be in a place where there is a flood."}], "near_dups": []}, {"id": 28, "text": "You have a right to your work, never its results.", "best_verse": "2:47", "rationale": "The keystone teaching on action without claim to the fruit.", "verses": [{"ref": "2:47", "text": "Your right is only to work, but not to its results; do not let the results of action be your motive, nor let your attachment be to inaction."}], "near_dups": []}, {"id": 29, "text": "Even-mindedness in success and failure is true yoga.", "best_verse": "2:48", "rationale": "Defines yoga specifically as evenness of mind while acting.", "verses": [{"ref": "2:48", "text": "Perform action, O Arjuna, being steadfast in Yoga, abandoning attachment and balanced in success and failure; evenness of mind is called Yoga."}], "near_dups": []}, {"id": 30, "text": "Ground action in wisdom; that is skill in action.", "best_verse": "2:50", "rationale": "Wise action transcends good and evil, far above work driven by reward.", "verses": [{"ref": "2:49", "text": "Far lower than the Yoga of wisdom is action, O Arjuna. Seek thou refuge in wisdom; wretched are those whose motive is the fruit."}, {"ref": "2:50", "text": "Endowed with wisdom and evenness of mind, one casts off in this life both good and evil deeds; therefore, devote yourself to Yoga; Yoga is skill in action."}], "near_dups": []}, {"id": 31, "text": "Release the fruits of action and be freed from bondage.", "best_verse": "2:51", "rationale": "Renouncing fruits specifically frees one from the bonds of rebirth.", "verses": [{"ref": "2:51", "text": "The wise, possessing knowledge, having abandoned the fruits of their actions, and being freed from the bonds of birth, go to the place which is beyond all evil."}], "near_dups": []}, {"id": 32, "text": "Cross beyond delusion and lose your taste for empty words.", "best_verse": "2:52", "rationale": "Passing the mire of delusion brings indifference to what is heard and to be heard.", "verses": [{"ref": "2:52", "text": "When your intellect passes beyond the mire of delusion, then you will attain indifference to what has been heard and what has yet to be heard."}], "near_dups": []}, {"id": 33, "text": "When your mind rests unmoved in the self, you awaken.", "best_verse": "2:53", "rationale": "Steadiness of intellect in the self, not scripture, yields realization.", "verses": [{"ref": "2:53", "text": "When your intellect, which is perplexed by the Vedic texts you have read, stands immovable and steady in the Self, then you will attain Self-realization."}], "near_dups": []}, {"id": 34, "text": "True contentment is found within, not in fulfilled desires.", "best_verse": "2:55", "rationale": "First mark of steady wisdom: casting off desires and being satisfied in the self.", "verses": [{"ref": "2:55", "text": "The Blessed Lord said, \"When a man completely casts off, O Arjuna, all the desires of the mind and is satisfied in the Self by the Self, then he is said to be one of steady wisdom.\""}], "near_dups": []}, {"id": 35, "text": "Stay unshaken by sorrow and free of craving and fear.", "best_verse": "2:56", "rationale": "The sage undisturbed by adversity and released from attachment, fear, and anger.", "verses": [{"ref": "2:56", "text": "He whose mind is not shaken by adversity, who does not long for pleasures, and is free from attachment, fear, and anger, is called a sage of steady wisdom."}], "near_dups": []}, {"id": 36, "text": "Neither celebrate the good nor recoil from the bad.", "best_verse": "2:57", "rationale": "Firm wisdom neither rejoices at fortune nor hurries from misfortune.", "verses": [{"ref": "2:57", "text": "He who is everywhere without attachment, upon encountering anything good or bad, neither rejoices nor hastens; his wisdom is firm."}], "near_dups": []}, {"id": 37, "text": "Withdraw your senses as a tortoise draws in its limbs.", "best_verse": "2:58", "rationale": "The signature tortoise image for sense-withdrawal.", "verses": [{"ref": "2:58", "text": "When, like the tortoise which withdraws all its limbs on all sides, he withdraws his senses from the sense-objects, then his wisdom becomes steady."}], "near_dups": []}, {"id": 38, "text": "Abstaining curbs the act; only insight ends the craving.", "best_verse": "2:59", "rationale": "Objects leave the abstinent but the underlying longing fades only on seeing the Supreme.", "verses": [{"ref": "2:59", "text": "The objects of the senses turn away from the abstinent man, leaving the longing behind; but his longing also turns away upon seeing the Supreme."}], "near_dups": []}, {"id": 39, "text": "Even the wise can be swept away by restless senses.", "best_verse": "2:60", "rationale": "A warning that turbulent senses overpower even one striving to control them.", "verses": [{"ref": "2:60", "text": "The turbulent senses, O Arjuna, can violently carry away the mind of a wise person, even though they are striving to control them."}], "near_dups": []}, {"id": 40, "text": "Master your senses and fix your mind on the highest.", "best_verse": "2:61", "rationale": "Restraint paired with devotion to the divine steadies wisdom.", "verses": [{"ref": "2:61", "text": "Having restrained them all, he should sit steadfast, intent on Me; his wisdom is steady whose senses are under control."}], "near_dups": []}, {"id": 41, "text": "Dwelling on objects breeds desire, then anger, then ruin.", "best_verse": "2:62", "rationale": "The famous descent chain from brooding to attachment, anger, delusion, and destruction.", "verses": [{"ref": "2:62", "text": "When one thinks of objects, attachment to them arises; from attachment, desire is born; from desire, anger arises."}, {"ref": "2:63", "text": "Anger leads to delusion, which causes loss of memory; this, in turn, leads to the destruction of discrimination, resulting in destruction."}], "near_dups": []}, {"id": 42, "text": "Move among temptations without craving or aversion to find peace.", "best_verse": "2:64", "rationale": "The self-controlled act in the world free of attraction and repulsion, ending all pain.", "verses": [{"ref": "2:64", "text": "But the self-controlled man, moving among objects with the senses restrained and free from attraction and repulsion, attains peace."}, {"ref": "2:65", "text": "In that peace, all pains are destroyed; for the intellect of the tranquil-minded soon becomes steady."}], "near_dups": []}, {"id": 43, "text": "Without a steady mind there is no peace or joy.", "best_verse": "2:66", "rationale": "The negative chain: no wisdom, meditation, peace, or happiness for the unsteady.", "verses": [{"ref": "2:66", "text": "There is no knowledge of the Self for the unsteady, and no meditation is possible for the unsteady, and no peace for the unmeditative, and how can there be happiness for one who has no peace?"}], "near_dups": []}, {"id": 44, "text": "Rein in the wandering senses that pull the mind off course.", "best_verse": "2:67", "rationale": "The wind-and-boat image: one loose sense drags away discrimination, so restrain them all.", "verses": [{"ref": "2:67", "text": "For the mind, which follows in the wake of the wandering senses, carries away his discrimination, as the wind carries away a boat on the waters."}, {"ref": "2:68", "text": "Therefore, O mighty-armed Arjuna, his knowledge is steady whose senses are completely restrained from sense objects."}], "near_dups": []}, {"id": 45, "text": "What the world chases, the wise quietly turn from.", "best_verse": "2:69", "rationale": "The night-and-day inversion of the sage's values against the world's.", "verses": [{"ref": "2:69", "text": "That which is night to all beings, in that the self-controlled man is awake; when all beings are awake, that is night for the sage who sees."}], "near_dups": []}, {"id": 46, "text": "Let desires enter and pass like rivers into the sea.", "best_verse": "2:70", "rationale": "The ocean image: peace comes to one whom desires enter without disturbing.", "verses": [{"ref": "2:70", "text": "He attains peace into whom all desires enter, just as waters enter the ocean which, filled from all sides, remains unmoved; but not the man who is full of desires."}], "near_dups": []}, {"id": 47, "text": "Drop craving, ownership, and ego to arrive at peace.", "best_verse": "2:71", "rationale": "Peace through abandoning longing, the sense of 'mine,' and egoism.", "verses": [{"ref": "2:71", "text": "That person attains peace who, abandoning all desires, moves about without longing, without the sense of ownership, and without egoism."}], "near_dups": []}, {"id": 48, "text": "Reach this state and even death cannot delude you.", "best_verse": "2:72", "rationale": "The concluding Brahmic state, undeluded and attained even at life's end.", "verses": [{"ref": "2:72", "text": "O son of Pritha, this is the eternal state, the Brahmic seat. Attaining this, one is not deluded. Being established in it, one attains oneness with Brahman even at the end of life."}], "near_dups": []}], "skipped": [{"chapter": 2, "v": 1, "reason": "narrative: Sanjaya describing the grieving Arjuna"}, {"chapter": 2, "v": 4, "reason": "narrative: Arjuna's objection to fighting his elders"}, {"chapter": 2, "v": 5, "reason": "narrative: Arjuna's despair over slaying teachers"}, {"chapter": 2, "v": 6, "reason": "narrative: Arjuna's uncertainty about the outcome"}, {"chapter": 2, "v": 8, "reason": "narrative: Arjuna's lament that no gain removes his sorrow"}, {"chapter": 2, "v": 9, "reason": "narrative: Sanjaya reporting Arjuna's refusal to fight"}, {"chapter": 2, "v": 10, "reason": "narrative: Sanjaya framing Krishna's reply"}, {"chapter": 2, "v": 54, "reason": "narrative: Arjuna's question setting up the steady-wisdom description"}]}, {"chapter": 3, "lessons": [{"id": 49, "text": "You cannot escape action, even for a moment.", "best_verse": "3:5", "rationale": "Renouncing deeds brings neither actionlessness nor perfection; Nature compels everyone to act ceaselessly.", "verses": [{"ref": "3:4", "text": "Man does not reach actionlessness by not performing actions; nor does he attain perfection by mere renunciation."}, {"ref": "3:5", "text": "Verily, no one can remain for even a moment without performing action; for everyone is made to act helplessly, indeed, by the qualities born of Nature."}], "near_dups": []}, {"id": 50, "text": "Don't fake restraint while your mind chases pleasures.", "best_verse": "3:6", "rationale": "Stilling the limbs while brooding on sense-objects is hypocrisy; true yoga controls the senses and still acts.", "verses": [{"ref": "3:6", "text": "He who, restraining the organs of action, sits thinking of the sense-objects in his mind, he of deluded understanding is called a hypocrite."}, {"ref": "3:7", "text": "But whoever, controlling the senses by the mind, O Arjuna, engages himself in Karma Yoga with the organs of action, without attachment, he excels."}], "near_dups": []}, {"id": 51, "text": "Do your appointed work; action beats inaction.", "best_verse": "3:8", "rationale": "Perform your bounden duty, for even sustaining the body is impossible through inaction.", "verses": [{"ref": "3:8", "text": "Perform your bounden duty, for action is superior to inaction, and even the maintenance of the body would not be possible for you through inaction."}], "near_dups": []}, {"id": 52, "text": "Perform every action as an offering, not for gain.", "best_verse": "3:9", "rationale": "Work done for sacrifice frees you; all other action binds. Act for that sake alone, free of attachment.", "verses": [{"ref": "3:9", "text": "The world is bound by actions other than those performed for the sake of sacrifice; do thou, therefore, O son of Kunti (Arjuna), perform actions for that sake alone, free from attachment."}], "near_dups": []}, {"id": 53, "text": "Repay what sustains you; take nothing for free.", "best_verse": "3:12", "rationale": "Mutual nourishment sustains creation; one who enjoys the gods' gifts without offering back is a thief, and who cooks for himself alone consumes sin.", "verses": [{"ref": "3:10", "text": "The Creator, having in the beginning created mankind together with sacrifice, said, \"By this shall you propagate; let this be the milch cow of your desires—the cow that yields all the desired objects.\""}, {"ref": "3:11", "text": "With this, nourish the gods, and may the gods nourish you; thus, nourishing each other, you shall attain the highest good."}, {"ref": "3:12", "text": "The gods, nourished by the sacrifice, will give you the desired objects. So, he who enjoys the objects given by the gods without offering anything in return is indeed a thief."}, {"ref": "3:13", "text": "The righteous who eat the remnants of the sacrifice are freed from all sins; but those sinful ones who cook food solely for their own sake indeed consume sin."}], "near_dups": []}, {"id": 54, "text": "Keep the wheel of giving turning, or live in vain.", "best_verse": "3:16", "rationale": "Food, rain, sacrifice, and action form one turning wheel rooted in Brahma; whoever refuses to keep it moving lives pointlessly.", "verses": [{"ref": "3:14", "text": "From food come forth beings; from rain, food is produced; from sacrifice arises rain, and sacrifice is born of action."}, {"ref": "3:15", "text": "Know that action comes from Brahma, and Brahma comes from the Imperishable. Therefore, the all-pervasive Brahma ever rests in sacrifice."}, {"ref": "3:16", "text": "He who does not follow the wheel thus set in motion, who is of sinful life, rejoicing in the senses, lives in vain, O Arjuna."}], "near_dups": []}, {"id": 55, "text": "The self-fulfilled need nothing from action or others.", "best_verse": "3:17", "rationale": "One who rejoices and rests wholly in the Self has nothing to gain from deeds and depends on no being.", "verses": [{"ref": "3:17", "text": "But for that man who rejoices only in the Self, who is satisfied with the Self and is content in the Self alone, indeed there is nothing to do."}, {"ref": "3:18", "text": "For him, there is no interest whatsoever in what is done or not done; nor does he depend on any being for any purpose."}], "near_dups": []}, {"id": 56, "text": "Work without attachment, and you reach the Supreme.", "best_verse": "3:19", "rationale": "Always do what must be done detached; by unattached action one attains the Supreme.", "verses": [{"ref": "3:19", "text": "Therefore, without attachment, always perform the actions that should be done; for by performing actions without attachment, one reaches the Supreme."}], "near_dups": []}, {"id": 57, "text": "Set the standard; the world follows its leaders.", "best_verse": "3:21", "rationale": "Janaka reached perfection through action; whatever a great person does and establishes, the world imitates.", "verses": [{"ref": "3:20", "text": "Janaka and others attained perfection indeed through action alone; even with the intention of protecting the masses, you should perform action."}, {"ref": "3:21", "text": "Whatever a great man does, others also do; whatever he establishes as the standard, the world follows."}], "near_dups": []}, {"id": 58, "text": "Keep working though you need nothing, for the world's sake.", "best_verse": "3:23", "rationale": "Krishna has nothing left to attain yet acts, because if he stopped, people would falter and the worlds would fall into ruin.", "verses": [{"ref": "3:22", "text": "There is nothing in the three worlds, O Arjuna, that needs to be done by Me, nor is there anything unattained that needs to be attained; yet I engage Myself in action."}, {"ref": "3:23", "text": "For, should I not ever engage myself in action, unwearied, people would in every way follow my path, O Arjuna."}, {"ref": "3:24", "text": "These worlds would perish if I did not perform action; I would be the author of confusion of castes and destruction of these beings."}], "near_dups": []}, {"id": 59, "text": "Work detached for others' good, without unsettling them.", "best_verse": "3:25", "rationale": "The wise act unattached wishing the world's welfare, and must not disturb the minds of those still attached to action.", "verses": [{"ref": "3:25", "text": "As the ignorant act out of attachment to action, O Bharata, so should the wise act without attachment, wishing for the welfare of the world."}, {"ref": "3:26", "text": "Let no wise man unsettle the minds of ignorant people who are attached to action; he should engage them in all actions, himself fulfilling them with devotion."}], "near_dups": []}, {"id": 60, "text": "Nature does the work; drop 'I am the doer.'", "best_verse": "3:27", "rationale": "Egoism alone claims doership; one who knows the gunas merely move among gunas stays unattached.", "verses": [{"ref": "3:27", "text": "All actions are wrought in all cases by the qualities of Nature alone. He whose mind is deluded by egoism thinks, \"I am the doer.\""}, {"ref": "3:28", "text": "But he who knows the Truth, O mighty-armed Arjuna, about the divisions of the qualities and their functions, knowing that the Gunas, as senses, move amidst the Gunas, as the sense-objects, is not attached."}, {"ref": "3:29", "text": "Those deluded by the qualities of Nature are attached to the functions of the qualities. The man of perfect knowledge should not unsettle the foolish one who is of imperfect knowledge."}], "near_dups": []}, {"id": 61, "text": "Offer all your actions to the Divine and fight.", "best_verse": "3:30", "rationale": "Surrender every act to the Divine, mind fixed on the Self, free of hope, ego, and mental fever.", "verses": [{"ref": "3:30", "text": "Renouncing all actions in Me, with the mind centered on the Self, free from hope and egoism, and from mental fever, fight thou."}], "near_dups": [{"id": 360, "score": 0.941}], "suggestion": {"action": "keep", "absorbs": [360], "why": "'Offer all actions to the divine' — 3:30 and 18:57 are the same teaching restated. Merge; keep 61, add 18:57."}}, {"id": 62, "text": "Practice this teaching with faith, never scorn.", "best_verse": "3:31", "rationale": "Those who follow it with faith are freed from bondage; those who criticize and ignore it are lost.", "verses": [{"ref": "3:31", "text": "Those who constantly practice this teaching of Mine with faith and without caviling, they too are freed from actions."}, {"ref": "3:32", "text": "But those who criticize My teaching and do not practice it, deprived of all knowledge and lacking discernment, know them to be doomed to destruction."}], "near_dups": []}, {"id": 63, "text": "Never let attraction and aversion rule you.", "best_verse": "3:34", "rationale": "Even the wise follow their nature; attachment and aversion seated in the senses are enemies whose sway you must refuse.", "verses": [{"ref": "3:33", "text": "Even a wise man acts in accordance with his own nature; beings will follow their nature; what can restraint do?"}, {"ref": "3:34", "text": "Attachment and aversion for the objects of the senses abide in the senses; let no one come under their sway; for, they are his enemies."}], "near_dups": []}, {"id": 64, "text": "Do your own duty poorly rather than another's well.", "best_verse": "3:35", "rationale": "One's own duty, even flawed, surpasses another's done perfectly; another's path is fraught with fear.", "verses": [{"ref": "3:35", "text": "Better is one's own duty, though devoid of merit, than the duty of another well discharged. Better is death in one's own duty; the duty of another is fraught with fear."}], "near_dups": [{"id": 351, "score": 0.977}], "suggestion": {"action": "keep", "absorbs": [351], "why": "'Do your own duty poorly over another's well' — verbatim Gita repetition (3:35 & 18:47). Merge; keep 64, add 18:47."}}, {"id": 65, "text": "Know desire and anger as your real enemy.", "best_verse": "3:37", "rationale": "What drives a person to sin against his will is desire and anger, born of rajas, all-devouring foes.", "verses": [{"ref": "3:36", "text": "Arjuna said, \"But what compels man to commit sin, even against his wishes, O Varshneya (Krishna), as if constrained by force?\""}, {"ref": "3:37", "text": "The Blessed Lord said, \"It is desire and it is anger, both of the quality of Rajas, all-devouring and all-sinful; know this as the foe here in this world.\""}], "near_dups": []}, {"id": 66, "text": "Desire veils your wisdom like smoke hides fire.", "best_verse": "3:39", "rationale": "Insatiable desire, seated in senses, mind, and intellect, envelops wisdom as smoke covers fire and dust a mirror.", "verses": [{"ref": "3:38", "text": "As fire is enveloped by smoke, as a mirror is covered by dust, and as an embryo is surrounded by the amniotic sac, so is this enveloped by that."}, {"ref": "3:39", "text": "O Arjuna, wisdom is enveloped by this constant enemy of the wise, in the form of desire, which is insatiable like fire."}, {"ref": "3:40", "text": "The senses, the mind, and the intellect are said to be its seat; through these, it deludes the embodied one, veiling their wisdom."}], "near_dups": []}, {"id": 67, "text": "Master your senses, then slay desire by the Self.", "best_verse": "3:41", "rationale": "Control the senses first, then destroy desire; knowing the Self is highest, restrain the self by the Self and conquer this foe.", "verses": [{"ref": "3:41", "text": "Therefore, O best of the Bharatas, control your senses first and then kill this sinful thing, which destroys knowledge and realization."}, {"ref": "3:42", "text": "They say that the senses are superior to the body; the mind is superior to the senses; the intellect is superior to the mind; and He (the Self) is superior even to the intellect."}, {"ref": "3:43", "text": "Thus, knowing Him who is superior to the intellect and restraining the self by the Self, slay thou, O mighty-armed Arjuna, the enemy in the form of desire, hard to conquer."}], "near_dups": []}], "skipped": [{"chapter": 3, "v": 1, "reason": "Narrative: Arjuna questions why Krishna urges terrible action if knowledge is superior."}, {"chapter": 3, "v": 2, "reason": "Narrative: Arjuna asks for one certain path to bliss; no distinct teaching."}, {"chapter": 3, "v": 3, "reason": "Expository framing restating the twofold path of knowledge and action; covered practically by 3:4-3:9."}]}, {"chapter": 4, "lessons": [{"id": 68, "text": "Receive sacred wisdom handed down through teachers.", "best_verse": "4:2", "rationale": "The yoga passed from teacher to student in unbroken succession, revived when lost.", "verses": [{"ref": "4:1", "text": "The Blessed Lord said, \"I taught this imperishable Yoga to Vivasvan; he then told it to Manu; Manu proclaimed it to Ikshvaku."}, {"ref": "4:2", "text": "This, handed down in regular succession by the royal sages, was known. This Yoga, however, has been lost here over time, O Parantapa (burner of the foes)."}, {"ref": "4:3", "text": "That same ancient yoga has been today taught to you by me, for you are my devotee and my friend; it is the supreme secret."}], "near_dups": []}, {"id": 69, "text": "Restore what is right whenever it declines.", "best_verse": "4:7", "rationale": "The divine descends age after age to protect the good and renew righteousness.", "verses": [{"ref": "4:7", "text": "Whenever there is a decline of righteousness and an increase of unrighteousness, O Arjuna, then I manifest Myself."}, {"ref": "4:8", "text": "For the protection of the good, for the destruction of the wicked, and for the establishment of righteousness, I am born in every age."}], "near_dups": []}, {"id": 70, "text": "Know the divine truly and end rebirth.", "best_verse": "4:9", "rationale": "Seeing the divine birth and actions in their true light frees one from returning.", "verses": [{"ref": "4:9", "text": "He who thus knows, in their true light, My divine birth and actions, having abandoned the body, is not born again; he comes to Me, O Arjuna."}], "near_dups": []}, {"id": 71, "text": "Burn attachment, fear, and anger in knowledge.", "best_verse": "4:10", "rationale": "Those purified by the fire of knowledge and freed of these three attain the divine.", "verses": [{"ref": "4:10", "text": "Freed from attachment, fear, and anger, absorbed in Me, taking refuge in Me, purified by the fire of knowledge, many have attained My Being."}], "near_dups": []}, {"id": 72, "text": "Others meet you the way you approach them.", "best_verse": "4:11", "rationale": "In whatever way people approach the divine, so are they answered.", "verses": [{"ref": "4:11", "text": "In whatever way men approach Me, even so do I reward them; My path do men tread in all ways, O Arjuna."}], "near_dups": []}, {"id": 73, "text": "Take decisive action when you seek worldly success.", "best_verse": "4:12", "rationale": "Those who long for results act and sacrifice, for success comes quickly through action.", "verses": [{"ref": "4:12", "text": "Those who long for success in action in this world sacrifice to the gods; for success is quickly attained by men through action."}], "near_dups": []}, {"id": 74, "text": "Work knowing action never taints the Self.", "best_verse": "4:14", "rationale": "The Self is the non-doer, untainted and free of desire for the fruits of action.", "verses": [{"ref": "4:13", "text": "The fourfold caste has been created by Me according to the differentiation of Guna and Karma; though I am the author of it, know Me as non-doer and immutable."}, {"ref": "4:14", "text": "Actions do not taint Me, nor do I have a desire for the fruit of actions. He who knows Me thus is not bound by actions."}], "near_dups": []}, {"id": 75, "text": "Study action and inaction to win freedom.", "best_verse": "4:16", "rationale": "Even the wise are confused about action and inaction; understanding them liberates.", "verses": [{"ref": "4:15", "text": "Having known this, the ancient seekers of freedom also performed action; therefore, do thou also perform action, as the ancients did in days of yore."}, {"ref": "4:16", "text": "What is action? What is inaction? Even the wise are confused about this. Therefore, I shall teach you the nature of action and inaction, by knowing which you will be liberated from the evil of Samsara, the wheel of birth and death."}, {"ref": "4:17", "text": "For verily, the true nature of action enjoined by the scriptures should be known, as well as that of forbidden or unlawful action, and of inaction; the nature of action is hard to understand."}], "near_dups": []}, {"id": 76, "text": "See inaction in action and action in inaction.", "best_verse": "4:18", "rationale": "The one who perceives this is wise, a yogi amid all his doing.", "verses": [{"ref": "4:18", "text": "He who sees inaction in action and action in inaction, he is wise among men; he is a yogi and performer of all actions."}], "near_dups": []}, {"id": 77, "text": "Let knowledge burn desire from your work.", "best_verse": "4:19", "rationale": "The sage's undertakings are free of selfish desire, consumed by the fire of knowledge.", "verses": [{"ref": "4:19", "text": "He whose undertakings are all devoid of desires and selfish purposes, and whose actions have been burned by the fire of knowledge, the wise call him a sage."}], "near_dups": []}, {"id": 78, "text": "Drop hope and craving while you act.", "best_verse": "4:21", "rationale": "Abandoning attachment to fruits and controlling the mind, one acts yet incurs no sin.", "verses": [{"ref": "4:20", "text": "Having abandoned attachment to the fruits of the action, ever content, depending on nothing, he does not do anything even while being engaged in activity."}, {"ref": "4:21", "text": "Without hope, controlling the mind and the self, having abandoned all covetousness, and performing only bodily actions, one incurs no sin."}], "near_dups": []}, {"id": 79, "text": "Stay even-minded in success and failure.", "best_verse": "4:22", "rationale": "Content with what comes unsought and free of opposites, one acts unbound.", "verses": [{"ref": "4:22", "text": "Content with what comes to him without effort, free from the pairs of opposites and envy, even-minded in success and failure, he acts yet is not bound."}], "near_dups": []}, {"id": 80, "text": "Work for sacrifice and your karma dissolves.", "best_verse": "4:23", "rationale": "For the detached mind fixed in knowledge, action done as sacrifice melts away entirely.", "verses": [{"ref": "4:23", "text": "To one who is devoid of attachment, who is liberated, whose mind is established in knowledge, and who works for the sake of sacrifice (for the sake of God), the whole action is dissolved."}], "near_dups": []}, {"id": 81, "text": "See the divine present in every act.", "best_verse": "4:24", "rationale": "Brahman is the offering, the fire, and the doer for one who sees it in all action.", "verses": [{"ref": "4:24", "text": "Brahman is the oblation; Brahman is the melted butter (ghee); by Brahman is the oblation poured into the fire of Brahman; Brahman indeed shall be attained by one who always sees Brahman in action."}], "near_dups": [{"id": 194, "score": 0.946}, {"id": 163, "score": 0.937}], "suggestion": {"action": "cut", "into": 163, "why": "Divine-in-all recurs 3x. 163 (in everything you see) and 194 (behind every form) are distinct facets; 81 (in every act) is close to 163 — merge or keep, your call."}}, {"id": 82, "text": "Offer your senses and breath as sacrifice.", "best_verse": "4:27", "rationale": "Diverse yogis sacrifice senses, objects, breath, and study in the fire of restraint.", "verses": [{"ref": "4:25", "text": "Some yogis perform sacrifice to the gods alone; while others, who have realized the Self, offer the Self as sacrifice in the fire of Brahman alone."}, {"ref": "4:26", "text": "Some again offer the organ of hearing and other senses as a sacrifice in the fire of restraint; others offer sound and other objects of the senses as a sacrifice in the fire of the senses."}, {"ref": "4:27", "text": "Others again sacrifice all the functions of the senses and those of the breath (vital energy, or Prana) in the fire of the Yoga of self-restraint, kindled by knowledge."}, {"ref": "4:28", "text": "Others again offer wealth, austerity, and Yoga as sacrifice, while ascetics of self-restraint and rigid vows offer the study of scriptures and knowledge as sacrifice."}, {"ref": "4:29", "text": "Others offer as sacrifice the outgoing breath into the incoming, and the incoming into the outgoing, restraining the flow of the outgoing and the incoming breaths, solely absorbed in the restraint of the breath."}, {"ref": "4:30", "text": "Others who regulate their diet offer life-breaths in each life-breath. All these are knowers of sacrifice, whose sins are destroyed through sacrifice."}], "near_dups": []}, {"id": 83, "text": "Give of yourself, for without sacrifice nothing is gained.", "best_verse": "4:31", "rationale": "This world is not for the non-sacrificer; those who share the remnants reach the eternal.", "verses": [{"ref": "4:31", "text": "Those who eat the remnants of the sacrifice, which are like nectar, go to the eternal Brahman. This world is not for the one who does not perform sacrifice; how then can they have the other, O Arjuna?"}], "near_dups": []}, {"id": 84, "text": "Know every sacrifice is born of action.", "best_verse": "4:32", "rationale": "Recognizing all sacrifices as born of action, one is liberated.", "verses": [{"ref": "4:32", "text": "Thus, manifold sacrifices are spread out before Brahman at the face of Brahman. Know them all to be born of action, and thus knowing, you shall be liberated."}], "near_dups": []}, {"id": 85, "text": "Prize wisdom above ritual; all action ends in knowledge.", "best_verse": "4:33", "rationale": "Knowledge-sacrifice is superior to material sacrifice; every action culminates in knowledge.", "verses": [{"ref": "4:33", "text": "Superior is wisdom-sacrifice to the sacrifice with objects, O Parantapa (scorcher of the foes). All actions in their entirety, O Arjuna, culminate in knowledge."}], "near_dups": []}, {"id": 86, "text": "Approach the wise with humility and service.", "best_verse": "4:34", "rationale": "The realized teach knowledge to those who prostrate, question, and serve.", "verses": [{"ref": "4:34", "text": "Know that the wise who have realized the truth will instruct thee in that knowledge through long prostration, supplication, and service."}], "near_dups": []}, {"id": 87, "text": "See every being within your own Self.", "best_verse": "4:35", "rationale": "With this knowledge you perceive all beings in yourself and in the divine.", "verses": [{"ref": "4:35", "text": "Knowing that thou shalt not, O Arjuna, again be deluded like this; and by that thou shalt see all beings in thyself and also in me."}], "near_dups": [{"id": 142, "score": 0.948}], "suggestion": {"action": "cut", "into": 142, "why": "Equal-vision recurs 5x. Keep three real facets: seeing the Self in all (142), worshipping the one presence (143), the indestructible reality (336). 87 duplicates 142; 248 duplicates 336."}}, {"id": 88, "text": "Cross even the worst sins by the raft of knowledge.", "best_verse": "4:36", "rationale": "However sinful, one crosses over all sin by knowledge.", "verses": [{"ref": "4:36", "text": "Even if thou art the most sinful of all sinners, yet thou shalt surely cross over all sins by the raft of knowledge."}], "near_dups": []}, {"id": 89, "text": "Let knowledge reduce your karma to ash.", "best_verse": "4:37", "rationale": "Like fire turning fuel to ash, the fire of knowledge consumes all actions.", "verses": [{"ref": "4:37", "text": "As the blazing fire reduces fuel to ashes, O Arjuna, so does the fire of knowledge reduce all actions to ash."}], "near_dups": []}, {"id": 90, "text": "Nothing purifies you like true knowledge.", "best_verse": "4:38", "rationale": "There is no purifier in this world equal to knowledge.", "verses": [{"ref": "4:38", "text": "Verily, there is no purifier in this world like knowledge. He who is perfected in Yoga finds it within the Self in due time."}], "near_dups": []}, {"id": 91, "text": "Pair faith with restraint to gain lasting peace.", "best_verse": "4:39", "rationale": "The faithful, devoted, and sense-controlled attain knowledge and then supreme peace.", "verses": [{"ref": "4:39", "text": "The one who is full of faith, devoted to it, and has subdued their senses obtains this knowledge; and upon obtaining the knowledge, they attain the supreme peace immediately."}], "near_dups": []}, {"id": 92, "text": "Release doubt, which destroys your happiness.", "best_verse": "4:40", "rationale": "The ignorant and doubting perish, finding no happiness in this world or the next.", "verses": [{"ref": "4:40", "text": "The ignorant, the faithless, and the doubting self go to destruction; there is neither this world nor the other, nor happiness for the doubting one."}], "near_dups": []}, {"id": 93, "text": "Cut doubt with the sword of knowledge and rise.", "best_verse": "4:42", "rationale": "Slay the doubt born of ignorance with self-knowledge, take refuge in yoga, and act.", "verses": [{"ref": "4:41", "text": "He who has renounced actions through Yoga, whose doubts have been dispelled by knowledge, and who is self-possessed—such a one is not bound by actions, O Arjuna."}, {"ref": "4:42", "text": "Therefore, with the sword of knowledge (of the Self), cut asunder the doubt of the self, born of ignorance, residing in your heart, and take refuge in Yoga. Arise, O Arjuna!"}], "near_dups": []}], "skipped": [{"chapter": 4, "v": 4, "reason": "Narrative: Arjuna's question about the timeline of the teaching."}, {"chapter": 4, "v": 5, "reason": "Narrative/theological: the divine recalls its many past births."}, {"chapter": 4, "v": 6, "reason": "Theological statement about the unborn divine taking form through Maya; no actionable directive."}]}, {"chapter": 5, "lessons": [{"id": 94, "text": "Choose engaged action over withdrawal; both reach the goal.", "best_verse": "5:2", "rationale": "Krishna's verdict: renunciation and karma yoga both lead to bliss, but active yoga is superior.", "verses": [{"ref": "5:2", "text": "The Blessed Lord said, \"Renunciation and the Yoga of action both lead to the highest bliss; but of the two, the Yoga of action is superior to the renunciation of action.\""}], "near_dups": []}, {"id": 95, "text": "Neither crave nor hate, and bondage falls away.", "best_verse": "5:3", "rationale": "The true renunciate is free from the pairs of opposites, easily liberated.", "verses": [{"ref": "5:3", "text": "He should be known as a perpetual Sannyasi who neither hates nor desires; for, free from the pairs of opposites, O mighty-armed Arjuna, he is easily freed from bondage."}], "near_dups": []}, {"id": 96, "text": "See knowledge and action as one path, not two.", "best_verse": "5:5", "rationale": "Only the childish separate Sankhya and Karma Yoga; whoever masters one gains both.", "verses": [{"ref": "5:4", "text": "Children, not the wise, speak of knowledge and the Yoga of action, or the performance of action, as though they are distinct and different; he who is truly established in one, obtains the fruits of both."}, {"ref": "5:5", "text": "That place which is reached by the Sankhyas or the Jnanis is also reached by the Yogis (Karma Yogis). He who sees knowledge and the performance of action (Karma Yoga) as one, sees truly."}], "near_dups": [{"id": 152, "score": 0.94}], "suggestion": {"action": "distinct", "why": "96 = knowledge and action are one path (5:5); 152 = pair knowledge with lived realization, not theory (7:2). Distinct points — keep both."}}, {"id": 97, "text": "Ground yourself in action first; renunciation ripens from it.", "best_verse": "5:6", "rationale": "Renunciation is hard without yoga; the yoga-harmonized sage quickly reaches Brahman.", "verses": [{"ref": "5:6", "text": "But, O mighty-armed Arjuna, renunciation is hard to attain without Yoga; the sage who is in harmony with Yoga quickly goes to Brahman."}], "near_dups": []}, {"id": 98, "text": "Purify your mind and subdue the senses; then act untainted.", "best_verse": "5:7", "rationale": "The self-conquered doer who sees the Self in all is not stained by action.", "verses": [{"ref": "5:7", "text": "He who is devoted to the path of action, whose mind is pure, who has conquered the self, who has subdued his senses, and who realizes his Self as the Self in all beings, though acting, is not tainted."}], "near_dups": []}, {"id": 99, "text": "Know the senses move among objects; you do nothing.", "best_verse": "5:8", "rationale": "The knower sees seeing, eating, breathing as sense activity, not the Self acting.", "verses": [{"ref": "5:8", "text": "I do nothing at all,\" thus would the harmonized knower of Truth think, seeing, hearing, touching, smelling, eating, going, sleeping, and breathing."}, {"ref": "5:9", "text": "Speaking, letting go, seizing, opening, and closing the eyes, one should be convinced that the senses move among the sense-objects."}], "near_dups": []}, {"id": 100, "text": "Offer your work to the divine and stay unstained like a lotus leaf.", "best_verse": "5:10", "rationale": "Actions offered to Brahman without attachment leave no taint, like water on a lotus leaf.", "verses": [{"ref": "5:10", "text": "He who does actions, offering them to Brahman and abandoning attachment, is not tainted by sin, just as a lotus leaf is not tainted by water."}], "near_dups": []}, {"id": 101, "text": "Work with body and mind to purify yourself, not to gain.", "best_verse": "5:11", "rationale": "Yogis act without attachment through body, mind, and senses for self-purification.", "verses": [{"ref": "5:11", "text": "Yogis, having abandoned attachment, perform actions only through the body, mind, intellect, and even the senses, for the purification of the self."}], "near_dups": []}, {"id": 102, "text": "Release the fruits and rest in lasting peace.", "best_verse": "5:12", "rationale": "Abandoning the fruit of action brings peace; desire for it brings bondage.", "verses": [{"ref": "5:12", "text": "The one who is united (the well-poised or harmonized) having abandoned the fruit of action attains eternal peace; whereas the one who is not united (the unsteady or unbalanced), impelled by desire and attached to the fruit, is bound."}], "near_dups": []}, {"id": 103, "text": "Renounce action in the mind and dwell content within.", "best_verse": "5:13", "rationale": "Mentally renouncing all action, the self-controlled one rests happily in the body, neither acting nor causing action.", "verses": [{"ref": "5:13", "text": "Mentally renouncing all actions and being self-controlled, the embodied one happily rests in the nine-gated city, neither acting nor causing others (body and senses) to act."}], "near_dups": []}, {"id": 104, "text": "Attribute doing to nature; the Self is no agent.", "best_verse": "5:14", "rationale": "The Lord creates no agency or action; nature acts, and ignorance alone deludes beings into taking blame or credit.", "verses": [{"ref": "5:14", "text": "Neither does the Lord create agency nor actions for the world, nor union with the fruits of actions; rather, it is Nature that acts."}, {"ref": "5:15", "text": "The Lord takes neither the demerit nor the merit of any; knowledge is enveloped by ignorance, and beings are deluded."}], "near_dups": []}, {"id": 105, "text": "Let self-knowledge burn away ignorance like the sun.", "best_verse": "5:16", "rationale": "Knowledge destroys ignorance and reveals the Supreme, as the sun reveals what darkness hid.", "verses": [{"ref": "5:16", "text": "But to those whose ignorance is destroyed by knowledge of the Self, like the sun, knowledge reveals the Supreme Brahman."}], "near_dups": [{"id": 208, "score": 0.94}], "suggestion": {"action": "cut", "into": 208, "why": "'Knowledge burns away ignorance' (sun 5:16 / lamp 10:11) — same metaphor. Merge into the lamp phrasing (208), add 5:16."}}, {"id": 106, "text": "Absorb your whole being in the Supreme and never return.", "best_verse": "5:17", "rationale": "Intellect, self, and goal fixed on Brahman lead to the state of no return, sins dispelled by knowledge.", "verses": [{"ref": "5:17", "text": "Their intellect absorbed in That, their self being That, established in That, with That as their supreme goal, they go whence there is no return, their sins dispelled by knowledge."}], "near_dups": []}, {"id": 107, "text": "Look with an equal eye on every being.", "best_verse": "5:18", "rationale": "Sages see the same Self in scholar, cow, elephant, dog, and outcaste alike.", "verses": [{"ref": "5:18", "text": "Sages look with an equal eye on a Brahmana endowed with learning and humility, on a cow, an elephant, a dog, and even an outcaste."}], "near_dups": []}, {"id": 108, "text": "Rest your mind in the flawless real and transcend rebirth.", "best_verse": "5:19", "rationale": "Those whose minds rest in the spotless reality of Brahman overcome birth even here.", "verses": [{"ref": "5:19", "text": "Even here in this world, those whose minds rest in reality overcome birth; Brahman is indeed spotless and real; therefore they are established in Brahman."}], "near_dups": []}, {"id": 109, "text": "Stay steady, unmoved by the pleasant or the unpleasant.", "best_verse": "5:20", "rationale": "The knower of Brahman neither rejoices at the pleasant nor grieves at the unpleasant.", "verses": [{"ref": "5:20", "text": "Resting in Brahman, with a steady intellect and undeluded, the knower of Brahman neither rejoices upon obtaining what is pleasant nor grieves upon obtaining what is unpleasant."}], "near_dups": []}, {"id": 110, "text": "Find your joy in the Self, not in outer contact.", "best_verse": "5:21", "rationale": "Unattached to external contact, one finds endless happiness in the Self.", "verses": [{"ref": "5:21", "text": "With the self unattached to external contacts, he finds happiness in the Self; with the self engaged in the meditation of Brahman, he attains endless happiness."}], "near_dups": []}, {"id": 111, "text": "Shun fleeting pleasures; they begin and end in pain.", "best_verse": "5:22", "rationale": "Enjoyments born of contact have a beginning and end and are wombs of pain; the wise avoid them.", "verses": [{"ref": "5:22", "text": "The enjoyments that arise from contact are only sources of pain, for they have a beginning and an end, O Arjuna; the wise do not rejoice in them."}], "near_dups": []}, {"id": 112, "text": "Conquer the surge of desire and anger to find joy within.", "best_verse": "5:23", "rationale": "Withstanding the impulse of desire and anger makes a happy yogi; happy and illumined within, he attains Moksha.", "verses": [{"ref": "5:23", "text": "He who is able, while still here in this world, to withstand the impulse born out of desire and anger before the liberation from the body, he is a Yogi, and he is a happy man."}, {"ref": "5:24", "text": "He who is happy within, who rejoices within, and who is illuminated within, that Yogi attains absolute freedom, or Moksha, becoming Brahman himself."}], "near_dups": []}, {"id": 113, "text": "Devote yourself to the welfare of all beings.", "best_verse": "5:25", "rationale": "Sages gain absolute freedom being self-controlled and intent on the good of all beings.", "verses": [{"ref": "5:25", "text": "The sages obtain absolute freedom or Moksha when their sins have been destroyed, their dualities have been torn asunder, they are self-controlled, and they are intent on the welfare of all beings."}], "near_dups": []}, {"id": 114, "text": "Still your thoughts, and freedom opens on every side.", "best_verse": "5:26", "rationale": "Freedom surrounds the self-controlled who have mastered their thoughts and realized the Self.", "verses": [{"ref": "5:26", "text": "Absolute freedom exists on all sides for those self-controlled ascetics who are free from desire and anger, who have controlled their thoughts, and who have realized the Self."}], "near_dups": []}, {"id": 115, "text": "Steady your gaze and breath to turn attention inward.", "best_verse": "5:27", "rationale": "The meditation technique: shut out contacts, fix the gaze between the brows, and balance the breath.", "verses": [{"ref": "5:27", "text": "Shutting out all external contacts and fixing the gaze between the eyebrows, realizing the outgoing and incoming breaths moving within the nostrils."}], "near_dups": []}, {"id": 116, "text": "Control senses, mind, and intellect, and be forever free.", "best_verse": "5:28", "rationale": "With senses and mind ever controlled and free from desire, fear, and anger, the sage is liberated.", "verses": [{"ref": "5:28", "text": "With the senses, mind, and intellect ever controlled, having liberation as their supreme goal, free from desire, fear, and anger, the sage is truly liberated forever."}], "near_dups": []}, {"id": 117, "text": "Know the divine as friend of all, and find peace.", "best_verse": "5:29", "rationale": "Knowing the Lord as enjoyer of offerings and friend of all beings brings peace.", "verses": [{"ref": "5:29", "text": "He who knows Me as the enjoyer of sacrifices and austerities, the great Lord of all the worlds, and the friend of all beings, attains peace."}], "near_dups": []}], "skipped": [{"chapter": 5, "v": 1, "reason": "Narrative framing: Arjuna's question asking which is better, renunciation or yoga; no standalone teaching."}]}, {"chapter": 6, "lessons": [{"id": 118, "text": "Do your duty without clinging to results.", "best_verse": "6:1", "rationale": "Defines the true renouncer as one who acts without depending on fruits, not one who merely abstains.", "verses": [{"ref": "6:1", "text": "The Blessed Lord said: He who performs his bounden duty without depending on the fruits of his actions—he is a sannyasi and a yogi, not he who is without fire and without action."}], "near_dups": []}, {"id": 119, "text": "Renounce selfish intentions, not action itself.", "best_verse": "6:2", "rationale": "Yoga is renunciation of self-centered thoughts and attachment, reached through action then settling into inaction.", "verses": [{"ref": "6:2", "text": "Do you, O Arjuna, know that Yoga is what they call renunciation; no one indeed becomes a Yogi who has not renounced their thoughts."}, {"ref": "6:3", "text": "For a sage who wishes to attain to Yoga, action is said to be the means; for the same sage who has attained Yoga, inaction is said to be the means."}, {"ref": "6:4", "text": "When a person is not attached to the sense-objects or to actions, having renounced all thoughts, then they are said to have attained Yoga."}], "near_dups": [{"id": 324, "score": 0.982}], "suggestion": {"action": "cut", "into": 324, "why": "'Renounce selfish desire, not the action' — 6:2 and 18:2 are the same. Merge; keep 324 (18:2, the canonical statement), add 6:2."}}, {"id": 120, "text": "Lift yourself by your own effort.", "best_verse": "6:5", "rationale": "Raise yourself by your own self; do not let yourself sink.", "verses": [{"ref": "6:5", "text": "One should raise oneself by one's own self alone; let not one lower oneself; for the self alone is one's own friend, and the self alone is one's own enemy."}], "near_dups": []}, {"id": 121, "text": "Be your own friend, not your own enemy.", "best_verse": "6:6", "rationale": "The conquered self befriends you; the unconquered self acts as your foe.", "verses": [{"ref": "6:6", "text": "The Self is the friend of the self of him by whom the Self has been conquered; but to the unconquered self, this Self stands in the position of an enemy, like an external foe."}], "near_dups": []}, {"id": 122, "text": "Stay balanced through cold and heat, praise and blame.", "best_verse": "6:7", "rationale": "The self-controlled remain even in pleasure and pain, honor and dishonor.", "verses": [{"ref": "6:7", "text": "The Supreme Self of him who is self-controlled and peaceful remains balanced in cold and heat, pleasure and pain, as well as in honor and dishonor."}], "near_dups": []}, {"id": 123, "text": "Value wisdom over gold and stone alike.", "best_verse": "6:8", "rationale": "The content yogi treats a clod, a stone, and gold as the same.", "verses": [{"ref": "6:8"
